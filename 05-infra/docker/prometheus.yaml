# prometheus.yaml
# License: Apache-2.0
global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: insomeos-local
    environment: development

scrape_configs:
  - job_name: gateway
    metrics_path: /metrics
    static_configs:
      - targets: ['gateway:9090']
        labels: { service: 'harness-core' }

  - job_name: agent
    metrics_path: /metrics
    static_configs:
      - targets: ['agent:7001']
        labels: { service: 'agent-orchestrator' }

  - job_name: otel-collector
    static_configs:
      - targets: ['otel-collector:8889']

  - job_name: postgres
    static_configs:
      - targets: ['postgres:5432']
