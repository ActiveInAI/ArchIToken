# ════════════════════════════════════════════════════════════════════════
# InsomeOS · versions.toml · v1.3.0
# ════════════════════════════════════════════════════════════════════════
# 单一事实源 (Constitutional Article 2)
# 被 Cargo.toml / package.json / pyproject.toml / Dockerfile / helm values
# 通过 `just versions-inject` 消费。
#
# 本文件记录两个状态:
#   [baseline]  = 2026-04-22 AIA 本地仓库 ~/dev/insomeos/04-backend 实况
#                 (cargo check 通过 · PG 已装 · Valkey 已启)
#   [upgrade]   = 2026-04-23 AIA 指定的升级目标
#                 (Supabase v1.26.04 全家桶 · Iceberg 1.10.1 · Langfuse v4)
#
# Sprint 01 任务:把 [upgrade] 逐项替换 [baseline],每替换一项跑一次 CI。
#
# 许可证政策:
#   白名单 (whitelist):  Apache-2.0 / MIT / BSD-2 / BSD-3 / MPL-2.0 /
#                        PostgreSQL / ISC / Zlib / Unlicense / CC0 / 0BSD
#   容忍 (tolerated):    LGPL-2.1 / LGPL-3.0 / EPL-2.0 / CDDL
#                        (仅动态链接或独立进程)
#   GPL-3 例外:          ComfyUI / YOLO-World / LibreDWG
#                        (独立 K8s namespace + WS/REST/MCP 通信,零静态链接)
#   黑名单 (blacklist):  AGPL-3.0 / SSPL-1.0 / BSL-1.1 / Elastic-2.0 /
#                        Commons-Clause / CC-BY-NC / CC-BY-SA
#
# 锁定策略:
#   lock_policy      = "strict"       # 禁用 ^ ~ * latest
#   pin_patch        = true           # 必须锁到 @x.y.z
#   allow_pre_release = false          # 除非 R4a 例外明示
#   stale_after_days = 14
#
# 核查工具链:
#   scripts/check-versions.py    · 每项 check_url 拉 GitHub API 对比
#   just versions-check          · 本地手动跑
#   .github/workflows/versions-check.yml  · 每周一 03:00 UTC cron
#
# ════════════════════════════════════════════════════════════════════════

[meta]
project           = "InsomeOS"
project_version   = "1.3.0"
manifest_version  = "3.6.0"
doc_id            = "IOS-VM-2026-004"
last_full_sweep   = "2026-04-23"
last_patch        = "2026-04-23-f · Phase B1 · Rust 29 依赖批量补录 · csgrs 悬而未决(TODO 5.1) · 版本号 0 改动"
baseline_date     = "2026-04-22"
upgrade_target    = "2026-04-23"
lock_policy       = "strict"
pin_patch         = true
allow_pre_release = false
stale_after_days  = 14
stale_hard_days   = 30

