apiVersion: apps/v1
kind: Deployment
metadata:
  name: temporal
  namespace: architoken-phase8
  labels:
    app.kubernetes.io/name: temporal
    app.kubernetes.io/component: workflow-engine
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: temporal
      app.kubernetes.io/component: workflow-engine
  template:
    metadata:
      labels:
        app.kubernetes.io/name: temporal
        app.kubernetes.io/component: workflow-engine
    spec:
      imagePullSecrets:
        - name: architoken-phase8-registry
      containers:
        - name: temporal
          image: 10.98.112.29:5000/architoken/temporal-auto-setup@sha256:bfb0d5e1b4c7bd934defb29b6a16ff64a42333fcb31efbb81590f13521c1602e
          imagePullPolicy: IfNotPresent
          ports:
            - name: grpc
              containerPort: 7233
          env:
            - name: DB
              value: postgres12
            - name: DB_PORT
              value: "5432"
            - name: POSTGRES_SEEDS
              value: postgres.architoken-phase8.svc.cluster.local
            - name: POSTGRES_USER
              value: temporal
            - name: POSTGRES_PWD
              valueFrom:
                secretKeyRef:
                  name: architoken-runtime-secrets
                  key: temporal-postgres-password
            - name: DBNAME
              value: temporal
            - name: VISIBILITY_DBNAME
              value: temporal_visibility
            - name: SKIP_DB_CREATE
              value: "true"
            - name: DEFAULT_NAMESPACE
              value: architoken
            - name: DEFAULT_NAMESPACE_RETENTION
              value: 168h
          readinessProbe:
            tcpSocket:
              port: grpc
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            tcpSocket:
              port: grpc
            initialDelaySeconds: 60
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 6
          resources:
            requests:
              cpu: "500m"
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 4Gi
---
apiVersion: v1
kind: Service
metadata:
  name: temporal
  namespace: architoken-phase8
  labels:
    app.kubernetes.io/name: temporal
    app.kubernetes.io/component: workflow-engine
spec:
  selector:
    app.kubernetes.io/name: temporal
    app.kubernetes.io/component: workflow-engine
  ports:
    - name: grpc
      port: 7233
      targetPort: grpc
