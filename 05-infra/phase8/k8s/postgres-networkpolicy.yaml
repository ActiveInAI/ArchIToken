apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-architoken-phase8-postgres
  namespace: insomeos
spec:
  podSelector:
    matchLabels:
      app: postgres
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: architoken-phase8
      ports:
        - protocol: TCP
          port: 5432
