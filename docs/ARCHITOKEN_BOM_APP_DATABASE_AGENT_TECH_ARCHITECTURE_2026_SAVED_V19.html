sign</code></td>\n<td><code>/v1/design/*</code>, <code>/v1/component-bom/*</code></td>\n</tr>\n<tr>\n<td><code>quantity_costing</code></td>\n<td><code>/v1/quantity-costing/*</code></td>\n</tr>\n<tr>\n<td><code>material_logistics</code></td>\n<td><code>/v1/material-logistics/*</code></td>\n</tr>\n<tr>\n<td><code>production_manufacturing</code></td>\n<td><code>/v1/production/*</code></td>\n</tr>\n<tr>\n<td><code>construction_management</code></td>\n<td><code>/v1/construction/*</code></td>\n</tr>\n<tr>\n<td><code>digital_twin</code></td>\n<td><code>/v1/digital-twin/*</code></td>\n</tr>\n<tr>\n<td><code>digital_archive</code></td>\n<td><code>/v1/archive/*</code></td>\n</tr>\n<tr>\n<td><code>finance_management</code></td>\n<td><code>/v1/finance/*</code></td>\n</tr>\n<tr>\n<td><code>human_resources</code></td>\n<td><code>/v1/hr/*</code></td>\n</tr>\n<tr>\n<td><code>ai_center</code></td>\n<td><code>/v1/ai/*</code>, <code>/v1/runtime/capabilities</code>, <code>/v1/data-plane/*</code></td>\n</tr>\n<tr>\n<td><code>settings_center</code></td>\n<td><code>/v1/settings/*</code>, <code>/v1/identity/*</code>, <code>/v1/permissions/*</code></td>\n</tr>\n<tr>\n<td>全局文件</td>\n<td><code>/v1/module-files/*</code>, <code>/api/local-files/*</code></td>\n</tr>\n<tr>\n<td>全局事务</td>\n<td><code>/v1/module-transactions/*</code>, <code>/v1/approval-tasks/*</code>, <code>/v1/audit-events/*</code></td>\n</tr>\n</tbody></table>\n<h3>5.12 环境变量</h3>\n<table>\n<thead>\n<tr>\n<th>变量</th>\n<th>用途</th>\n</tr>\n</thead>\n<tbody><tr>\n<td><code>DATABASE_URL</code></td>\n<td>PostgreSQL 主库</td>\n</tr>\n<tr>\n<td><code>ARCHITOKEN_CACHE__URL</code></td>\n<td>Valkey/Redis-compatible 缓存</td>\n</tr>\n<tr>\n<td><code>S3_ENDPOINT</code></td>\n<td>对象存储 endpoint</td>\n</tr>\n<tr>\n<td><code>S3_BUCKET</code></td>\n<td>默认 bucket</td>\n</tr>\n<tr>\n<td><code>S3_ACCESS_KEY_ID</code></td>\n<td>对象存储账号</td>\n</tr>\n<tr>\n<td><code>S3_SECRET_ACCESS_KEY</code></td>\n<td>对象存储密钥</td>\n</tr>\n<tr>\n<td><code>ARCHITOKEN_VECTOR__URL</code></td>\n<td>Qdrant 或外部向量库</td>\n</tr>\n<tr>\n<td><code>QDRANT_URL</code></td>\n<td>Qdrant 兼容变量</td>\n</tr>\n<tr>\n<td><code>ARCHITOKEN_EVENT__URL</code></td>\n<td>NATS/EventStore</td>\n</tr>\n<tr>\n<td><code>NATS_URL</code></td>\n<td>NATS JetStream</td>\n</tr>\n<tr>\n<td><code>ARCHITOKEN_TIMESERIES__URL</code></td>\n<td>时序库</td>\n</tr>\n<tr>\n<td><code>CLICKHOUSE_URL</code></td>\n<td>ClickHouse</td>\n</tr>\n<tr>\n<td><code>STIRLING_PDF_URL</code></td>\n<td>PDF sidecar</td>\n</tr>\n<tr>\n<td><code>COLLABORA_WOPI_URL</code></td>\n<td>Collabora WOPI</td>\n</tr>\n<tr>\n<td><code>ARCHITOKEN_MODEL_ROUTER_URL</code></td>\n<td>模型路由服务</td>\n</tr>\n<tr>\n<td><code>ARCHITOKEN_WORKER_QUEUE_URL</code></td>\n<td>Worker 队列</td>\n</tr>\n<tr>\n<td><code>ARCHITOKEN_OBJECTSTORE_REGION</code></td>\n<td>对象存储区域</td>\n</tr>\n<tr>\n<td><code>ARCHITOKEN_AUDIT_APPEND_ONLY</code></td>\n<td>审计不可变策略</td>\n</tr>\n<tr>\n<td><code>ARCHITOKEN_TENANT_MODE</code></td>\n<td>单租户/多租户</td>\n</tr>\n<tr>\n<td><code>ARCHITOKEN_GPU_REQUIRED</code></td>\n<td>GPU 任务强制策略</td>\n</tr>\n</tbody></table>\n<h3>5.13 本地开发环境</h3>\n<table>\n<thead>\n<tr>\n<th>组件</th>\n<th>要求</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>OS</td>\n<td>Ubuntu 24.04 LTS 或等价 Linux</td>\n</tr>\n<tr>\n<td>Node/Bun</td>\n<td>Bun 作为前端运行和测试入口</td>\n</tr>\n<tr>\n<td>Rust</td>\n<td>Rust stable, cargo, clippy, rustfmt</td>\n</tr>\n<tr>\n<td>Python</td>\n<td>Python + uv,用于 Agent/Worker</td>\n</tr>\n<tr>\n<td>Docker</td>\n<td>Docker Engine / Compose</td>\n</tr>\n<tr>\n<td>PostgreSQL</td>\n<td>本地容器或远端开发库</td>\n</tr>\n<tr>\n<td>Valkey</td>\n<td>本地容器</td>\n</tr>\n<tr>\n<td>ObjectStore</td>\n<td>S3 兼容本地服务</td>\n</tr>\n<tr>\n<td>GPU</td>\n<td>有 NVIDIA 时启用 NVIDIA Container Toolkit；无 GPU 时记录 fallback</td>\n</tr>\n</tbody></table>\n<p>本地启动顺序:</p>\n<pre><code class=\"language-text\">database + cache + objectstore\n  -&gt; backend gateway\n  -&gt; worker services\n  -&gt; frontend dev server\n  -&gt; Playwright smoke\n</code></pre>\n<h3>5.14 生产部署拓扑</h3>\n<pre><code class=\"language-text\">Ingress / API Gateway\n  -&gt; architoken-gateway\n  -&gt; harness-core\n  -&gt; PostgreSQL / ObjectStore / Valkey / EventStore / VectorStore\n  -&gt; worker queue\n  -&gt; file workers / cad-bim workers / pdf-office workers / ai workers\n  -&gt; model router\n  -&gt; inference runtimes\n  -&gt; observability\n</code></pre>\n<table>\n<thead>\n<tr>\n<th>节点池</th>\n<th>服务</th>\n</tr>\n</thead>\n<tbody><tr>\n<td><code>system</code></td>\n<td>Gateway、frontend、auth、settings</td>\n</tr>\n<tr>\n<td><code>database</code></td>\n<td>PostgreSQL、Valkey、ObjectStore、EventStore</td>\n</tr>\n<tr>\n<td><code>worker-cpu</code></td>\n<td>Office 文档解析、PDF、导出、轻量结构化抽取</td>\n</tr>\n<tr>\n<td><code>worker-gpu</code></td>\n<td>IFC 几何、AI 推理、图像视频、重型渲染</td>\n</tr>\n<tr>\n<td><code>cad-bim</code></td>\n<td>DWG/DXF/IFC/STEP/SKP/3DM/RVT sidecar</td>\n</tr>\n<tr>\n<td><code>observability</code></td>\n<td>OpenTelemetry、日志、指标、追踪、审计</td>\n</tr>\n</tbody></table>\n<h3>5.15 备份与恢复</h3>\n<table>\n<thead>\n<tr>\n<th>对象</th>\n<th>策略</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>PostgreSQL</td>\n<td>每日全量 + WAL 增量 + 版本迁移脚本</td>\n</tr>\n<tr>\n<td>ObjectStore</td>\n<td>版本化 bucket + 跨盘/跨节点副本</td>\n</tr>\n<tr>\n<td>Valkey</td>\n<td>可重建缓存,只备份关键队列状态</td>\n</tr>\n<tr>\n<td>EventStore</td>\n<td>append-only,定期快照</td>\n</tr>\n<tr>\n<td>VectorStore</td>\n<td>从标准库/CDE 文件可重建,保留索引版本</td>\n</tr>\n<tr>\n<td>归档包</td>\n<td>不可变对象 + sha256 + 审批记录</td>\n</tr>\n<tr>\n<td>配置</td>\n<td>GitOps + Secret backup</td>\n</tr>\n</tbody></table>\n<h3>5.16 CI/CD 门禁</h3>\n<table>\n<thead>\n<tr>\n<th>门禁</th>\n<th>内容</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>Rust</td>\n<td><code>cargo check</code>, <code>cargo test</code>, <code>clippy</code>, <code>fmt</code></td>\n</tr>\n<tr>\n<td>Frontend</td>\n<td><code>bun run test</code>, <code>tsc</code>, <code>eslint</code>, Playwright</td>\n</tr>\n<tr>\n<td>Python</td>\n<td>worker tests, import smoke</td>\n</tr>\n<tr>\n<td>Database</td>\n<td>migration up/down, schema diff</td>\n</tr>\n<tr>\n<td>API</td>\n<td>OpenAPI diff, SDK generation</td>\n</tr>\n<tr>\n<td>Security</td>\n<td>dependency audit, SBOM, license scan</td>\n</tr>\n<tr>\n<td>AI</td>\n<td>prompt/schema validation, tool policy</td>\n</tr>\n<tr>\n<td>File runtime</td>\n<td>Office/PDF/CAD/BIM smoke</td>\n</tr>\n<tr>\n<td>BOM</td>\n<td>三个 Excel fixture 导入、校验、导出</td>\n</tr>\n</tbody></table>\n<h3>5.17 数据库 Schema 分区</h3>\n<table>\n<thead>\n<tr>\n<th>Schema</th>\n<th>Owner 模块</th>\n<th>主要表</th>\n<th>迁移文件建议</th>\n</tr>\n</thead>\n<tbody><tr>\n<td><code>core</code></td>\n<td>全局</td>\n<td><code>tenants</code>, <code>modules</code>, <code>module_transactions</code>, <code>audit_events</code>, <code>event_outbox</code></td>\n<td><code>04-backend/migrations/*_core.sql</code></td>\n</tr>\n<tr>\n<td><code>identity</code></td>\n<td><code>settings_center</code></td>\n<td><code>users</code>, <code>roles</code>, <code>permissions</code>, <code>role_bindings</code>, <code>approval_matrices</code></td>\n<td><code>*_identity.sql</code></td>\n</tr>\n<tr>\n<td><code>cde</code></td>\n<td>全模块</td>\n<td><code>module_files</code>, <code>file_versions</code>, <code>file_permissions</code>, <code>object_store_objects</code></td>\n<td><code>*_cde_files.sql</code></td>\n</tr>\n<tr>\n<td><code>marketing</code></td>\n<td><code>marketing_service</code></td>\n<td><code>leads</code>, <code>customers</code>, <code>contacts</code>, <code>requirements</code>, <code>quote_drafts</code></td>\n<td><code>*_marketing.sql</code></td>\n</tr>\n<tr>\n<td><code>planning</code></td>\n<td><code>planning_management</code></td>\n<td><code>projects</code>, <code>wbs_items</code>, <code>milestones</code>, <code>risks</code>, <code>change_requests</code></td>\n<td><code>*_planning.sql</code></td>\n</tr>\n<tr>\n<td><code>concept</code></td>\n<td><code>concept_design</code></td>\n<td><code>concept_briefs</code>, <code>concept_variants</code>, <code>concept_evaluations</code>, <code>client_confirmations</code></td>\n<td><code>*_concept.sql</code></td>\n</tr>\n<tr>\n<td><code>standard</code></td>\n<td><code>standard_library</code></td>\n<td><code>standards</code>, <code>clauses</code>, <code>sjg157_categories</code>, <code>rule_sets</code>, <code>material_grades</code></td>\n<td><code>*_standard_library.sql</code></td>\n</tr>\n<tr>\n<td><code>design</code></td>\n<td><code>detailed_design</code></td>\n<td><code>design_packages</code>, <code>drawings</code>, <code>bim_models</code>, <code>clash_reports</code>, <code>design_reviews</code></td>\n<td><code>*_detailed_design.sql</code></td>\n</tr>\n<tr>\n<td><code>component_bom</code></td>\n<td><code>detailed_design</code></td>\n<td><code>bom_documents</code>, <code>bom_versions</code>, <code>bom_lines</code>, <code>validation_results</code></td>\n<td><code>*_component_bom.sql</code></td>\n</tr>\n<tr>\n<td><code>costing</code></td>\n<td><code>quantity_costing</code></td>\n<td><code>boq_documents</code>, <code>boq_items</code>, <code>price_snapshots</code>, <code>cost_breakdowns</code></td>\n<td><code>*_costing.sql</code></td>\n</tr>\n<tr>\n<td><code>logistics</code></td>\n<td><code>material_logistics</code></td>\n<td><code>suppliers</code>, <code>purchase_orders</code>, <code>shipments</code>, <code>receiving_records</code>, <code>inventory_batches</code></td>\n<td><code>*_logistics.sql</code></td>\n</tr>\n<tr>\n<td><code>production</code></td>\n<td><code>production_manufacturing</code></td>\n<td><code>work_orders</code>, <code>cutting_lists</code>, <code>cnc_files</code>, <code>qc_records</code>, <code>dispatch_batches</code></td>\n<td><code>*_production.sql</code></td>\n</tr>\n<tr>\n<td><code>construction</code></td>\n<td><code>construction_management</code></td>\n<td><code>daily_logs</code>, <code>inspections</code>, <code>installation_records</code>, <code>acceptance_reports</code>, <code>rectification_items</code></td>\n<td><code>*_construction.sql</code></td>\n</tr>\n<tr>\n<td><code>twin</code></td>\n<td><code>digital_twin</code></td>\n<td><code>twin_models</code>, <code>twin_elements</code>, <code>iot_devices</code>, <code>iot_events</code>, <code>alerts</code></td>\n<td><code>*_digital_twin.sql</code></td>\n</tr>\n<tr>\n<td><code>archive</code></td>\n<td><code>digital_archive</code></td>\n<td><code>archive_packages</code>, <code>archive_items</code>, <code>evidence_chain_nodes</code>, <code>integrity_checks</code></td>\n<td><code>*_archive.sql</code></td>\n</tr>\n<tr>\n<td><code>finance</code></td>\n<td><code>finance_management</code></td>\n<td><code>budgets</code>, <code>contracts</code>, <code>invoices</code>, <code>payments</code>, <code>vouchers</code>, <code>reconciliation_runs</code></td>\n<td><code>*_finance.sql</code></td>\n</tr>\n<tr>\n<td><code>hr</code></td>\n<td><code>human_resources</code></td>\n<td><code>employees</code>, <code>crews</code>, <code>qualifications</code>, <code>attendance_records</code>, <code>timesheets</code></td>\n<td><code>*_hr.sql</code></td>\n</tr>\n<tr>\n<td><code>ai</code></td>\n<td><code>ai_center</code></td>\n<td><code>model_routes</code>, <code>tool_policies</code>, <code>rag_sources</code>, <code>agent_runs</code>, <code>ai_cost_events</code></td>\n<td><code>*_ai_center.sql</code></td>\n</tr>\n</tbody></table>\n<h3>5.18 统一表字段基线</h3>\n<p>所有业务主表必须包含以下字段,特殊高频表也不得删除这些字段,只能增加索引或派生表。</p>\n<pre><code class=\"language-sql\">tenant_id        UUID NOT NULL,\nproject_id       UUID NULL,\nid               UUID PRIMARY KEY,\nstatus           TEXT NOT NULL,\nversion_no       INTEGER NOT NULL DEFAULT 1,\nsource_file_id   UUID NULL,\nsource_version_id UUID NULL,\ncreated_by       UUID NOT NULL,\nupdated_by       UUID NOT NULL,\ncreated_at       TIMESTAMPTZ NOT NULL DEFAULT NOW(),\nupdated_at       TIMESTAMPTZ NOT NULL DEFAULT NOW(),\nissued_at        TIMESTAMPTZ NULL,\narchived_at      TIMESTAMPTZ NULL,\naudit_event_id   UUID NOT NULL,\nmetadata         JSONB NOT NULL DEFAULT &#39;{}&#39;::jsonb\n</code></pre>\n<table>\n<thead>\n<tr>\n<th>字段</th>\n<th>要求</th>\n</tr>\n</thead>\n<tbody><tr>\n<td><code>tenant_id</code></td>\n<td>RLS 隔离第一字段</td>\n</tr>\n<tr>\n<td><code>project_id</code></td>\n<td>项目相关对象必须填写；平台对象可为空</td>\n</tr>\n<tr>\n<td><code>status</code></td>\n<td>必须使用统一生命周期状态</td>\n</tr>\n<tr>\n<td><code>source_file_id</code> / <code>source_version_id</code></td>\n<td>来自文件的业务对象必须追溯源文件版本</td>\n</tr>\n<tr>\n<td><code>audit_event_id</code></td>\n<td>任一写操作必须写审计</td>\n</tr>\n<tr>\n<td><code>metadata</code></td>\n<td>只放非索引、非查询主路径字段；核心字段必须列化</td>\n</tr>\n</tbody></table>\n<h3>5.19 服务单元与端口职责</h3>\n<table>\n<thead>\n<tr>\n<th>服务</th>\n<th align=\"right\">默认端口</th>\n<th>依赖</th>\n<th>责任</th>\n<th>不允许做的事</th>\n</tr>\n</thead>\n<tbody><tr>\n<td><code>frontend-next</code></td>\n<td align=\"right\">3000</td>\n<td>Gateway</td>\n<td>模块工作台、CDE UI、审批/审计 UI</td>\n<td>直接写数据库</td>\n</tr>\n<tr>\n<td><code>architoken-gateway</code></td>\n<td align=\"right\">8080</td>\n<td>PostgreSQL, Valkey, ObjectStore, EventStore</td>\n<td>REST/SSE/gRPC/MCP、鉴权、审计、模块 API</td>\n<td>直接调用外部模型</td>\n</tr>\n<tr>\n<td><code>harness-core</code></td>\n<td align=\"right\">library/internal</td>\n<td>PostgreSQL, Registry</td>\n<td>Router、Schema、事务、数据平面</td>\n<td>绕过 Gateway 暴露业务写接口</td>\n</tr>\n<tr>\n<td><code>agent-orchestrator</code></td>\n<td align=\"right\">8090</td>\n<td>Gateway, ModelRouter, EventStore</td>\n<td>Planner/Generator/Evaluator 编排</td>\n<td>直接发布业务结果</td>\n</tr>\n<tr>\n<td><code>model-router</code></td>\n<td align=\"right\">8091</td>\n<td>推理引擎、外部模型 adapter</td>\n<td>模型选择、成本、限流、审计</td>\n<td>被业务模块绕过</td>\n</tr>\n<tr>\n<td><code>tool-router</code></td>\n<td align=\"right\">8092</td>\n<td>Worker registry, 权限策略</td>\n<td>工具授权、参数校验、调用审计</td>\n<td>执行未注册工具</td>\n</tr>\n<tr>\n<td><code>file-worker</code></td>\n<td align=\"right\">queue</td>\n<td>ObjectStore, PostgreSQL</td>\n<td>文件解析、缩略图、checksum、manifest</td>\n<td>覆盖源文件</td>\n</tr>\n<tr>\n<td><code>cad-bim-worker</code></td>\n<td align=\"right\">queue/sidecar</td>\n<td>ObjectStore, GPU/CPU, CAD adapters</td>\n<td>DWG/DXF/IFC/STEP/SKP/3DM/RVT 解析和派生</td>\n<td>用截图冒充解析成功</td>\n</tr>\n<tr>\n<td><code>component-bom-worker</code></td>\n<td align=\"right\">queue</td>\n<td>PostgreSQL, ObjectStore</td>\n<td>SJG157、命名规则、BOM 导入、校验、重量</td>\n<td>直接批准 BOM</td>\n</tr>\n<tr>\n<td><code>office-worker</code></td>\n<td align=\"right\">9980</td>\n<td>Collabora/WOPI, ObjectStore</td>\n<td>Office 原生编辑和保存回写</td>\n<td>绕过 CDE 版本</td>\n</tr>\n<tr>\n<td><code>pdf-worker</code></td>\n<td align=\"right\">8093</td>\n<td>Stirling-PDF, OCR</td>\n<td>PDF 处理、OCR、版面抽取</td>\n<td>修改源 PDF 不留版本</td>\n</tr>\n<tr>\n<td><code>database-manager</code></td>\n<td align=\"right\">8094</td>\n<td>PostgreSQL, Valkey, ObjectStore</td>\n<td>运行态巡检、Schema diff、备份状态</td>\n<td>暴露无权限 SQL 控制台</td>\n</tr>\n</tbody></table>\n<h3>5.20 Worker 队列与事件</h3>\n<table>\n<thead>\n<tr>\n<th>队列</th>\n<th>输入事件</th>\n<th>Worker</th>\n<th>输出事件</th>\n<th>重试</th>\n</tr>\n</thead>\n<tbody><tr>\n<td><code>file.parse</code></td>\n<td><code>cde.file.uploaded</code></td>\n<td><code>file-worker</code></td>\n<td><code>cde.file.parsed</code> / <code>cde.file.parse_failed</code></td>\n<td>3 次,指数退避</td>\n</tr>\n<tr>\n<td><code>cad-bim.parse</code></td>\n<td><code>design.file.parse_requested</code></td>\n<td><code>cad-bim-worker</code></td>\n<td><code>design.file.parsed</code> / <code>design.file.parse_failed</code></td>\n<td>2 次,保留失败证据</td>\n</tr>\n<tr>\n<td><code>bom.import</code></td>\n<td><code>component_bom.import.requested</code></td>\n<td><code>component-bom-worker</code></td>\n<td><code>component_bom.import.completed</code></td>\n<td>3 次,按文件 hash 幂等</td>\n</tr>\n<tr>\n<td><code>bom.validate</code></td>\n<td><code>component_bom.validation.requested</code></td>\n<td><code>component-bom-worker</code></td>\n<td><code>component_bom.validation.completed</code></td>\n<td>3 次</td>\n</tr>\n<tr>\n<td><code>costing.generate</code></td>\n<td><code>costing.boq.generate_requested</code></td>\n<td><code>costing-worker</code></td>\n<td><code>costing.boq.generated</code></td>\n<td>2 次</td>\n</tr>\n<tr>\n<td><code>production.generate</code></td>\n<td><code>production.work_order.generate_requested</code></td>\n<td><code>production-worker</code></td>\n<td><code>production.work_order.created</code></td>\n<td>2 次</td>\n</tr>\n<tr>\n<td><code>archive.pack</code></td>\n<td><code>archive.package.collect_requested</code></td>\n<td><code>archive-worker</code></td>\n<td><code>archive.package.collected</code></td>\n<td>3 次</td>\n</tr>\n<tr>\n<td><code>ai.agent</code></td>\n<td><code>ai.agent_run.requested</code></td>\n<td><code>agent-orchestrator</code></td>\n<td><code>ai.agent_run.completed</code></td>\n<td>按工具策略</td>\n</tr>\n<tr>\n<td><code>search.index</code></td>\n<td><code>cde.file.parsed</code> / <code>standard.rule_set.published</code></td>\n<td><code>index-worker</code></td>\n<td><code>search.index.updated</code></td>\n<td>可重建</td>\n</tr>\n<tr>\n<td><code>twin.sync</code></td>\n<td><code>construction.acceptance.approved</code></td>\n<td><code>twin-worker</code></td>\n<td><code>twin.model.synced</code></td>\n<td>2 次</td>\n</tr>\n</tbody></table>\n<h3>5.21 API 响应统一结构</h3>\n<pre><code class=\"language-json\">{\n  &quot;request_id&quot;: &quot;uuid&quot;,\n  &quot;tenant_id&quot;: &quot;uuid&quot;,\n  &quot;module_id&quot;: &quot;detailed_design&quot;,\n  &quot;transaction_id&quot;: &quot;uuid&quot;,\n  &quot;status&quot;: &quot;schema_validated&quot;,\n  &quot;data&quot;: {},\n  &quot;warnings&quot;: [],\n  &quot;errors&quot;: [],\n  &quot;audit_event_id&quot;: &quot;uuid&quot;,\n  &quot;next_actions&quot;: [\n    {&quot;action&quot;: &quot;submit_review&quot;, &quot;enabled&quot;: true}\n  ]\n}\n</code></pre>\n<table>\n<thead>\n<tr>\n<th>字段</th>\n<th>要求</th>\n</tr>\n</thead>\n<tbody><tr>\n<td><code>request_id</code></td>\n<td>每次请求唯一,贯穿日志和 trace</td>\n</tr>\n<tr>\n<td><code>transaction_id</code></td>\n<td>任何业务写操作必须绑定事务</td>\n</tr>\n<tr>\n<td><code>status</code></td>\n<td>返回当前业务状态,不是 HTTP 状态替代品</td>\n</tr>\n<tr>\n<td><code>warnings</code></td>\n<td>可继续但需提示的问题</td>\n</tr>\n<tr>\n<td><code>errors</code></td>\n<td>阻断问题,必须有可修复原因</td>\n</tr>\n<tr>\n<td><code>audit_event_id</code></td>\n<td>写操作必须返回</td>\n</tr>\n<tr>\n<td><code>next_actions</code></td>\n<td>前端按钮状态由后端返回,不得纯前端猜测</td>\n</tr>\n</tbody></table>\n<h3>5.22 RLS 与权限策略</h3>\n<table>\n<thead>\n<tr>\n<th>层</th>\n<th>策略</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>租户隔离</td>\n<td>所有业务表启用 RLS,<code>tenant_id = current_setting(&#39;app.tenant_id&#39;)::uuid</code></td>\n</tr>\n<tr>\n<td>项目权限</td>\n<td>项目对象检查 <code>project_members</code> 或角色绑定</td>\n</tr>\n<tr>\n<td>模块权限</td>\n<td>每个 API 检查 <code>module_id + action</code> 权限</td>\n</tr>\n<tr>\n<td>文件权限</td>\n<td><code>module_files</code> 和 <code>file_versions</code> 走 CDE 权限表</td>\n</tr>\n<tr>\n<td>审批权限</td>\n<td><code>approval_tasks.assignee_role</code> 和 <code>approval_matrices</code> 决定</td>\n</tr>\n<tr>\n<td>Agent 权限</td>\n<td>Agent 使用服务账号,工具调用仍受 ToolPolicy 限制</td>\n</tr>\n<tr>\n<td>管理权限</td>\n<td>设置中心权限变更必须双人审批或至少写高危审计</td>\n</tr>\n</tbody></table>\n<h3>5.23 本地到生产环境依赖矩阵</h3>\n<table>\n<thead>\n<tr>\n<th>能力</th>\n<th>本地开发</th>\n<th>生产最低</th>\n<th>生产增强</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>PostgreSQL</td>\n<td>单容器</td>\n<td>主从/备份/WAL</td>\n<td>高可用集群</td>\n</tr>\n<tr>\n<td>ObjectStore</td>\n<td>S3 兼容单节点</td>\n<td>版本化 bucket</td>\n<td>跨节点副本</td>\n</tr>\n<tr>\n<td>Valkey</td>\n<td>单容器</td>\n<td>持久化/哨兵或托管</td>\n<td>集群</td>\n</tr>\n<tr>\n<td>EventStore</td>\n<td>PostgreSQL outbox</td>\n<td>NATS JetStream</td>\n<td>多副本 JetStream</td>\n</tr>\n<tr>\n<td>VectorStore</td>\n<td>pgvector</td>\n<td>pgvector 或 Qdrant</td>\n<td>Qdrant 集群</td>\n</tr>\n<tr>\n<td>CAD/BIM worker</td>\n<td>CPU fallback</td>\n<td>CPU + 可用 GPU</td>\n<td>GPU 节点池</td>\n</tr>\n<tr>\n<td>AI 推理</td>\n<td>Ollama/外部 adapter</td>\n<td>ModelRouter + 至少 1 个运行时</td>\n<td>vLLM/SGLang/TensorRT-LLM 多路</td>\n</tr>\n<tr>\n<td>Office</td>\n<td>可选</td>\n<td>Collabora/WOPI sidecar</td>\n<td>独立 Office 节点</td>\n</tr>\n<tr>\n<td>PDF/OCR</td>\n<td>可选</td>\n<td>PDF worker</td>\n<td>OCR/GPU 加速</td>\n</tr>\n<tr>\n<td>观测</td>\n<td>日志</td>\n<td>OpenTelemetry + metrics</td>\n<td>trace、审计流、告警</td>\n</tr>\n</tbody></table>\n<h3>5.24 最小可运行开发验收</h3>\n<table>\n<thead>\n<tr>\n<th>步骤</th>\n<th>验收命令 / 页面</th>\n<th>通过标准</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>数据库</td>\n<td>migration up</td>\n<td>所有 schema 建表成功</td>\n</tr>\n<tr>\n<td>后端</td>\n<td><code>/readyz</code>, <code>/v1/modules</code></td>\n<td>返回 16 模块</td>\n</tr>\n<tr>\n<td>前端</td>\n<td><code>/app/modules</code></td>\n<td>左侧 16 模块可切换</td>\n</tr>\n<tr>\n<td>文件</td>\n<td>上传一个 XLSX/PDF/IFC</td>\n<td>生成 <code>module_files</code> 和 <code>file_versions</code></td>\n</tr>\n<tr>\n<td>审批</td>\n<td>创建一个交付物并提交审批</td>\n<td><code>approval_tasks</code> 生成</td>\n</tr>\n<tr>\n<td>Agent</td>\n<td>运行一个受控 Agent</td>\n<td>生成 <code>agent_runs</code> 和 <code>agent_tool_calls</code></td>\n</tr>\n<tr>\n<td>BOM</td>\n<td>导入三个 Excel fixture</td>\n<td>SJG157、命名规则、BOM 行项入库</td>\n</tr>\n<tr>\n<td>下游</td>\n<td>发布 BOM 后生成 BOQ 草稿</td>\n<td><code>boq_items.source_bom_line_id</code> 非空</td>\n</tr>\n<tr>\n<td>审计</td>\n<td>任意写操作</td>\n<td><code>audit_events</code> 有记录</td>\n</tr>\n<tr>\n<td>归档</td>\n<td>生成归档包</td>\n<td>源文件、发布文件、审批、审计完整</td>\n</tr>\n</tbody></table>\n<h3>5.25 2026-06 硬件选型、网络、安全与预算</h3>\n<p>本节只覆盖 ArchIToken 一期落地所需的服务器、NAS、网络、安全、UPS 和备份。研发、设计人员已经有日常台式机,本轮不采购开发/设计整机；Threadripper 9970X 和 Threadripper PRO 9975WX 只作为后续开发工作站、BIM/GPU worker 或本地推理节点的采购口径,不挤占一期 40-50 万服务器预算。</p>\n<h4>5.25.1 采购边界</h4>\n<table>\n<thead>\n<tr>\n<th>项目</th>\n<th align=\"right\">一期是否采购</th>\n<th>原因</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>Intel Xeon 676X 服务器</td>\n<td align=\"right\">是</td>\n<td>用于生产服务器、NAS/ZFS、CI/K8s、数据库、对象存储、日志审计。需要 ECC RDIMM、BMC/IPMI、双电源、机架运维。</td>\n</tr>\n<tr>\n<td>AMD Threadripper 9970X 工作站</td>\n<td align=\"right\">否</td>\n<td>适合个人开发/编译工作站,不适合作为 NAS、数据库或生产服务主机。现有开发电脑已能承担日常开发。</td>\n</tr>\n<tr>\n<td>AMD Threadripper PRO 9975WX 工作站/服务器</td>\n<td align=\"right\">否,二期评估</td>\n<td>适合设计/BIM/GPU worker,但一期没有本地 GPU worker 预算。需要等 BIM 派生、AI 批处理、本地推理负载稳定后采购。</td>\n</tr>\n<tr>\n<td>GPU worker 服务器</td>\n<td align=\"right\">否,二期评估</td>\n<td>一期使用云端 GPU、外部模型或任务排队。本地 RTX PRO Blackwell/A 系列 GPU 节点会把预算拉出 40-50 万。</td>\n</tr>\n<tr>\n<td>NAS/ZFS 存储服务器</td>\n<td align=\"right\">是</td>\n<td>CDE 文件、BOM 源 Excel、IFC/DWG/PDF、归档包、对象存储、备份快照必须有企业盘和 ZFS。</td>\n</tr>\n<tr>\n<td>JumpServer 堡垒机</td>\n<td align=\"right\">是,但不单买硬件</td>\n<td>使用开源 JumpServer,部署在 <code>srv-01</code> 的 VM/容器中；会话录像、命令审计、文件传输审计落 NAS。</td>\n</tr>\n<tr>\n<td>等保基础安全</td>\n<td align=\"right\">是</td>\n<td>防火墙、VPN/MFA、VLAN、日志审计、堡垒机、备份、最小权限、EDR/主机加固必须纳入一期。</td>\n</tr>\n</tbody></table>\n<h4>5.25.2 CPU 与平台分工</h4>\n<table>\n<thead>\n<tr>\n<th>CPU/平台</th>\n<th>采购角色</th>\n<th align=\"right\">是否进入一期</th>\n<th>关键判断</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>Intel Xeon 676X</td>\n<td>生产服务器、NAS/ZFS、CI/K8s、数据库、对象存储主机</td>\n<td align=\"right\">是</td>\n<td>Intel 官方规格为 32 P-core / 64 线程、144MB Cache、2.80GHz 基础频率、4.90GHz 最大睿频、275W 基础功耗、330W 最大睿频功耗、8 通道 DDR5/MRDIMM、128 条 PCIe 5.0。适合长期运行和大内存 I/O 平台。</td>\n</tr>\n<tr>\n<td>AMD Threadripper 9970X</td>\n<td>开发编译工作站、个人高性能桌面</td>\n<td align=\"right\">否</td>\n<td>不作为生产服务器基线。没有服务器级 BMC/双电源/机架生命周期优势；现有开发桌面够用。</td>\n</tr>\n<tr>\n<td>AMD Threadripper PRO 9975WX</td>\n<td>设计/BIM 派生工作站、GPU worker、点云/渲染/局部推理节点</td>\n<td align=\"right\">二期</td>\n<td>8 通道 RDIMM/ECC 和 WRX90 适合重型工作站,但一期先把数据、流程、安全、存储跑通。</td>\n</tr>\n</tbody></table>\n<p>Intel Xeon 676X 官方规格要点:</p>\n<table>\n<thead>\n<tr>\n<th>项目</th>\n<th>Intel 官方规格</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>产品线</td>\n<td>Intel Xeon 6 processors, formerly Granite Rapids, Workstation</td>\n</tr>\n<tr>\n<td>核心/线程</td>\n<td>32 P-core / 64 threads</td>\n</tr>\n<tr>\n<td>频率</td>\n<td>Base 2.80GHz, Max Turbo 4.90GHz, Turbo Boost 2.0 4.70GHz</td>\n</tr>\n<tr>\n<td>缓存</td>\n<td>144MB</td>\n</tr>\n<tr>\n<td>功耗</td>\n<td>Processor Base Power 275W, Maximum Turbo Power 330W</td>\n</tr>\n<tr>\n<td>内存</td>\n<td>最大 4TB, DDR5-6400 / MRDIMM-8000, 8 通道, ECC</td>\n</tr>\n<tr>\n<td>PCIe</td>\n<td>PCIe 5.0, 128 lanes</td>\ tr>\n<td>Wi-Fi 7 AP</td>\n<td align=\"right\">4 台</td>\n<td align=\"right\">¥1,500</td>\n<td align=\"right\">¥6,000</td>\n<td>办公区、会议室、访客区覆盖。</td>\n</tr>\n<tr>\n<td>在线式 UPS</td>\n<td align=\"right\">1 套</td>\n<td align=\"right\">¥20,000</td>\n<td align=\"right\">¥20,000</td>\n<td>6kVA 起步,支持 15-30 分钟和自动关机。</td>\n</tr>\n<tr>\n<td>32U 机柜/PDU/环境监控</td>\n<td align=\"right\">1 套</td>\n<td align=\"right\">¥8,000</td>\n<td align=\"right\">¥8,000</td>\n<td>机柜、PDU、温湿度、门磁或基础监控。</td>\n</tr>\n<tr>\n<td>光模块/DAC/六类线/理线</td>\n<td align=\"right\">1 批</td>\n<td align=\"right\">¥5,000</td>\n<td align=\"right\">¥5,000</td>\n<td>服务器、交换、防火墙、AP 接入布线。</td>\n</tr>\n<tr>\n<td>小计</td>\n<td align=\"right\">-</td>\n<td align=\"right\">-</td>\n<td align=\"right\"><strong>¥75,000</strong></td>\n<td>一期网络、安全和供电基础。</td>\n</tr>\n</tbody></table>\n<h4>5.25.7 VLAN 与等保基础控制</h4>\n<table>\n<thead>\n<tr>\n<th>VLAN</th>\n<th>用途</th>\n<th>访问控制</th>\n</tr>\n</thead>\n<tbody><tr>\n<td><code>vlan10-mgmt</code></td>\n<td>BMC/IPMI、防火墙、交换机、NAS 管理口</td>\n<td>只允许 JumpServer、管理员 VPN 和审计主机访问。</td>\n</tr>\n<tr>\n<td><code>vlan20-server</code></td>\n<td>Gateway、数据库、Agent、CI/K8s</td>\n<td>只开放服务端口,东西向访问走防火墙或策略组。</td>\n</tr>\n<tr>\n<td><code>vlan30-storage</code></td>\n<td>NAS/ZFS、对象存储、备份链路</td>\n<td>只允许服务器、备份任务和归档任务访问。</td>\n</tr>\n<tr>\n<td><code>vlan40-office</code></td>\n<td>员工办公终端</td>\n<td>只访问工作台、VPN、打印等必要服务。</td>\n</tr>\n<tr>\n<td><code>vlan50-design</code></td>\n<td>设计/BIM 终端</td>\n<td>可访问 CDE、模型文件、BIM worker 队列。</td>\n</tr>\n<tr>\n<td><code>vlan60-guest</code></td>\n<td>访客网络</td>\n<td>只出互联网,不得访问内网。</td>\n</tr>\n<tr>\n<td><code>vlan70-iot</code></td>\n<td>摄像头、门禁、测试设备</td>\n<td>只允许到指定日志/管理服务。</td>\n</tr>\n<tr>\n<td><code>vlan80-security</code></td>\n<td>日志、审计、EDR、备份</td>\n<td>接收日志,不得被业务容器反向写入。</td>\n</tr>\n</tbody></table>\n<p>等保和安全控制落点:</p>\n<table>\n<thead>\n<tr>\n<th>控制项</th>\n<th>一期做法</th>\n<th>进入系统的位置</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>身份鉴别</td>\n<td>VPN + MFA；JumpServer 统一 SSH/RDP/HTTPS 运维入口</td>\n<td><code>settings_center</code>, <code>audit_events</code>, JumpServer 审计库</td>\n</tr>\n<tr>\n<td>访问控制</td>\n<td>RBAC/RLS/项目权限/模块权限/工具权限分层</td>\n<td>Gateway、PostgreSQL RLS、ToolPolicy</td>\n</tr>\n<tr>\n<td>安全审计</td>\n<td>登录、文件、审批、Agent、数据库变更、运维命令全写审计</td>\n<td><code>audit_events</code>, JumpServer, NAS 冷归档</td>\n</tr>\n<tr>\n<td>入侵防范</td>\n<td>防火墙策略、主机加固、EDR、最小端口暴露</td>\n<td>防火墙、服务器基线、K8s NetworkPolicy</td>\n</tr>\n<tr>\n<td>数据备份</td>\n<td>ZFS 快照、数据库每日备份、离线盘轮换</td>\n<td>NAS <code>db-backup</code>, <code>archive-package</code>, offline staging</td>\n</tr>\n<tr>\n<td>防勒索</td>\n<td>NAS 快照只读保留,离线盘不常挂载,办公终端不得直接写归档池</td>\n<td>ZFS dataset 权限和备份流程</td>\n</tr>\n<tr>\n<td>变更管理</td>\n<td>生产变更必须走审批和审计,不能直接 SSH 改容器</td>\n<td><code>approval_tasks</code>, GitOps/部署记录</td>\n</tr>\n</tbody></table>\n<h4>5.25.8 一台设备能否同时做所有服务</h4>\n<table>\n<thead>\n<tr>\n<th>场景</th>\n<th align=\"right\">是否允许</th>\n<th>说明</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>100 用户内测/内部研发</td>\n<td align=\"right\">可以临时合并</td>\n<td>一台 Xeon 676X 可同时跑 NAS/ZFS、数据库、CI、JumpServer 和 Agent,但这是单点故障。</td>\n</tr>\n<tr>\n<td>1000 用户商业试点</td>\n<td align=\"right\">不建议合并</td>\n<td>至少拆成 <code>srv-01</code> 计算/数据库 + <code>srv-02</code> NAS/备份；公网入口要双运营商。</td>\n</tr>\n<tr>\n<td>1 万用户公网生产</td>\n<td align=\"right\">不允许放办公室合并机</td>\n<td>API、对象存储、数据库、队列、CDN/WAF 应进云或托管机房,办公室只做研发、测试、备份和内网 CDE。</td>\n</tr>\n<tr>\n<td>10 万用户平台运营</td>\n<td align=\"right\">不允许</td>\n<td>必须多可用区、多副本、云/IDC K8s、托管数据库或自建高可用集群、WAF/CDN、专线和灾备。</td>\n</tr>\n</tbody></table>\n<h4>5.25.9 容量与 ArchIToken 模块映射</h4>\n<table>\n<thead>\n<tr>\n<th>负载</th>\n<th>一期承载位置</th>\n<th>说明</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>16 模块工作台</td>\n<td><code>srv-01</code></td>\n<td>Next.js/React 前端、Gateway、模块 API、RBAC、审计。</td>\n</tr>\n<tr>\n<td>BOM/BOQ/项目/审批数据库</td>\n<td><code>srv-01</code> PostgreSQL</td>\n<td>热数据放 NVMe,每日备份到 <code>srv-02</code>。</td>\n</tr>\n<tr>\n<td>CDE 文件、IFC、DWG、PDF、Excel、归档包</td>\n<td><code>srv-02</code> NAS/ZFS/ObjectStore</td>\n<td>源文件和版本是真源,不得只放浏览器或单机硬盘。</td>\n</tr>\n<tr>\
