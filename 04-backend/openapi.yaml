                      hasMore: false
        "400": { $ref: "#/components/responses/ValidationError" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
        "500": { $ref: "#/components/responses/InternalServerError" }
    post:
      operationId: createKnowledgeSource
      summary: Register a draft knowledge source
      tags: [knowledge-sources]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateKnowledgeSourceRequest" }
            examples:
              source:
                value:
                  id: standards
                  kind: standard_specification
                  name: GB specification library
                  sourceUrl: https://example.invalid/specs
                  license: enterprise-internal
                  version: "2026.04"
                  vendorId: null
                  productionEnabled: false
                  defaultRoute: disabled
                  commercialPolicy: null
                  capabilities: [standards_rag]
                  requirementsBeforeUse: [source permission review, citation policy review]
                  owner: knowledge
                  refreshPolicy: weekly scheduled task with explicit network access
                  permissionPolicy: tenant_project_scoped
                  auditPolicy: audit every ingest and retrieval
                  indexBinding:
                    vectorIndex: vector:specs
                    fullTextIndex: fts:specs
                    graphIndex: graph:specs
                    objectPrefix: knowledge/specs/
                  citationPolicy:
                    citationRequired: true
                    exposeSourceUrl: true
                    requiredFields: [sourceUrl, version]
      responses:
        "201":
          description: Draft knowledge source registered
          content:
            application/json:
              schema: { $ref: "#/components/schemas/KnowledgeSource" }
        "400": { $ref: "#/components/responses/ValidationError" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
        "500": { $ref: "#/components/responses/InternalServerError" }

