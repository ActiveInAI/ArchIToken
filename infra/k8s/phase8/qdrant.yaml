apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: qdrant
  namespace: architoken-phase8
  labels:
    app.kubernetes.io/name: qdrant
    app.kubernetes.io/component: vector-search
spec:
  serviceName: qdrant-headless
  replicas: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: qdrant
      app.kubernetes.io/component: vector-search
  template:
    metadata:
      labels:
        app.kubernetes.io/name: qdrant
        app.kubernetes.io/component: vector-search
    spec:
      containers:
        - name: qdrant
          image: qdrant/qdrant:v1.13.4
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: QDRANT__CLUSTER__ENABLED
              value: "true"
            - name: QDRANT__CLUSTER__P2P__PORT
              value: "6335"
          command:
            - /bin/sh
            - -ec
            - |
              URI="http://${POD_NAME}.qdrant-headless.${POD_NAMESPACE}.svc.cluster.local:6335"
              if [ "${POD_NAME}" = "qdrant-0" ]; then
                exec ./qdrant --uri "${URI}"
              fi
              exec ./qdrant \
                --bootstrap "http://qdrant-0.qdrant-headless.${POD_NAMESPACE}.svc.cluster.local:6335" \
                --uri "${URI}"
          ports:
            - name: http
              containerPort: 6333
            - name: grpc
              containerPort: 6334
            - name: p2p
              containerPort: 6335
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /livez
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: "1"
              memory: 2Gi
            limits:
              cpu: "4"
              memory: 8Gi
          volumeMounts:
            - name: data
              mountPath: /qdrant/storage
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 100Gi
---
apiVersion: v1
kind: Service
metadata:
  name: qdrant-headless
  namespace: architoken-phase8
  labels:
    app.kubernetes.io/name: qdrant
    app.kubernetes.io/component: vector-search
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  selector:
    app.kubernetes.io/name: qdrant
    app.kubernetes.io/component: vector-search
  ports:
    - name: http
      port: 6333
      targetPort: http
    - name: grpc
      port: 6334
      targetPort: grpc
    - name: p2p
      port: 6335
      targetPort: p2p
---
apiVersion: v1
kind: Service
metadata:
  name: qdrant
  namespace: architoken-phase8
  labels:
    app.kubernetes.io/name: qdrant
    app.kubernetes.io/component: vector-search
spec:
  selector:
    app.kubernetes.io/name: qdrant
    app.kubernetes.io/component: vector-search
  ports:
    - name: http
      port: 6333
      targetPort: http
    - name: grpc
      port: 6334
      targetPort: grpc
