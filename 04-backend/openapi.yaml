        transactionType:
          type: string
          minLength: 1
        actor:
          type: string
        relatedFileIds:
          type: array
          items:
            type: string
            format: uuid
        relatedArtifactIds:
          type: array
          items: { type: string }

    ModuleTransitionRequest:
      type: object
      required: [event]
      properties:
        event:
          $ref: "#/components/schemas/ModuleTransitionEvent"
        actor:
          type: string
        comment:
          type: string

    ApprovalDecisionRequest:
      type: object
      required: [actor]
      properties:
        actor:
          type: string
          minLength: 1
        comment:
          type: string

    AuditEventKind:
      type: string
      enum:
        - file_created
        - file_updated
        - file_moved
        - file_copied
        - file_shared
        - file_trashed
        - file_content_updated
        - transaction_created
        - transaction_transitioned
        - transaction_approved
        - transaction_rejected

    AuditEvent:
      type: object
      required: [id, moduleId, actor, action, targetType, targetId, summary, metadata, createdAt]
      properties:
        id:
          type: string
          format: uuid
        moduleId:
          $ref: "#/components/schemas/ModuleId"
        actor:
          type: string
        action:
          $ref: "#/components/schemas/AuditEventKind"
        targetType:
          type: string
          enum: [file, transaction]
        targetId:
          type: string
        summary:
          type: string
        metadata:
          type: object
          additionalProperties: true
        createdAt:
          type: string
          format: date-time

    AuditEventQuery:
      type: object
      properties:
        module_id:
          $ref: "#/components/schemas/ModuleId"
        target_id:
          type: string
        limit:
          type: integer
          minimum: 1
          maximum: 500
          default: 100

    AuditEventListResponse:
      type: object
      required: [events, total, query]
      properties:
        events:
          type: array
          items: { $ref: "#/components/schemas/AuditEvent" }
        total:
          type: integer
          minimum: 0
        query:
          $ref: "#/components/schemas/AuditEventQuery"

    BusinessPhase:
      deprecated: true
      type: string
      enum:
        - pre_sales
        - concept
        - develop
        - costing
        - fabrication
        - logistics
        - construction
        - acceptance
        - operations

    Verdict:
      type: string
      enum: [approved, revise, rejected]

    Severity:
      type: string
      enum: [info, low, medium, high, critical]

    ChatRequest:
      type: object
      required: [model, messages]
      properties:
        model:
          type: string
          example: claude-4.7-sonnet
        messages:
          type: array
          items:
            type: object
            required: [role, content]
            properties:
              role: { type: string, enum: [system, user, assistant, tool] }
              content: { type: string }
        temperature: { type: number, minimum: 0, maximum: 2, default: 0.2 }
        max_tokens: { type: integer, minimum: 1, maximum: 131072, default: 4096 }
        stream: { type: boolean, default: false }

    ChatResponse:
      type: object
      required: [content, prompt_tokens, completion_tokens, engine, model]
      properties:
        content: { type: string }
        prompt_tokens: { type: integer }
        completion_tokens: { type: integer }
        engine:
          type: string
          enum: [v_llm, sg_lang, tensor_rt_llm, lm_deploy, ollama, llama_cpp]
        model: { type: string }
        latency_ms: { type: integer }

    AgentRequest:
      type: object
      required: [project_id, tenant_id, phase, user_input]
      properties:
        project_id: { type: string, format: uuid }
        tenant_id: { type: string, format: uuid }
        phase: { $ref: "#/components/schemas/BusinessPhase" }
        user_input: { type: string, minLength: 1, maxLength: 32768 }
        attachments:
          type: array
          items: { type: string }
        locale:
          type: string
          enum: [zh-CN, en-US, es-ES, ja-JP, de-DE]
          default: zh-CN

    AgentResponse:
      type: object
      required: [request_id, phase, verdict, revision_count, trace]
      properties:
        request_id: { type: string }
        phase: { $ref: "#/components/schemas/BusinessPhase" }
        verdict: { $ref: "#/components/schemas/Verdict" }
        final_output: {}
        revision_count: { type: integer }
        trace:
          type: array
          items: { type: string }

    Project:
      type: object
      required: [id, tenant_id, name, phase, created_at, updated_at]
      properties:
        id: { type: string, format: uuid }
        tenant_id: { type: string, format: uuid }
        name: { type: string }
        description: { type: [string, "null"] }
        phase: { $ref: "#/components/schemas/BusinessPhase" }
        area_sqm: { type: [number, "null"] }
        location: { type: [string, "null"] }
        budget_cny: { type: [integer, "null"] }
