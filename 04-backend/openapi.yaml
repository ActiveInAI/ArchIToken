openapi: 3.1.0
info:
  title: ArchIToken API
  version: 2.0.0
  summary: AEC Harness for LLMs · Unified API
  description: |
    The **single source of truth** for the ArchIToken platform (formerly
    InsomeOS; Constitution §5).
    All 7 language SDKs are generated from this file via openapi-generator 7.x.

    Versioning: semver; breaking changes bump MAJOR.
  license:
    name: Apache-2.0
    url: https://www.apache.org/licenses/LICENSE-2.0
  contact:
    name: ActiveInAI
    email: ActiveInAI@outlook.com

servers:
  - url: https://api.insomeos.io
    description: Production
  - url: https://staging-api.insomeos.io
    description: Staging
  - url: http://localhost:8080
    description: Local dev

tags:
  - name: harness
    description: Direct inference routing (L5 Gateway)
  - name: modules
    description: ArchIToken active module registry and legacy alias normalization
  - name: module-files
    description: Module-scoped file, metadata, content, sharing, and trash APIs. Content APIs are an in-memory stub and will move behind ObjectStore.
  - name: module-lifecycle
    description: Module transaction state machine and approval APIs. Current implementation is an in-memory preview and will move behind TransactionStore.
  - name: module-audit
    description: Append-only module audit event APIs. Current implementation is an in-memory preview and will move behind EventStore.
  - name: runtime
    description: Runtime capability discovery for frontend and third-party callers.
  - name: generation
    description: AI-native multimodal engineering generation and conversion APIs. Current implementation is an in-memory mock pipeline and will move behind WorkflowRouter, Skill Registry, MCP Tool Registry, and StorageRouter.
  - name: artifacts
    description: Standalone artifact reference, metadata, version, and storage-binding APIs derived from the in-memory generation artifact index.
  - name: assets
    description: Phase 7 universal asset registry and object binding APIs guarded by RuntimeContext, RBAC, tenant/project isolation, and audit.
  - name: conversion-jobs
    description: Phase 7 conversion job contracts for isolated workers. Jobs are audit/RBAC guarded and do not execute proprietary converters in core.
  - name: viewer-commands
    description: Backend-owned auditable viewer command contracts. No proprietary viewer loader is imported or enabled for production routes.
  - name: skills
    description: Registry-first AI skill contracts. Current implementation is an in-memory preview; unapproved skills cannot enter production routes.
  - name: mcp-tools
    description: MCP Tool Registry contracts for permission-scoped, auditable tool metadata. Current implementation does not execute MCP servers.
  - name: knowledge-sources
    description: Knowledge Source Registry contracts for RAG/MCP/WorkflowRouter source metadata and mock ingest jobs.
  - name: agents
    description: Legacy agent orchestration (L4)
  - name: projects
    description: Project CRUD
  - name: bim
    description: IFC / BIM upload and query
  - name: boq
    description: Bill of Quantities
  - name: compliance
    description: Regulation review
  - name: meta
    description: Health, readiness, version

security:
  - bearerAuth: []

paths:
  /healthz:
    get:
      operationId: getHealthz
      summary: Liveness probe
      tags: [meta]
      security: []
      responses:
        "200":
          description: OK
          content:
            text/plain:
              schema: { type: string, example: "ok" }
        "400": { $ref: "#/components/responses/ValidationError" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "500": { $ref: "#/components/responses/InternalServerError" }

  /readyz:
    get:
      operationId: getReadyz
      summary: Readiness probe
      tags: [meta]
      security: []
      responses:
        "200":
          description: Ready
          content:
            text/plain:
              schema: { type: string, example: "ready" }
        "400": { $ref: "#/components/responses/ValidationError" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "500": { $ref: "#/components/responses/InternalServerError" }

  /v1/runtime/capabilities:
    parameters:
      - { $ref: "#/components/parameters/TenantIdHeader" }
      - { $ref: "#/components/parameters/ProjectIdHeader" }
      - { $ref: "#/components/parameters/ActorHeader" }
      - { $ref: "#/components/parameters/RolesHeader" }
      - { $ref: "#/components/parameters/RequestIdHeader" }
      - { $ref: "#/components/parameters/CorrelationIdHeader" }
    get:
      operationId: getRuntimeCapabilities
      summary: Discover runtime capabilities
      description: Returns the active local preview capability matrix so frontend and third-party clients do not hardcode generation modes, artifact contracts, registry availability, storage providers, or viewer command kinds.
      tags: [runtime]
      security: []
      responses:
        "200":
          description: Runtime capability matrix
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RuntimeCapabilities" }
              examples:
                inMemoryPreview:
                  value:
                    activeModuleIds: [digital_twin, production_manufacturing]
                    generation:
                      modes: [model_to_lightweight_scene, ifc_to_3dtiles]
                      artifactKinds: [lightweight_scene, property_index, element_identity_map]
                      artifactStatuses: [preview, draft, approved, rejected]
                      geometryFormats: [ifc, glb, gltf, 3dtiles]
                      propertyIndexFormats: [json, sqlite, duckdb, parquet]
                      assetKindsPhase7: [ifc, cad, pdf, office, image, video, audio, point_cloud, panorama, gis_layer, gantt, flow_diagram, model_3d, unknown]
                      conversionOperations: [ifc_ingest, ifc_to_glb, ifc_to_3dtiles, cad_convert, cad_extract_entities, pdf_parse, ocr, office_convert, gis_tile, pointcloud_tile, panorama_ingest, media_transcode, gantt_generate, flow_generate]
                    viewer:
                      adapterHints: [threejs, webgpu, 3dtiles, ifc, vendor_optrapid3d]
                      commandKinds: [load_artifact, set_color, snapshot, dispose]
                      candidateOnlyAdapterHints: [vendor_optrapid3d]
                    registry:
                      skills: true
                      mcpTools: true
                      knowledgeSources: true
                    storage:
                      providers: [memory, seaweedfs_s3_boundary]
                      persistsRealBytes: false
                      productionReady: false
                      s3ObjectBindings: true
                    storeCapabilities:
                      objectStore: true
                      transactionStore: true
                      eventStore: true
                      registryStore: true
                      artifactStore: true
                      viewerCommandStore: true
                      knowledgeSourceStore: true
                      inMemoryOnly: true
                      inMemoryFallbackAllowed: true
                      postgres: false
                      seaOrmMigrations: true
                      seaweedfsS3: true
                      deterministicPagination: true
                    localImplementationMode: in_memory_preview
                    productionCaveats:
                      - No real commercial model APIs are connected.
        "400": { $ref: "#/components/responses/ValidationError" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "500": { $ref: "#/components/responses/InternalServerError" }

  /v1/runtime/executions:
    parameters:
      - { $ref: "#/components/parameters/TenantIdHeader" }
      - { $ref: "#/components/parameters/ProjectIdHeader" }
      - { $ref: "#/components/parameters/ActorHeader" }
      - { $ref: "#/components/parameters/RolesHeader" }
      - { $ref: "#/components/parameters/RequestIdHeader" }
      - { $ref: "#/components/parameters/CorrelationIdHeader" }
    get:
      operationId: listRuntimeExecutions
      summary: List runtime executions
      description: Lists tenant/project scoped AI, conversion, and viewer runtime execution records.
      tags: [runtime]
      parameters:
        - { $ref: "#/components/parameters/RuntimeExecutionKindQuery" }
        - { $ref: "#/components/parameters/RuntimeExecutionStatusQuery" }
        - { $ref: "#/components/parameters/LimitParam" }
        - { $ref: "#/components/parameters/CursorParam" }
      responses:
        "200":
          description: Runtime execution page
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RuntimeExecutionListResponse" }
        "400": { $ref: "#/components/responses/ValidationError" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "500": { $ref: "#/components/responses/InternalServerError" }
    post:
      operationId: createAiRuntimeDraft
      summary: Create an approval-gated AI runtime draft
      description: Creates a draft-only AI runtime execution. AI must produce query/action plans and draft viewer commands; direct asset mutation is rejected.
      tags: [runtime]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateAiRuntimeDraftRequest" }
            examples:
              sectionPlaneDraft:
                value:
                  provider: mock-ai-provider
                  prompt: Find walls and draft a section plane.
                  queryPlan:
                    objective: inspect model context
                    retrievalStrategy: tenant_project_assets
                    assetFilters:
                      kind: ifc
                  actionPlan:
                    summary: Draft viewer commands only.
                    requiresApproval: true
                    actions:
                      - actionType: viewer_command
                        targetAssetId: null
                        viewerCommand: section_plane
                        arguments:
                          normal: [0, 0, 1]
                        mutatesAssets: false
                  draftViewerCommands:
                    - command: section_plane
                      artifactId: null
                      elementIds: [architoken:wall:001]
                      arguments:
                        offset: 1.2
                  actor: phase7.engineer
      responses:
        "201":
          description: AI runtime draft created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RuntimeExecutionRecord" }
        "400": { $ref: "#/components/responses/ValidationError" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "500": { $ref: "#/components/responses/InternalServerError" }

  /v1/runtime/executions/{execution_id}:
    parameters:
      - { $ref: "#/components/parameters/RuntimeExecutionIdParam" }
      - { $ref: "#/components/parameters/TenantIdHeader" }
      - { $ref: "#/components/parameters/ProjectIdHeader" }
      - { $ref: "#/components/parameters/ActorHeader" }
      - { $ref: "#/components/parameters/RolesHeader" }
      - { $ref: "#/components/parameters/RequestIdHeader" }
      - { $ref: "#/components/parameters/CorrelationIdHeader" }
    get:
      operationId: getRuntimeExecution
      summary: Get one runtime execution
      tags: [runtime]
      responses:
        "200":
          description: Runtime execution
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RuntimeExecutionRecord" }
        "400": { $ref: "#/components/responses/ValidationError" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "500": { $ref: "#/components/responses/InternalServerError" }

  /v1/runtime/executions/{execution_id}/trace:
    parameters:
      - { $ref: "#/components/parameters/RuntimeExecutionIdParam" }
      - { $ref: "#/components/parameters/TenantIdHeader" }
      - { $ref: "#/components/parameters/ProjectIdHeader" }
      - { $ref: "#/components/parameters/ActorHeader" }
      - { $ref: "#/components/parameters/RolesHeader" }
      - { $ref: "#/components/parameters/RequestIdHeader" }
      - { $ref: "#/components/parameters/CorrelationIdHeader" }
    get:
      operationId: getRuntimeExecutionTrace
      summary: Get runtime execution trace
      tags: [runtime]
      responses:
        "200":
          description: Runtime execution trace
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RuntimeExecutionTraceResponse" }
        "400": { $ref: "#/components/responses/ValidationError" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "500": { $ref: "#/components/responses/InternalServerError" }

  /v1/runtime/executions/{execution_id}/approve:
    parameters:
      - { $ref: "#/components/parameters/RuntimeExecutionIdParam" }
      - { $ref: "#/components/parameters/TenantIdHeader" }
      - { $ref: "#/components/parameters/ProjectIdHeader" }
      - { $ref: "#/components/parameters/ActorHeader" }
      - { $ref: "#/components/parameters/RolesHeader" }
      - { $ref: "#/components/parameters/RequestIdHeader" }
      - { $ref: "#/components/parameters/CorrelationIdHeader" }
    post:
      operationId: approveRuntimeExecution
      summary: Approve or reject an AI runtime draft
      description: Approval queues a draft for execution. Rejection cancels it. Neither path directly mutates assets.
      tags: [runtime]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RuntimeExecutionApprovalRequest" }
            examples:
              approve:
                value:
                  actor: phase7.reviewer
                  approved: true
                  comment: queued for controlled execution
      responses:
        "200":
          description: Runtime execution after approval decision
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RuntimeExecutionRecord" }
        "400": { $ref: "#/components/responses/ValidationError" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "500": { $ref: "#/components/responses/InternalServerError" }

  /v1/harness/invoke:
    post:
      operationId: invokeHarness
      summary: Inference via the Harness (§1 · all model calls go here)
      tags: [harness]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ChatRequest" }
      responses:
        "200":
          description: Completion produced
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ChatResponse" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "422": { $ref: "#/components/responses/ValidationError" }
        "504": { $ref: "#/components/responses/SlaViolation" }

  /v1/modules:
    get:
      operationId: listModules
      summary: List active ArchIToken modules
      tags: [modules]
      responses:
        "200":
          description: Active module list in lifecycle order
          content:
            application/json:
              schema:
                type: object
                required: [modules, total]
                properties:
                  modules:
                    type: array
                    items: { $ref: "#/components/schemas/ModuleSpec" }
                  total:
                    type: integer
                    minimum: 0
        "401": { $ref: "#/components/responses/Unauthorized" }

  /v1/modules/{module_id}:
    parameters:
      - { $ref: "#/components/parameters/ModuleIdParam" }
    get:
      operationId: getModule
      summary: Get one active module or legacy alias
      tags: [modules]
      responses:
        "200":
          description: Module specification
          content:
            application/json:
                schema: { $ref: "#/components/schemas/ModuleSpec" }
        "404": { $ref: "#/components/responses/NotFound" }

  /v1/modules/{module_id}/files:
    parameters:
      - { $ref: "#/components/parameters/ModuleIdParam" }
    get:
      operationId: listModuleFiles
      summary: List module files and folders
      tags: [module-files]
      parameters:
        - { $ref: "#/components/parameters/FileParentIdQuery" }
        - { $ref: "#/components/parameters/FileStatusQuery" }
        - { $ref: "#/components/parameters/FileKindQuery" }
        - { $ref: "#/components/parameters/LimitParam" }
        - { $ref: "#/components/parameters/CursorParam" }
      responses:
        "200":
          description: Module-scoped file tree nodes
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ModuleFileListResponse" }
              examples:
                files:
                  value:
                    files:
                      - id: 018f1d1d-7a7e-7f2b-a9d9-4c0f4c2f0001
                        moduleId: production_manufacturing
                        parentId: null
                        name: CNC package
                        kind: folder
                        status: active
                        metadata:
                          sizeBytes: 0
                          mimeType: null
                          checksum: null
                          version: 1
                          owner: planner
                          tags: [factory]
                          createdAt: "2026-04-30T00:00:00Z"
                          updatedAt: "2026-04-30T00:00:00Z"
                    total: 1
                    pageInfo:
                      limit: 50
                      nextCursor: null
                      hasMore: false
        "400": { $ref: "#/components/responses/ValidationError" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
        "500": { $ref: "#/components/responses/InternalServerError" }
    post:
      operationId: createModuleFile
      summary: Create a module file or folder metadata node
      tags: [module-files]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateModuleFileRequest" }
            examples:
              file:
                value:
                  name: cnc-nesting.nc
                  kind: file
                  parentId: null
                  mimeType: text/plain
                  sizeBytes: 128
                  owner: planner
                  tags: [cnc, release]
                  content: "G01 X0 Y0"
      responses:
        "201":
          description: File or folder created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ModuleFileNode" }
              examples:
                created:
                  value:
                    id: 018f1d1d-7a7e-7f2b-a9d9-4c0f4c2f0002
                    moduleId: production_manufacturing
                    parentId: null
                    name: cnc-nesting.nc
                    kind: file
                    status: active
                    metadata:
                      sizeBytes: 128
                      mimeType: text/plain
                      checksum: null
                      version: 1
                      owner: planner
                      tags: [cnc, release]
                      createdAt: "2026-04-30T00:00:00Z"
                      updatedAt: "2026-04-30T00:00:00Z"
        "400": { $ref: "#/components/responses/ValidationError" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
        "500": { $ref: "#/components/responses/InternalServerError" }

  /v1/files/{file_id}:
    parameters:
      - { $ref: "#/components/parameters/FileIdParam" }
    get:
      operationId: getModuleFile
      summary: Get a module file or folder node
      tags: [module-files]
      responses:
        "200":
          description: File or folder node
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ModuleFileNode" }
              examples:
                file:
                  value:
                    id: 018f1d1d-7a7e-7f2b-a9d9-4c0f4c2f0002
                    moduleId: production_manufacturing
                    parentId: null
                    name: cnc-nesting.nc
                    kind: file
                    status: active
                    metadata:
                      sizeBytes: 128
                      mimeType: text/plain
                      checksum: null
                      version: 1
                      owner: planner
                      tags: [cnc, release]
                      createdAt: "2026-04-30T00:00:00Z"
                      updatedAt: "2026-04-30T00:00:00Z"
        "400": { $ref: "#/components/responses/ValidationError" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
        "500": { $ref: "#/components/responses/InternalServerError" }
    patch:
      operationId: updateModuleFile
      summary: Update module file metadata
      tags: [module-files]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateModuleFileRequest" }
            examples:
              rename:
                value:
                  name: cnc-nesting-v2.nc
                  tags: [cnc, approved]
      responses:
        "200":
          description: File metadata updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ModuleFileNode" }
              examples:
                updated:
                  value:
                    id: 018f1d1d-7a7e-7f2b-a9d9-4c0f4c2f0002
                    moduleId: production_manufacturing
                    parentId: null
                    name: cnc-nesting-v2.nc
                    kind: file
                    status: active
                    metadata:
                      sizeBytes: 128
                      mimeType: text/plain
                      checksum: null
                      version: 2
                      owner: planner
                      tags: [cnc, approved]
                      createdAt: "2026-04-30T00:00:00Z"
                      updatedAt: "2026-04-30T00:10:00Z"
        "400": { $ref: "#/components/responses/ValidationError" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
        "500": { $ref: "#/components/responses/InternalServerError" }

  /v1/files/{file_id}/metadata:
    parameters:
      - { $ref: "#/components/parameters/FileIdParam" }
    get:
      operationId: getModuleFileMetadata
      summary: Get module file metadata
      tags: [module-files]
      responses:
        "200":
          description: File metadata
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ModuleFileMetadata" }
              examples:
                metadata:
                  value:
                    sizeBytes: 128
                    mimeType: text/plain
                    checksum: null
                    version: 1
                    owner: planner
                    tags: [cnc, release]
                    createdAt: "2026-04-30T00:00:00Z"
                    updatedAt: "2026-04-30T00:00:00Z"
        "400": { $ref: "#/components/responses/ValidationError" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
        "500": { $ref: "#/components/responses/InternalServerError" }

  /v1/files/{file_id}/content:
    parameters:
      - { $ref: "#/components/parameters/FileIdParam" }
    get:
      operationId: getModuleFileContent
      summary: Get in-memory module file content stub
      description: Preview-only content endpoint. The current gateway keeps small content strings in memory; production bytes will be served through ObjectStore.
      tags: [module-files]
      responses:
        "200":
          description: File content stub
          content:
            application/json:
              schema: { $ref: "#/components/schemas/FileContentResponse" }
              examples:
                content:
                  value:
                    fileId: 018f1d1d-7a7e-7f2b-a9d9-4c0f4c2f0002
                    content: "G01 X0 Y0"
                    contentType: text/plain
                    updatedAt: "2026-04-30T00:00:00Z"
        "400": { $ref: "#/components/responses/ValidationError" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
        "500": { $ref: "#/components/responses/InternalServerError" }
    put:
      operationId: updateModuleFileContent
      summary: Replace in-memory module file content stub
      description: Preview-only content endpoint. The current gateway keeps small content strings in memory; production bytes will be written through ObjectStore.
      tags: [module-files]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateFileContentRequest" }
            examples:
              content:
                value:
                  content: "G01 X0 Y0\nM30"
                  contentType: text/plain
                  actor: planner
      responses:
        "200":
          description: File content updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/FileContentResponse" }
              examples:
                content:
                  value:
                    fileId: 018f1d1d-7a7e-7f2b-a9d9-4c0f4c2f0002
                    content: "G01 X0 Y0\nM30"
                    contentType: text/plain
                    updatedAt: "2026-04-30T00:10:00Z"
        "400": { $ref: "#/components/responses/ValidationError" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
        "500": { $ref: "#/components/responses/InternalServerError" }

  /v1/files/{file_id}/move:
    parameters:
      - { $ref: "#/components/parameters/FileIdParam" }
    post:
      operationId: moveModuleFile
      summary: Move a module file or folder
      tags: [module-files]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/MoveFileRequest" }
            examples:
              moveToRoot:
                value:
                  targetParentId: null
                  actor: planner
      responses:
        "200":
          description: File moved
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ModuleFileNode" }
              examples:
                moved:
                  value:
                    id: 018f1d1d-7a7e-7f2b-a9d9-4c0f4c2f0002
                    moduleId: production_manufacturing
                    parentId: null
                    name: cnc-nesting.nc
                    kind: file
                    status: active
                    metadata:
                      sizeBytes: 128
                      mimeType: text/plain
                      checksum: null
                      version: 2
                      owner: planner
                      tags: [cnc, release]
                      createdAt: "2026-04-30T00:00:00Z"
                      updatedAt: "2026-04-30T00:10:00Z"
        "400": { $ref: "#/components/responses/ValidationError" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
        "500": { $ref: "#/components/responses/InternalServerError" }

  /v1/files/{file_id}/copy:
    parameters:
      - { $ref: "#/components/parameters/FileIdParam" }
