        updated_at: { type: string, format: date-time }

    ProjectCreate:
      type: object
      required: [name]
      properties:
        name: { type: string, minLength: 1, maxLength: 200 }
        description: { type: string, maxLength: 2000 }
        area_sqm: { type: number }
        location: { type: string }
        budget_cny: { type: integer }

    BoqItem:
      type: object
      required: [id, project_id, code, description, unit, quantity, unit_price_cny, total_cny]
      properties:
        id: { type: string, format: uuid }
        project_id: { type: string, format: uuid }
        code: { type: string, pattern: "^[0-9]{9}$" }
        description: { type: string }
        unit: { type: string }
        quantity: { type: number }
        unit_price_cny: { type: number }
        total_cny: { type: number }
        category: { type: string }

    ComplianceFinding:
      type: object
      required: [id, project_id, severity, regulation_code, finding, resolved]
      properties:
        id: { type: string, format: uuid }
