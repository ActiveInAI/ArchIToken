components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Supabase Auth 2.188.1 issued JWT

  parameters:
    Page:
      in: query
      name: page
      schema: { type: integer, minimum: 1, default: 1 }
    PageSize:
      in: query
      name: page_size
      schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
    ProjectId:
      in: path
      name: id
      required: true
      schema: { type: string, format: uuid }
    ModuleIdParam:
      in: path
      name: module_id
      required: true
      description: Active module id or accepted legacy alias.
      schema:
        type: string
        examples:
          - production_manufacturing
          - manufacturing
          - fabrication
    FileIdParam:
      in: path
      name: file_id
      required: true
      description: Module file id.
      schema: { type: string, format: uuid }
    TransactionIdParam:
      in: path
      name: transaction_id
      required: true
      description: Module lifecycle transaction id.
      schema: { type: string, format: uuid }
    GenerationJobIdParam:
      in: path
      name: job_id
      required: true
      description: AIGC generation job id.
      schema: { type: string, format: uuid }
    LimitParam:
      in: query
      name: limit
      required: false
      description: Maximum number of records to return.
      schema: { type: integer, minimum: 1, maximum: 500, default: 100 }
      example: 50
    CursorParam:
      in: query
      name: cursor
      required: false
      description: Opaque pagination cursor. Current preview uses numeric offsets.
      schema: { type: string }
      example: "50"
    TenantIdHeader:
      in: header
      name: X-Tenant-Id
      required: false
      description: Runtime tenant id. Required in production-like profiles; development may use a weak fallback.
      schema: { type: string }
      example: tenant-demo
    ProjectIdHeader:
      in: header
      name: X-Project-Id
      required: false
      description: Runtime project id. Required in production-like profiles; development may use a weak fallback.
      schema: { type: string }
      example: project-demo
    ActorHeader:
      in: header
      name: X-Actor
      required: false
      description: Runtime actor id used for audit payloads.
      schema: { type: string }
      example: engineer@example.com
    RolesHeader:
      in: header
      name: X-Roles
      required: false
      description: Comma-separated preview roles used by the in-memory RBAC guard.
      schema: { type: string }
      example: engineer,reviewer
    RequestIdHeader:
      in: header
      name: X-Request-Id
      required: false
      description: Request id copied into runtime metadata and audit payloads.
      schema: { type: string }
      example: req-20260430-001
    CorrelationIdHeader:
      in: header
      name: X-Correlation-Id
      required: false
      description: Correlation id copied into runtime metadata and audit payloads.
      schema: { type: string }
      example: corr-phase6-demo
    FileParentIdQuery:
      in: query
      name: parentId
      required: false
      description: Optional parent folder id filter.
      schema: { type: string, format: uuid }
    FileStatusQuery:
      in: query
      name: status
      required: false
      description: Optional file status filter.
      schema: { $ref: "#/components/schemas/ModuleFileStatus" }
    FileKindQuery:
      in: query
      name: kind
      required: false
      description: Optional file kind filter.
      schema: { $ref: "#/components/schemas/ModuleFileKind" }
    TransactionModuleIdQuery:
      in: query
      name: module_id
      required: false
      description: Optional active module id or accepted legacy alias.
      schema:
        type: string
        examples: [production_manufacturing, manufacturing, fabrication]
    TransactionStatusQuery:
      in: query
      name: status
      required: false
      description: Optional transaction status filter.
      schema: { $ref: "#/components/schemas/ModuleTransactionStatus" }
    AuditModuleIdQuery:
      in: query
      name: module_id
      required: false
      description: Optional active module id or accepted legacy alias.
      schema:
        type: string
        examples: [production_manufacturing, manufacturing, fabrication]
    AuditTargetTypeQuery:
      in: query
      name: target_type
      required: false
      description: Optional target type filter.
      schema: { type: string, enum: [file, transaction, generation_job, generation_artifact, generation_stage, viewer_command, runtime_execution] }
    AuditTargetIdQuery:
      in: query
      name: target_id
      required: false
      description: Optional target id filter.
      schema: { type: string }
    AuditActorQuery:
      in: query
      name: actor
      required: false
      description: Optional actor filter.
      schema: { type: string }
    GenerationModuleIdQuery:
      in: query
      name: module_id
      required: false
      description: Optional active module id or accepted legacy alias.
      schema:
        type: string
        examples: [production_manufacturing, manufacturing, fabrication]
    GenerationStatusQuery:
      in: query
      name: status
      required: false
      description: Optional generation job status filter.
      schema: { $ref: "#/components/schemas/GenerationJobStatus" }
    GenerationModeQuery:
      in: query
      name: mode
      required: false
      description: Optional generation mode filter.
      schema: { $ref: "#/components/schemas/GenerationMode" }
    ArtifactIdParam:
      in: path
      name: artifact_id
      required: true
      description: Artifact id.
      schema:
        type: string
        format: uuid
    ArtifactModuleIdQuery:
      in: query
      name: module_id
      required: false
      description: Optional active module id or accepted legacy alias.
      schema:
        type: string
        examples: [production_manufacturing, manufacturing, fabrication]
    ArtifactKindQuery:
      in: query
      name: kind
      required: false
      description: Optional artifact kind filter.
      schema: { $ref: "#/components/schemas/ArtifactKind" }
    ArtifactStatusQuery:
      in: query
      name: status
      required: false
      description: Optional artifact status filter.
      schema: { $ref: "#/components/schemas/ArtifactStatus" }
    ArtifactSourceJobIdQuery:
      in: query
      name: source_job_id
      required: false
      description: Optional source generation job id.
      schema:
        type: string
        format: uuid
    AssetIdParam:
      in: path
      name: asset_id
      required: true
      description: Phase 7 asset id.
      schema:
        type: string
        format: uuid
    AssetFileIdParam:
      in: path
      name: file_id
      required: true
      description: Phase 7 asset file id.
      schema:
        type: string
        format: uuid
    AssetKindQuery:
      in: query
      name: kind
      required: false
      description: Optional Phase 7 asset kind filter.
      schema: { $ref: "#/components/schemas/Phase7AssetKind" }
    AssetStatusQuery:
      in: query
      name: status
      required: false
      description: Optional Phase 7 asset status filter.
      schema: { $ref: "#/components/schemas/AssetStatus" }
    ConversionJobIdParam:
      in: path
      name: job_id
      required: true
      description: Phase 7 conversion job id.
      schema:
        type: string
        format: uuid
    ConversionOperationQuery:
      in: query
      name: operation
      required: false
      description: Optional conversion operation filter.
      schema: { $ref: "#/components/schemas/Phase7ConversionOperation" }
    ConversionJobStatusQuery:
      in: query
      name: status
      required: false
      description: Optional conversion job status filter.
      schema: { type: string }
    RuntimeExecutionIdParam:
      in: path
      name: execution_id
      required: true
      description: Runtime execution id.
      schema:
        type: string
        format: uuid
    RuntimeExecutionKindQuery:
      in: query
      name: kind
      required: false
      description: Optional runtime execution kind filter.
      schema: { $ref: "#/components/schemas/RuntimeExecutionKind" }
    RuntimeExecutionStatusQuery:
      in: query
      name: status
      required: false
      description: Optional runtime execution status filter.
      schema: { $ref: "#/components/schemas/RuntimeExecutionStatus" }
    ViewerCommandIdParam:
      in: path
      name: command_id
      required: true
      description: Viewer command id.
      schema:
        type: string
        format: uuid
    ViewerCommandStatusQuery:
      in: query
      name: status
      required: false
      description: Optional viewer command status filter.
      schema: { $ref: "#/components/schemas/ViewerCommandStatus" }
    ViewerCommandArtifactIdQuery:
      in: query
      name: artifact_id
      required: false
      description: Optional artifact id filter.
      schema:
        type: string
        format: uuid
    ViewerAdapterQuery:
      in: query
      name: adapter
      required: false
      description: Optional viewer adapter hint filter.
      schema: { $ref: "#/components/schemas/ViewerAdapterHint" }
    ViewerCommandKindQuery:
      in: query
      name: command
      required: false
      description: Optional viewer command kind filter.
      schema: { $ref: "#/components/schemas/ViewerCommandKind" }
    SkillIdParam:
      in: path
      name: skill_id
      required: true
      description: Stable skill registry id.
      schema: { type: string }
    McpToolIdParam:
      in: path
      name: tool_id
      required: true
      description: Stable MCP tool registry id.
      schema: { type: string }
    KnowledgeSourceIdParam:
      in: path
      name: source_id
      required: true
      description: Stable knowledge source registry id.
      schema: { type: string }
    OwnerQuery:
      in: query
      name: owner
      required: false
      description: Optional owner filter.
      schema: { type: string }
    SkillStatusQuery:
      in: query
      name: status
      required: false
      description: Optional skill status filter.
      schema: { $ref: "#/components/schemas/SkillStatus" }
    McpToolStatusQuery:
      in: query
      name: status
      required: false
      description: Optional MCP tool status filter.
      schema: { $ref: "#/components/schemas/McpToolStatus" }
    KnowledgeSourceKindQuery:
      in: query
      name: kind
      required: false
      description: Optional knowledge source kind filter.
      schema: { $ref: "#/components/schemas/KnowledgeSourceKind" }
    KnowledgeSourceStatusQuery:
      in: query
      name: status
      required: false
      description: Optional knowledge source status filter.
      schema: { $ref: "#/components/schemas/KnowledgeSourceStatus" }

  responses:
    Unauthorized:
      description: Missing or invalid bearer token
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }
    Forbidden:
      description: Permission denied or tenant/project isolation guard rejected the request
      content:
        application/json:
          schema:
            oneOf:
              - $ref: "#/components/schemas/ErrorResponse"
              - $ref: "#/components/schemas/PermissionDecision"
          examples:
            permissionDenied:
              value:
                error: "sandbox denied: {\"allowed\":false,\"permission\":\"generation:create\",\"actor\":\"auditor@example.com\",\"tenantId\":\"tenant-demo\",\"projectId\":\"project-demo\"}"
                code: 403
    ValidationError:
      description: Request failed validation
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }
    Conflict:
      description: Request conflicts with current resource state
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }
    SlaViolation:
      description: SLA budget exceeded (Constitution §8)
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }
    UpstreamError:
      description: Upstream inference engine failed
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }
    NotFound:
      description: Resource does not exist or is not visible to caller
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }
    InternalServerError:
      description: Unexpected internal server error
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }

  schemas:
    ErrorResponse:
      type: object
      required: [error, code]
      properties:
        error: { type: string }
        code: { type: integer }
      example:
        error: "not found: file_id=018f1d1d-7a7e-7f2b-a9d9-4c0f4c2f0001"
        code: 404

    RuntimeRole:
      type: string
      enum: [admin, engineer, reviewer, auditor]

    RuntimePermission:
      type: string
      enum:
        - artifact:read
        - artifact:write
        - asset:read
        - asset:write
        - asset:delete
        - asset:approve
        - conversion:run
        - generation:create
        - generation:run
