          format: uuid
        transactionId:
          type: string
          format: uuid
        approver:
          type: string
        decision:
          $ref: "#/components/schemas/ApprovalDecision"
        comment:
          type: [string, "null"]
        decidedAt:
          type: string
          format: date-time

    ModuleTransaction:
      type: object
      required:
        - id
        - moduleId
        - transactionType
        - status
        - actor
        - createdAt
        - updatedAt
        - relatedFileIds
        - relatedArtifactIds
        - approvals
      properties:
        id:
          type: string
          format: uuid
        moduleId:
          $ref: "#/components/schemas/ModuleId"
        transactionType:
          type: string
          minLength: 1
        status:
          $ref: "#/components/schemas/ModuleTransactionStatus"
        actor:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        relatedFileIds:
          type: array
          items:
            type: string
            format: uuid
        relatedArtifactIds:
          type: array
          items: { type: string }
        approvals:
          type: array
          items: { $ref: "#/components/schemas/ModuleApproval" }

    ModuleTransactionListResponse:
      type: object
      required: [transactions, total]
      properties:
        transactions:
          type: array
          items: { $ref: "#/components/schemas/ModuleTransaction" }
        total:
          type: integer
          minimum: 0

    CreateModuleTransactionRequest:
      type: object
      required: [moduleId, transactionType]
      properties:
        moduleId:
          type: string
