# compose.data.yml - ArchIToken 数据层
# 端口用 5433/6381 避让 OpenCut 的 5432/6379 和历史 insomeos-valkey 的 6380
# License: Apache-2.0
name: architoken-data

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: architoken-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: architoken
      POSTGRES_PASSWORD: architoken_dev_only
      POSTGRES_DB: architoken
      LANG: C.UTF-8
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --locale=C"
    volumes:
      - pg-data:/var/lib/postgresql/data
      - ../../04-backend/migrations:/docker-entrypoint-initdb.d:ro
    ports:
      - "127.0.0.1:5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U architoken -d architoken"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s

  valkey:
    image: valkey/valkey:8-alpine
    container_name: architoken-valkey
    restart: unless-stopped
    command: valkey-server --save 60 1 --loglevel warning --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - valkey-data:/data
    ports:
      - "127.0.0.1:6381:6379"
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  seaweed-master:
    image: chrislusf/seaweedfs:3.85
    container_name: architoken-seaweed-master
    restart: unless-stopped
    profiles: ["split-data"]
    command: ["master", "-ip=seaweed-master", "-mdir=/data"]
    volumes:
      - seaweed-master-data:/data
    ports:
      - "127.0.0.1:9333:9333"

  seaweed-volume:
    image: chrislusf/seaweedfs:3.85
    container_name: architoken-seaweed-volume
    restart: unless-stopped
    profiles: ["split-data"]
    command: ["volume", "-mserver=seaweed-master:9333", "-ip=seaweed-volume", "-dir=/data", "-max=0"]
    volumes:
      - seaweed-volume-data:/data
    ports:
      - "127.0.0.1:8081:8080"
    depends_on:
      - seaweed-master

  seaweed-filer:
    image: chrislusf/seaweedfs:3.85
    container_name: architoken-seaweed-filer
    restart: unless-stopped
    profiles: ["split-data"]
    command: ["filer", "-master=seaweed-master:9333", "-ip=seaweed-filer"]
    volumes:
      - seaweed-filer-data:/data
    ports:
      - "127.0.0.1:8888:8888"
    depends_on:
      - seaweed-master
      - seaweed-volume

  seaweed-s3:
    image: chrislusf/seaweedfs:3.85
    container_name: architoken-seaweed-s3
    restart: unless-stopped
    profiles: ["split-data"]
    command: ["s3", "-filer=seaweed-filer:8888", "-ip.bind=0.0.0.0"]
    ports:
      - "127.0.0.1:8333:8333"
    depends_on:
      - seaweed-filer

  qdrant:
    image: qdrant/qdrant:v1.13.4
    container_name: architoken-qdrant
    restart: unless-stopped
    profiles: ["split-data"]
    volumes:
      - qdrant-data:/qdrant/storage
    ports:
      - "127.0.0.1:6333:6333"
      - "127.0.0.1:6334:6334"
    healthcheck:
      test: ["CMD-SHELL", "bash -ec '</dev/tcp/127.0.0.1/6333'"]
      interval: 5s
      timeout: 3s
      retries: 20

  nats:
    image: nats:2.10-alpine
    container_name: architoken-nats
    restart: unless-stopped
    profiles: ["split-data"]
    command: ["-js", "-sd", "/data", "-m", "8222"]
    volumes:
      - nats-data:/data
    ports:
      - "127.0.0.1:4222:4222"
      - "127.0.0.1:8222:8222"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8222/healthz"]
      interval: 5s
      timeout: 3s
      retries: 20

  clickhouse:
    image: clickhouse/clickhouse-server:25.3-alpine
    container_name: architoken-clickhouse
    restart: unless-stopped
    profiles: ["split-data"]
    environment:
      CLICKHOUSE_DB: architoken
      CLICKHOUSE_USER: architoken
      CLICKHOUSE_PASSWORD: architoken_dev_only
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
    volumes:
      - clickhouse-data:/var/lib/clickhouse
    ports:
      - "127.0.0.1:8123:8123"
      - "127.0.0.1:9000:9000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8123/ping | grep -q Ok"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  pg-data:
  valkey-data:
  seaweed-master-data:
  seaweed-volume-data:
  seaweed-filer-data:
  qdrant-data:
  nats-data:
  clickhouse-data:
