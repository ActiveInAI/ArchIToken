name: Bug report
description: Something is broken
title: "[bug] "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing. Please include the information below so we can reproduce and fix this quickly.

  - type: input
    id: version
    attributes:
      label: ArchIToken version
      description: "Output of `curl http://127.0.0.1:8080/readyz` or the image tag you deployed"
      placeholder: "2.0.0"
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Affected component
      options:
        - Frontend (Next.js)
        - Gateway (Rust / axum)
        - Agent Orchestrator (Python / LangGraph)
        - File parsers
        - Database / RLS
        - Infrastructure (Docker / K8s / Rainbond)
        - SDK
        - Other
    validations:
      required: true

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Minimal steps; include commands if possible.
      placeholder: |
        1. …
        2. …
        3. …
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior

  - type: textarea
    id: logs
    attributes:
      label: Logs / error output
      render: shell

  - type: input
    id: env
    attributes:
      label: Environment
      placeholder: "Ubuntu 24.04, DGX Spark, K8s 1.35.4"
