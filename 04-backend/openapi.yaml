components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Supabase Auth 2.188.1 issued JWT

  parameters:
    Page:
      in: query
      name: page
      schema: { type: integer, minimum: 1, default: 1 }
    PageSize:
      in: query
      name: page_size
      schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
    ProjectId:
      in: path
      name: id
      required: true
      schema: { type: string, format: uuid }
    ModuleIdParam:
      in: path
      name: module_id
      required: true
      description: Active module id or accepted legacy alias.
      schema:
        type: string
        examples:
          - production_manufacturing
          - manufacturing
          - fabrication
    FileIdParam:
      in: path
      name: file_id
      required: true
      description: Module file id.
      schema: { type: string, format: uuid }
    TransactionIdParam:
      in: path
      name: transaction_id
      required: true
      description: Module lifecycle transaction id.
      schema: { type: string, format: uuid }
    GenerationJobIdParam:
      in: path
      name: job_id
      required: true
      description: AIGC generation job id.
      schema: { type: string, format: uuid }
    LimitParam:
      in: query
      name: limit
      required: false
      description: Maximum number of records to return.
      schema: { type: integer, minimum: 1, maximum: 500, default: 100 }
      example: 50
    CursorParam:
      in: query
      name: cursor
      required: false
      description: Opaque pagination cursor. Current preview uses numeric offsets.
      schema: { type: string }
      example: "50"
    FileParentIdQuery:
      in: query
      name: parentId
      required: false
      description: Optional parent folder id filter.
      schema: { type: string, format: uuid }
    FileStatusQuery:
      in: query
      name: status
      required: false
      description: Optional file status filter.
      schema: { $ref: "#/components/schemas/ModuleFileStatus" }
    FileKindQuery:
      in: query
      name: kind
      required: false
      description: Optional file kind filter.
      schema: { $ref: "#/components/schemas/ModuleFileKind" }
    TransactionModuleIdQuery:
      in: query
      name: module_id
      required: false
      description: Optional active module id or accepted legacy alias.
      schema:
        type: string
        examples: [production_manufacturing, manufacturing, fabrication]
    TransactionStatusQuery:
      in: query
      name: status
      required: false
      description: Optional transaction status filter.
      schema: { $ref: "#/components/schemas/ModuleTransactionStatus" }
    AuditModuleIdQuery:
      in: query
      name: module_id
      required: false
      description: Optional active module id or accepted legacy alias.
      schema:
        type: string
        examples: [production_manufacturing, manufacturing, fabrication]
    AuditTargetTypeQuery:
      in: query
      name: target_type
      required: false
      description: Optional target type filter.
      schema: { type: string, enum: [file, transaction, generation_job, generation_artifact, generation_stage] }
    AuditTargetIdQuery:
      in: query
      name: target_id
      required: false
      description: Optional target id filter.
      schema: { type: string }
    AuditActorQuery:
      in: query
      name: actor
      required: false
      description: Optional actor filter.
      schema: { type: string }
    GenerationModuleIdQuery:
      in: query
      name: module_id
      required: false
      description: Optional active module id or accepted legacy alias.
      schema:
        type: string
        examples: [production_manufacturing, manufacturing, fabrication]
    GenerationStatusQuery:
      in: query
      name: status
      required: false
      description: Optional generation job status filter.
      schema: { $ref: "#/components/schemas/GenerationJobStatus" }
    GenerationModeQuery:
      in: query
      name: mode
      required: false
      description: Optional generation mode filter.
      schema: { $ref: "#/components/schemas/GenerationMode" }

  responses:
    Unauthorized:
      description: Missing or invalid bearer token
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }
    ValidationError:
      description: Request failed validation
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }
    Conflict:
      description: Request conflicts with current resource state
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }
    SlaViolation:
      description: SLA budget exceeded (Constitution §8)
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }
    UpstreamError:
      description: Upstream inference engine failed
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }
    NotFound:
      description: Resource does not exist or is not visible to caller
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }
    InternalServerError:
      description: Unexpected internal server error
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }

  schemas:
    ErrorResponse:
      type: object
      required: [error, code]
      properties:
        error: { type: string }
        code: { type: integer }
      example:
        error: "not found: file_id=018f1d1d-7a7e-7f2b-a9d9-4c0f4c2f0001"
        code: 404

    PageInfo:
      type: object
      required: [limit, hasMore]
      properties:
        limit:
          type: integer
          minimum: 1
          maximum: 500
        nextCursor:
          type: [string, "null"]
          description: Opaque cursor for the next page. Current preview uses numeric offsets.
        hasMore:
          type: boolean
      example:
        limit: 50
        nextCursor: "50"
        hasMore: true

    ModuleId:
      type: string
      description: Active ArchIToken module id. Legacy aliases normalize at API boundaries.
      enum:
        - marketing_service
        - concept_design
        - standard_library
        - detailed_design
        - quantity_costing
        - material_logistics
        - production_manufacturing
        - construction_supervision
        - digital_twin
        - digital_archive
        - settings_center

    ModuleStatus:
      type: string
      enum: [active, pilot, planned, foundation]

    ModuleTrack:
      type: string
      enum:
        - customer
        - design
        - governance
        - cost
        - supply
        - factory
        - site
        - twin
        - archive
        - platform

    ModuleAlias:
      type: object
      required: [alias, normalizedModuleId, reason]
      properties:
        alias:
          type: string
          enum: [manufacturing, fabrication]
        normalizedModuleId:
          $ref: "#/components/schemas/ModuleId"
        reason:
          type: string

    ModuleSpec:
      type: object
      required:
        - id
        - order
        - zhName
        - enName
        - track
        - status
        - summary
        - routeHref
        - schemaRef
        - legacyAliases
      properties:
        id:
          $ref: "#/components/schemas/ModuleId"
        order:
          type: integer
          minimum: 1
          maximum: 99
        zhName:
