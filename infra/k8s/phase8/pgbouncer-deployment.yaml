apiVersion: apps/v1
kind: Deployment
metadata:
  name: pgbouncer
  namespace: architoken-phase8
  labels:
    app.kubernetes.io/name: pgbouncer
    app.kubernetes.io/component: database-pool
spec:
  replicas: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: pgbouncer
      app.kubernetes.io/component: database-pool
  template:
    metadata:
      labels:
        app.kubernetes.io/name: pgbouncer
        app.kubernetes.io/component: database-pool
    spec:
      containers:
        - name: pgbouncer
          image: edoburu/pgbouncer:1.24.1-p1
          ports:
            - name: postgres
              containerPort: 5432
          env:
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: architoken-runtime-secrets
                  key: postgres-host
            - name: DB_PORT
              value: "5432"
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: architoken-runtime-secrets
                  key: postgres-user
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: architoken-runtime-secrets
                  key: postgres-password
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: architoken-runtime-secrets
                  key: postgres-db
            - name: POOL_MODE
              value: transaction
            - name: MAX_CLIENT_CONN
              value: "10000"
            - name: DEFAULT_POOL_SIZE
              value: "80"
          readinessProbe:
            tcpSocket:
              port: postgres
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: postgres
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: "250m"
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: pgbouncer
  namespace: architoken-phase8
  labels:
    app.kubernetes.io/name: pgbouncer
    app.kubernetes.io/component: database-pool
spec:
  selector:
    app.kubernetes.io/name: pgbouncer
    app.kubernetes.io/component: database-pool
  ports:
    - name: postgres
      port: 6432
      targetPort: postgres
