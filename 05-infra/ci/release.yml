# .github/workflows/release.yml
# License: Apache-2.0
name: Release

on:
  push:
    tags: ['v*.*.*']

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  docker:
    name: Build & push images
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        component:
          - { name: gateway,  dockerfile: 05-infra/docker/Dockerfile.gateway,  context: . }
          - { name: agent,    dockerfile: 05-infra/docker/Dockerfile.agent,    context: 04-backend/agent-orchestrator }
          - { name: frontend, dockerfile: 05-infra/docker/Dockerfile.frontend, context: 03-frontend }
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: docker/setup-qemu-action@v3.6.0
      - uses: docker/setup-buildx-action@v3.13.0

      - name: Login to GHCR
        uses: docker/login-action@v3.5.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5.8.1
        with:
          images: ghcr.io/${{ github.repository_owner }}/architoken-${{ matrix.component.name }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - name: Build and push
        uses: docker/build-push-action@v6.21.0
        with:
          context: ${{ matrix.component.context }}
          file: ${{ matrix.component.dockerfile }}
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          sbom: true
          provenance: true

  sbom:
    name: Publish SBOM
    runs-on: ubuntu-24.04
    needs: docker
    steps:
      - uses: actions/checkout@v6.0.2
      - name: Generate CycloneDX SBOM
        uses: anchore/sbom-action@v0.22.0
        with:
          format: cyclonedx-json
          output-file: sbom.cdx.json
      - name: Attach to release
        uses: softprops/action-gh-release@v2.4.1
        with: { files: sbom.cdx.json }
