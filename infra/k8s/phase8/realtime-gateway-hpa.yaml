apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: architoken-realtime-gateway
  namespace: architoken-phase8
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: architoken-realtime-gateway
  minReplicas: 4
  maxReplicas: 60
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 70
