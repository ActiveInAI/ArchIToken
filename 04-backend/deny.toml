# 04-backend/deny.toml
# cargo-deny 0.18.5 configuration
# License: Apache-2.0
# Enforces Constitution §3 (100% Apache/MIT/BSD only)

[graph]
all-features = true

[output]
feature-depth = 1

# ============================================================================
# Licenses (§3)
# ============================================================================
[licenses]
version = 2
confidence-threshold = 0.93
allow = [
    "Apache-2.0",
    "MIT",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "MPL-2.0",
    "CC0-1.0",
    "Zlib",
    "0BSD",
    "CDLA-Permissive-2.0",
]
# FORBIDDEN — Constitution §3
# AGPL, GPL, LGPL, SSPL, BUSL, Commons Clause — no entry means deny.
exceptions = []
private = { ignore = true }

[[licenses.clarify]]
crate = "ring"
expression = "ISC AND MIT AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

# ============================================================================
# Banned crates
# ============================================================================
[bans]
multiple-versions = "warn"
wildcards = "deny"           # Constitution §4
highlight = "all"
workspace-default-features = "allow"
external-default-features = "allow"

deny = [
    # Known maintenance-dead / RUSTSEC
    { name = "rustdesk", reason = "AGPL-3.0" },
    { name = "gtk", version = "<0.19", reason = "gtk3-rs unmaintained (RUSTSEC-2024-0411 series)" },
    { name = "openssl-src", reason = "prefer rustls" },
]

# Skip duplicate-version warnings for common transitive crates
skip = [
    { name = "windows-sys" },
    { name = "syn" },
]

# ============================================================================
# Advisories
# ============================================================================
[advisories]
version = 2
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
yanked = "deny"
ignore = [
    # proc-macro-error2 is a build-time proc-macro dependency pulled in transitively
    # by sea-orm (sea-bae → sea-orm-macros) and validator (validator_derive). It is
    # flagged unmaintained, not a security vulnerability, and cannot be removed without
    # upgrading those upstream crates. Revisit when sea-orm/validator drop it.
    "RUSTSEC-2026-0173",
]

# ============================================================================
# Source registries
# ============================================================================
[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
