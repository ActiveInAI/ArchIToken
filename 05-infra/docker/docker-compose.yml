# docker-compose.yml - ArchIToken local development stack
# License: Apache-2.0
# Use: `docker compose up -d` from repo root
services:

  # ===== Data layer =====
  postgres:
    image: pgvector/pgvector:pg16  # baseline 16.13 · upgrade 17.6.0 见 versions.toml
    container_name: architoken-postgres
    environment:
      POSTGRES_USER: architoken
      POSTGRES_PASSWORD: architoken_dev_only
      POSTGRES_DB: architoken
    volumes:
      - pg-data:/var/lib/postgresql/data
      - ../../04-backend/migrations:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U architoken"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks: [backplane]

  valkey:
    image: valkey/valkey:8-alpine  # baseline · v2.0 目标 9.0.3 见 versions.toml
    container_name: architoken-valkey
    command: valkey-server --save 60 1 --loglevel warning
    volumes:
      - valkey-data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [backplane]

  # ===== Observability =====
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.118.0
    container_name: architoken-otel
    command: ["--config=/etc/otel/config.yaml"]
    volumes:
      - ./otel-collector.yaml:/etc/otel/config.yaml:ro
    ports:
      - "4317:4317"  # OTLP gRPC
      - "4318:4318"  # OTLP HTTP
    networks: [backplane]

  prometheus:
    image: prom/prometheus:v3.5.0
    container_name: architoken-prometheus
    volumes:
      - ./prometheus.yaml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    networks: [backplane]

  grafana:
    image: grafana/grafana:12.1.2
    container_name: architoken-grafana
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Viewer"
    ports:
      - "3001:3000"
    depends_on: [prometheus]
    networks: [backplane]

  # ===== Inference engine (dev · Ollama for local) =====
  ollama:
    image: ollama/ollama:0.21.0
    container_name: architoken-ollama
    volumes:
      - ollama-data:/root/.ollama
    ports:
      - "11434:11434"
    networks: [backplane]

  # ===== Rust Gateway =====
  gateway:
    build:
      context: ../../04-backend
      dockerfile: ../05-infra/docker/Dockerfile.gateway
    container_name: architoken-gateway
    environment:
      ARCHITOKEN_PROFILE: development
      ARCHITOKEN_SERVER__HOST: 0.0.0.0
      ARCHITOKEN_SERVER__PORT: 8080
      ARCHITOKEN_DATABASE__URL: postgres://architoken:architoken_dev_only@postgres:5432/architoken
      ARCHITOKEN_CACHE__URL: redis://valkey:6379/0
      ARCHITOKEN_GRAPH__URL: http://graph-sidecar:8088
      ARCHITOKEN_INFERENCE__DEFAULT_ENGINE: ollama
      ARCHITOKEN_OBSERVABILITY__OTLP_ENDPOINT: http://otel-collector:4317
    ports:
      - "8080:8080"
    depends_on:
      postgres: { condition: service_healthy }
      valkey:   { condition: service_healthy }
      graph-sidecar: { condition: service_healthy }
      ollama:   { condition: service_started }
    networks: [backplane]

  # ===== Rust Database Manager =====
  database-manager:
    build:
      context: ../../04-backend
      dockerfile: ../05-infra/docker/Dockerfile.database-manager
    container_name: architoken-database-manager
    environment:
      ARCHITOKEN_DB_MANAGER_ADDR: 0.0.0.0:8751
      ARCHITOKEN_DB_MANAGER_HEALTH_ADDR: 127.0.0.1:8751
      ARCHITOKEN_DB_MANAGER_POSTGRES_URL: postgres://architoken:architoken_dev_only@postgres:5432/architoken
      ARCHITOKEN_DB_MANAGER_VALKEY_URL: redis://valkey:6379/0
      ARCHITOKEN_GRAPH__URL: http://graph-sidecar:8088
    ports:
      - "8751:8751"
    depends_on:
      postgres: { condition: service_healthy }
      valkey:   { condition: service_healthy }
    healthcheck:
      test: ["CMD", "/app/database-manager", "--healthcheck"]
      interval: 30s
      timeout: 3s
      retries: 3
    networks: [backplane]

  # ===== GraphStore HTTP Sidecar =====
  graph-sidecar:
    build:
      context: ../../04-backend
      dockerfile: ../05-infra/docker/Dockerfile.database-manager
    container_name: architoken-graph-sidecar
    entrypoint: ["/app/graph-sidecar"]
    environment:
      ARCHITOKEN_GRAPH_SIDECAR_ADDR: 0.0.0.0:8088
      ARCHITOKEN_GRAPH_SIDECAR_HEALTH_ADDR: 127.0.0.1:8088
      ARCHITOKEN_GRAPH_SIDECAR_POSTGRES_URL: postgres://architoken:architoken_dev_only@postgres:5432/architoken
    ports:
      - "8088:8088"
    depends_on:
      postgres: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "/app/graph-sidecar", "--healthcheck"]
      interval: 30s
      timeout: 3s
      retries: 3
    networks: [backplane]

  # ===== Python Agent Orchestrator =====
  agent:
    build:
      context: ../../04-backend/agent-orchestrator
      dockerfile: ../../05-infra/docker/Dockerfile.agent
    container_name: architoken-agent
    environment:
      ARCHITOKEN_PROFILE: development
      ARCHITOKEN_HOST: 0.0.0.0
      ARCHITOKEN_PORT: 7001
      ARCHITOKEN_GATEWAY_URL: http://gateway:8080
      ARCHITOKEN_OTLP_ENDPOINT: http://otel-collector:4317
    ports:
      - "7001:7001"
    depends_on:
      gateway: { condition: service_started }
    networks: [backplane]

  # ===== Frontend (Next.js) =====
  frontend:
    build:
      context: ../../03-frontend
      dockerfile: ../05-infra/docker/Dockerfile.frontend
    container_name: architoken-frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080
      NEXT_PUBLIC_AGENT_URL: http://localhost:7001
      ARCHITOKEN_DB_MANAGER_BASE_URL: http://database-manager:8751
      PAPERCLIP_DASHBOARD_URL: http://paperclip:3111
      NEXT_PUBLIC_PAPERCLIP_PUBLIC_URL: http://192.168.1.100:3111
      ARCHITOKEN_PUBLIC_BASE_URL: ${ARCHITOKEN_PUBLIC_BASE_URL:-http://192.168.1.100:3000}
      ARCHITOKEN_OFFICE_EDITOR_PROVIDER: ${ARCHITOKEN_OFFICE_EDITOR_PROVIDER:-collabora}
      COLLABORA_ONLINE_URL: ${COLLABORA_ONLINE_URL:-http://192.168.1.100:9980}
      COLLABORA_WOPI_TOKEN_SECRET: ${COLLABORA_WOPI_TOKEN_SECRET:-architoken-dev-collabora-wopi-secret}
      COLLABORA_ACCESS_TOKEN_TTL_SECONDS: ${COLLABORA_ACCESS_TOKEN_TTL_SECONDS:-86400}
      ONLYOFFICE_DOCUMENT_SERVER_URL: ${ONLYOFFICE_DOCUMENT_SERVER_URL:-}
      ONLYOFFICE_JWT_SECRET: ${ONLYOFFICE_JWT_SECRET:-architoken-dev-onlyoffice-secret}
      ARCHITOKEN_OFFICE_EDIT_MAX_BYTES: ${ARCHITOKEN_OFFICE_EDIT_MAX_BYTES:-536870912}
      ARCHITOKEN_CODE_EDITOR_PROVIDER: ${ARCHITOKEN_CODE_EDITOR_PROVIDER:-monaco}
      CODE_SERVER_URL: ${CODE_SERVER_URL:-http://192.168.1.100:9981}
      CODE_SERVER_WORKSPACE_MOUNT: ${CODE_SERVER_WORKSPACE_MOUNT:-/home/coder/project}
      ARCHITOKEN_CODE_SERVER_WORKSPACE_DIR: ${ARCHITOKEN_CODE_SERVER_WORKSPACE_DIR:-/var/lib/architoken/code-workspaces}
      ARCHITOKEN_ENGINEERING_NATIVE_SESSION_DIR: ${ARCHITOKEN_ENGINEERING_NATIVE_SESSION_DIR:-/home/insome/dev/insomeos/03-frontend/runtime/engineering-native-sessions}
      ARCHITOKEN_ENGINEERING_NATIVE_WORKBENCH_PUBLIC_URL: ${ARCHITOKEN_ENGINEERING_NATIVE_WORKBENCH_PUBLIC_URL:-http://192.168.1.100:6090}
      ARCHITOKEN_ENGINEERING_NATIVE_WORKBENCH_API_URL: ${ARCHITOKEN_ENGINEERING_NATIVE_WORKBENCH_API_URL:-http://engineering-native-workbench:6091}
      STIRLING_PDF_URL: ${STIRLING_PDF_URL:-http://stirling-pdf:8080}
      STIRLING_PDF_API_KEY: ${STIRLING_PDF_API_KEY:-architoken-dev-stirling-pdf-key}
      STIRLING_PDF_TOKEN: ${STIRLING_PDF_TOKEN:-architoken-dev-stirling-pdf-key}
      PADDLE_PDX_MODEL_SOURCE: ${PADDLE_PDX_MODEL_SOURCE:-bos}
      PADDLE_PDX_DISABLE_MODEL_SOURCE_CHECK: ${PADDLE_PDX_DISABLE_MODEL_SOURCE_CHECK:-true}
    ports:
      - "3000:3000"
    depends_on: [gateway, database-manager, agent, paperclip]
    volumes:
      - code-server-workspace:/var/lib/architoken/code-workspaces
      - ../../03-frontend/runtime/engineering-native-sessions:/home/insome/dev/insomeos/03-frontend/runtime/engineering-native-sessions
    networks: [backplane]

  # ===== Native Office editor (optional local profile) =====
  collabora-online:
    image: collabora/code:${COLLABORA_ONLINE_IMAGE_TAG:-latest}
    container_name: architoken-collabora-online
    profiles: ["office"]
    environment:
      domain: ${COLLABORA_ALLOWED_HOST_REGEX:-192\\.168\\.1\\.100|localhost|architoken-frontend}
      extra_params: >-
        --o:ssl.enable=false
        --o:ssl.termination=false
        --o:logging.level=warning
    ports:
      - "9980:9980"
    networks: [backplane]

  onlyoffice-documentserver:
    image: onlyoffice/documentserver:${ONLYOFFICE_DOCUMENT_SERVER_IMAGE_TAG:-latest}
    container_name: architoken-onlyoffice-documentserver
    profiles: ["office"]
    environment:
      JWT_ENABLED: "true"
      JWT_SECRET: ${ONLYOFFICE_JWT_SECRET:-architoken-dev-onlyoffice-secret}
      ALLOW_PRIVATE_IP_ADDRESS: "true"
    volumes:
      - onlyoffice-data:/var/www/onlyoffice/Data
    ports:
      - "8082:80"
    networks: [backplane]

  # ===== Code editor sidecar (optional local profile) =====
  code-server:
    image: codercom/code-server:${CODE_SERVER_IMAGE_TAG:-4.121.0}
    container_name: architoken-code-server
    profiles: ["code-editor"]
    environment:
      PASSWORD: ${CODE_SERVER_PASSWORD:-architoken-dev-code-server}
      DOCKER_USER: coder
    command:
      - --auth
      - password
      - --bind-addr
      - 0.0.0.0:8080
      - /home/coder/project
    volumes:
      - code-server-config:/home/coder/.config
      - code-server-workspace:/home/coder/project
    ports:
      - "9981:8080"
    networks: [backplane]

  # ===== Embedded CAD/BIM native workbench (FreeCAD / Blender through noVNC) =====
  engineering-native-workbench:
    build:
      context: ../..
      dockerfile: 05-infra/docker/Dockerfile.engineering-native-workbench
      network: host
      args:
        HTTP_PROXY: ${HTTP_PROXY:-}
        HTTPS_PROXY: ${HTTPS_PROXY:-}
        NO_PROXY: ${NO_PROXY:-localhost,127.0.0.1,192.168.0.0/16}
        http_proxy: ${http_proxy:-}
        https_proxy: ${https_proxy:-}
        no_proxy: ${no_proxy:-localhost,127.0.0.1,192.168.0.0/16}
    container_name: architoken-engineering-native-workbench
    profiles: ["native-workbench"]
    environment:
      DISPLAY: :100
      ARCHITOKEN_ENGINEERING_NATIVE_SESSION_DIR: ${ARCHITOKEN_ENGINEERING_NATIVE_SESSION_DIR:-/home/insome/dev/insomeos/03-frontend/runtime/engineering-native-sessions}
      ARCHITOKEN_ENGINEERING_NATIVE_WORKBENCH_PUBLIC_URL: ${ARCHITOKEN_ENGINEERING_NATIVE_WORKBENCH_PUBLIC_URL:-http://192.168.1.100:6090}
      ARCHITOKEN_ENGINEERING_NATIVE_WORKBENCH_HOST: 0.0.0.0
      ARCHITOKEN_ENGINEERING_NATIVE_WORKBENCH_PORT: 6091
      ARCHITOKEN_ENGINEERING_NATIVE_WORKBENCH_LAUNCH_MODE: display-only
      ARCHITOKEN_ENGINEERING_NATIVE_EXTERNAL_DISPLAY: "1"
    volumes:
      - ../../03-frontend/runtime/engineering-native-sessions:/home/insome/dev/insomeos/03-frontend/runtime/engineering-native-sessions
      - /tmp/.X11-unix:/tmp/.X11-unix
    ports:
      - "6090:6080"
      - "6091:6091"
    networks: [backplane]

  # ===== PDF service adapter (Stirling-PDF) =====
  stirling-pdf:
    image: docker.stirlingpdf.com/stirlingtools/stirling-pdf:${STIRLING_PDF_IMAGE_TAG:-2.11.0}
    container_name: architoken-stirling-pdf
    profiles: ["pdf"]
    environment:
      DISABLE_ADDITIONAL_FEATURES: "false"
      SECURITY_ENABLELOGIN: ${STIRLING_PDF_ENABLE_LOGIN:-false}
      SECURITY_CUSTOMGLOBALAPIKEY: ${STIRLING_PDF_TOKEN:-architoken-dev-stirling-pdf-key}
      SYSTEM_DEFAULTLOCALE: zh-CN
    volumes:
      - stirling-pdf-config:/configs
      - stirling-pdf-data:/usr/share/tessdata
    ports:
      - "8083:8080"
    networks: [backplane]

  # ===== Production Manufacturing Workbench (Paperclip v2026.517.0) =====
  paperclip:
    build:
      context: https://github.com/paperclipai/paperclip.git#3e6610fb938d04638fa578a1fc0d119b434fa2e4
      dockerfile: Dockerfile
    container_name: architoken-paperclip
    image: architoken-paperclip:v2026.517.0
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3111
      SERVE_UI: "true"
      PAPERCLIP_HOME: /paperclip
      PAPERCLIP_INSTANCE_ID: architoken-production-manufacturing
      PAPERCLIP_CONFIG: /paperclip/instances/architoken-production-manufacturing/config.json
      PAPERCLIP_PUBLIC_URL: http://192.168.1.100:3111
      PAPERCLIP_AUTH_PUBLIC_BASE_URL: http://192.168.1.100:3111
      PAPERCLIP_ALLOWED_HOSTNAMES: 192.168.1.100,localhost,127.0.0.1
      BETTER_AUTH_BASE_URL: http://192.168.1.100:3111
      BETTER_AUTH_URL: http://192.168.1.100:3111
      BETTER_AUTH_TRUSTED_ORIGINS: http://192.168.1.100:3000,http://localhost:3000,http://127.0.0.1:3000,http://192.168.1.100:3111,http://localhost:3111,http://127.0.0.1:3111
      PAPERCLIP_DEPLOYMENT_MODE: authenticated
      PAPERCLIP_DEPLOYMENT_EXPOSURE: private
      BETTER_AUTH_SECRET: paperclip-dev-secret
      PAPERCLIP_AGENT_JWT_SECRET: paperclip-dev-secret
    volumes:
      - paperclip-data:/paperclip
    ports:
      - "3111:3111"
    networks: [backplane]

volumes:
  pg-data:
  valkey-data:
  ollama-data:
  paperclip-data:
  onlyoffice-data:
  collabora-data:
  code-server-config:
  code-server-workspace:
  stirling-pdf-config:
  stirling-pdf-data:

networks:
  backplane:
    driver: bridge
