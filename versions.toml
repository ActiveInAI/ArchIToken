# MODEL FORMAT PRIORITY POLICY · 模型格式优先级策略
# ════════════════════════════════════════════════════════════════════════
# AIA 2026-04-23 指令:
#   "优先使用 HuggingFace 上面的 nvfp4 格式模型,同时保留 modelscope 和其他格式"
#
# 理由:
#   DGX Spark = GB10 Blackwell · 原生支持 NVFP4 (4-bit NormalFloat)
#   NVFP4 在 Blackwell Tensor Core 上比 fp8/bf16 快 2-4 倍·显存占用 1/4
#   fp8 次优 · bf16 兜底
#
# 优先级 (HuggingFace 优先·ModelScope 保留):
#   1. nvfp4 (NVIDIA FP4)       ⭐ 首选·GB10 原生
#   2. fp8 (E4M3 / E5M2)         次选·Hopper/Blackwell 硬件加速
#   3. int4 / int8 (GPTQ/AWQ)    CPU / 老卡兜底
#   4. bf16 / fp16               原始精度·仅调优/训练
#   5. fp32                      仅科研
# ════════════════════════════════════════════════════════════════════════

[model_format_policy]
version = "1.0"
author  = "AIA"
date    = "2026-04-23"

[model_format_policy.priority]
tier_1 = "nvfp4"       # GB10 原生·Blackwell Tensor Core 全速
tier_2 = "fp8"         # E4M3 / E5M2·Hopper/Blackwell 加速
tier_3 = "int4"        # GPTQ / AWQ·显存吃紧场景
tier_4 = "int8"        # 老卡兜底
tier_5 = "bf16"        # 训练调优
tier_6 = "fp16"        # 兼容
tier_7 = "fp32"        # 科研

[model_format_policy.registry_priority]
primary   = "huggingface"       # 首选源
secondary = "modelscope"         # 保留·国内镜像 + 独占模型
tertiary  = "ollama"             # 本地 quant
note      = "同一模型若两处都有 NVFP4 版本,优先 HF·但 ModelScope 的中文 SFT 变体保留"

[model_format_policy.nvfp4_locked]
# 已确认 NVFP4 格式的模型 (DGX Spark 本地实装)
models = [
  "nvidia/Gemma-4-31B-IT-NVFP4",
  "Lightricks/LTX-2.3-nvfp4",
]

[model_format_policy.nvfp4_upgrade_candidates]
# 目前是 fp8/bf16·有 NVFP4 版本应优先切换
candidates = [
  # 当前 fp8 → 看 HF 是否有 nvfp4 版
  "Lightricks/LTX-2.3-fp8",   # 已有 nvfp4 版·可删 fp8
  # 以下暂无 nvfp4 版·保持原格式
  "baidu/ERNIE-4.5-VL-28B-A3B-Thinking",
  "Qwen/Qwen3-VL-Embedding-8B",
  "Qwen/Qwen3-VL-Reranker-8B",
  "Qwen/Qwen-Image-Edit-2511",
]

[model_format_policy.fallback_kept]
# 保留非 NVFP4 版本的理由
reasons = [
  "fp8 版本用于非 Blackwell 推理节点兼容",
  "ModelScope 中文 SFT 变体保留·NVFP4 量化损失在中文场景上可能过大",
  "音频 / 嵌入 / 重排等模型尺寸小·量化收益有限",
]

