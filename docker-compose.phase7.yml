name: architoken-phase7

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: architoken
      POSTGRES_USER: architoken
      POSTGRES_PASSWORD: architoken
    ports:
      - "5432:5432"
    volumes:
      - phase7_postgres:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U architoken -d architoken"]
      interval: 10s
      timeout: 5s
      retries: 10

  seaweedfs-master:
    image: chrislusf/seaweedfs:3.85
    command: ["master", "-ip=seaweedfs-master"]
    ports:
      - "9333:9333"
    volumes:
      - phase7_seaweed_master:/data

  seaweedfs-volume:
    image: chrislusf/seaweedfs:3.85
    command:
      ["volume", "-mserver=seaweedfs-master:9333", "-ip=seaweedfs-volume", "-port=8081"]
    depends_on:
      - seaweedfs-master
    ports:
      - "8081:8081"
    volumes:
      - phase7_seaweed_volume:/data

  seaweedfs-filer:
    image: chrislusf/seaweedfs:3.85
    command:
      ["filer", "-master=seaweedfs-master:9333", "-ip=seaweedfs-filer"]
    depends_on:
      - seaweedfs-master
      - seaweedfs-volume
    ports:
      - "8888:8888"
    volumes:
      - phase7_seaweed_filer:/data

  seaweedfs-s3:
    image: chrislusf/seaweedfs:3.85
    command:
      ["s3", "-filer=seaweedfs-filer:8888", "-ip=seaweedfs-s3", "-port=8333"]
    depends_on:
      - seaweedfs-filer
    ports:
      - "8333:8333"

  meilisearch:
    image: getmeili/meilisearch:v1.13
    environment:
      MEILI_ENV: development
      MEILI_MASTER_KEY: architoken-meili-master-key
    ports:
      - "7700:7700"
    volumes:
      - phase7_meili:/meili_data

  temporal:
    image: temporalio/auto-setup:1.25
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB: postgresql
      DB_PORT: 5432
      POSTGRES_USER: architoken
      POSTGRES_PWD: architoken
      POSTGRES_SEEDS: postgres
      DYNAMIC_CONFIG_FILE_PATH: config/dynamicconfig/development-sql.yaml
    ports:
      - "7233:7233"

  temporal-ui:
    image: temporalio/ui:2.34.0
    depends_on:
      - temporal
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_CORS_ORIGINS: http://localhost:3000,http://localhost:5173
    ports:
      - "8088:8080"

volumes:
  phase7_postgres:
  phase7_seaweed_master:
  phase7_seaweed_volume:
  phase7_seaweed_filer:
  phase7_meili:
