apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: valkey
  namespace: insomeos
  labels:
    app: valkey
spec:
  serviceName: valkey
  replicas: 1
  selector:
    matchLabels:
      app: valkey
  template:
    metadata:
      labels:
        app: valkey
    spec:
      securityContext:
        runAsUser: 999
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      imagePullSecrets:
        - name: rbd-hub-pull
      containers:
        - name: valkey
          image: goodrain.me/pandora/valkey:8-alpine
          imagePullPolicy: IfNotPresent
          command:
            - valkey-server
            - --save
            - "60"
            - "1"
            - --loglevel
            - warning
            - --maxmemory
            - "512mb"
            - --maxmemory-policy
            - allkeys-lru
            - --dir
            - /data
          ports:
            - containerPort: 6379
              name: valkey
          securityContext:
            allowPrivilegeEscalation: false
            privileged: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 999
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
          readinessProbe:
            exec:
              command: ["valkey-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            exec:
              command: ["valkey-cli", "ping"]
            initialDelaySeconds: 15
            periodSeconds: 15
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: local-path
        resources:
          requests:
            storage: 8Gi
---
apiVersion: v1
kind: Service
metadata:
  name: valkey
  namespace: insomeos
  labels:
    app: valkey
spec:
  clusterIP: None
  ports:
    - name: valkey
      port: 6379
      targetPort: 6379
  selector:
    app: valkey
