# .github/workflows/release.yml
# License: Apache-2.0
name: Release

on:
  push:
    tags: ['v*.*.*']

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  p0-production-gates:
    name: P0 production gates
    runs-on: ubuntu-24.04
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: architoken
          POSTGRES_PASSWORD: architoken_dev_only
          POSTGRES_DB: architoken
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U architoken -d architoken"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgres://architoken:architoken_dev_only@127.0.0.1:5433/architoken
      ARCHITOKEN_P0_APPLY_BASE_MIGRATIONS: "1"
      ARCHITOKEN_P0_INCLUDE_WORKERS: "1"
      ARCHITOKEN_P0_INCLUDE_BOM_DB_BRIDGE: "0"
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/setup-python@v6.2.0
        with: { python-version: "3.12" }

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - run: pip install uv==0.5.14

      - name: P0 smoke gates
        run: 04-backend/scripts/smoke-p0-production-gates.sh

  docker:
    name: Build & push images
    runs-on: ubuntu-24.04
    needs: p0-production-gates
    strategy:
      matrix:
        component:
          - { name: gateway,  dockerfile: 05-infra/docker/Dockerfile.gateway,  context: . }
          - { name: agent,    dockerfile: 05-infra/docker/Dockerfile.agent,    context: 04-backend/agent-orchestrator }
          - { name: frontend, dockerfile: 05-infra/docker/Dockerfile.frontend, context: 03-frontend }
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: docker/setup-qemu-action@v3.6.0
      - uses: docker/setup-buildx-action@v3.13.0

      - name: Login to GHCR
        uses: docker/login-action@v3.5.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5.8.1
        with:
          images: ghcr.io/${{ github.repository_owner }}/architoken-${{ matrix.component.name }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - name: Build and push
        uses: docker/build-push-action@v6.21.0
        with:
          context: ${{ matrix.component.context }}
          file: ${{ matrix.component.dockerfile }}
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          sbom: true
          provenance: true

  sbom:
    name: Publish SBOM
    runs-on: ubuntu-24.04
    needs: docker
    steps:
      - uses: actions/checkout@v6.0.2
      - name: Generate CycloneDX SBOM
        uses: anchore/sbom-action@v0.22.0
        with:
          format: cyclonedx-json
          output-file: sbom.cdx.json
      - name: Attach to release
        uses: softprops/action-gh-release@v2.4.1
        with: { files: sbom.cdx.json }
