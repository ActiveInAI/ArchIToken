openapi: 3.1.0
info:
  title: ArchIToken API
  version: 2.0.0
  summary: AEC Harness for LLMs · Unified API
  description: |
    The **single source of truth** for the ArchIToken platform (formerly
    InsomeOS; Constitution §5).
    All 7 language SDKs are generated from this file via openapi-generator 7.x.

    Versioning: semver; breaking changes bump MAJOR.
  license:
    name: Apache-2.0
    url: https://www.apache.org/licenses/LICENSE-2.0
  contact:
    name: ActiveInAI
    email: ActiveInAI@outlook.com

servers:
  - url: https://api.insomeos.io
    description: Production
  - url: https://staging-api.insomeos.io
    description: Staging
  - url: http://localhost:8080
    description: Local dev

tags:
  - name: harness
    description: Direct inference routing (L5 Gateway)
  - name: modules
    description: ArchIToken active module registry and legacy alias normalization
  - name: module-files
    description: Module-scoped file, metadata, content, sharing, and trash APIs. Content APIs are an in-memory stub and will move behind ObjectStore.
  - name: module-lifecycle
    description: Module transaction state machine and approval APIs. Current implementation is an in-memory preview and will move behind TransactionStore.
  - name: module-audit
    description: Append-only module audit event APIs. Current implementation is an in-memory preview and will move behind EventStore.
  - name: generation
    description: AI-native multimodal engineering generation and conversion APIs. Current implementation is an in-memory mock pipeline and will move behind WorkflowRouter, Skill Registry, MCP Tool Registry, and StorageRouter.
  - name: agents
    description: Legacy agent orchestration (L4)
  - name: projects
    description: Project CRUD
  - name: bim
    description: IFC / BIM upload and query
  - name: boq
    description: Bill of Quantities
  - name: compliance
    description: Regulation review
  - name: meta
    description: Health, readiness, version

security:
  - bearerAuth: []

paths:
  /healthz:
    get:
      summary: Liveness probe
      tags: [meta]
      security: []
      responses:
        "200":
          description: OK
          content:
            text/plain:
              schema: { type: string, example: "ok" }

  /readyz:
    get:
      summary: Readiness probe
      tags: [meta]
      security: []
      responses:
        "200":
          description: Ready
          content:
            text/plain:
              schema: { type: string, example: "ready" }

  /v1/harness/invoke:
    post:
      summary: Inference via the Harness (§1 · all model calls go here)
      tags: [harness]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ChatRequest" }
      responses:
        "200":
          description: Completion produced
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ChatResponse" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "422": { $ref: "#/components/responses/ValidationError" }
        "504": { $ref: "#/components/responses/SlaViolation" }

  /v1/modules:
    get:
      operationId: listModules
      summary: List active ArchIToken modules
      tags: [modules]
      responses:
        "200":
          description: Active module list in lifecycle order
          content:
            application/json:
              schema:
                type: object
                required: [modules, total]
                properties:
                  modules:
                    type: array
                    items: { $ref: "#/components/schemas/ModuleSpec" }
                  total:
                    type: integer
                    minimum: 0
        "401": { $ref: "#/components/responses/Unauthorized" }

  /v1/modules/{module_id}:
    parameters:
      - { $ref: "#/components/parameters/ModuleIdParam" }
    get:
      operationId: getModule
      summary: Get one active module or legacy alias
      tags: [modules]
      responses:
        "200":
          description: Module specification
          content:
            application/json:
                schema: { $ref: "#/components/schemas/ModuleSpec" }
        "404": { $ref: "#/components/responses/NotFound" }

  /v1/modules/{module_id}/files:
    parameters:
      - { $ref: "#/components/parameters/ModuleIdParam" }
    get:
      operationId: listModuleFiles
      summary: List module files and folders
      tags: [module-files]
      parameters:
        - { $ref: "#/components/parameters/FileParentIdQuery" }
        - { $ref: "#/components/parameters/FileStatusQuery" }
        - { $ref: "#/components/parameters/FileKindQuery" }
        - { $ref: "#/components/parameters/LimitParam" }
        - { $ref: "#/components/parameters/CursorParam" }
      responses:
        "200":
          description: Module-scoped file tree nodes
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ModuleFileListResponse" }
              examples:
                files:
                  value:
                    files:
                      - id: 018f1d1d-7a7e-7f2b-a9d9-4c0f4c2f0001
                        moduleId: production_manufacturing
                        parentId: null
                        name: CNC package
                        kind: folder
                        status: active
                        metadata:
                          sizeBytes: 0
                          mimeType: null
                          checksum: null
                          version: 1
                          owner: planner
                          tags: [factory]
                          createdAt: "2026-04-30T00:00:00Z"
                          updatedAt: "2026-04-30T00:00:00Z"
                    total: 1
                    pageInfo:
                      limit: 50
                      nextCursor: null
                      hasMore: false
        "400": { $ref: "#/components/responses/ValidationError" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
        "500": { $ref: "#/components/responses/InternalServerError" }
    post:
      operationId: createModuleFile
      summary: Create a module file or folder metadata node
      tags: [module-files]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateModuleFileRequest" }
            examples:
              file:
                value:
                  name: cnc-nesting.nc
                  kind: file
                  parentId: null
                  mimeType: text/plain
                  sizeBytes: 128
                  owner: planner
                  tags: [cnc, release]
                  content: "G01 X0 Y0"
      responses:
        "201":
          description: File or folder created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ModuleFileNode" }
              examples:
                created:
                  value:
                    id: 018f1d1d-7a7e-7f2b-a9d9-4c0f4c2f0002
                    moduleId: production_manufacturing
                    parentId: null
                    name: cnc-nesting.nc
                    kind: file
                    status: active
                    metadata:
                      sizeBytes: 128
                      mimeType: text/plain
                      checksum: null
                      version: 1
                      owner: planner
                      tags: [cnc, release]
                      createdAt: "2026-04-30T00:00:00Z"
                      updatedAt: "2026-04-30T00:00:00Z"
        "400": { $ref: "#/components/responses/ValidationError" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
        "500": { $ref: "#/components/responses/InternalServerError" }

  /v1/files/{file_id}:
    parameters:
      - { $ref: "#/components/parameters/FileIdParam" }
    get:
      operationId: getModuleFile
      summary: Get a module file or folder node
      tags: [module-files]
      responses:
        "200":
          description: File or folder node
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ModuleFileNode" }
              examples:
                file:
                  value:
                    id: 018f1d1d-7a7e-7f2b-a9d9-4c0f4c2f0002
                    moduleId: production_manufacturing
                    parentId: null
                    name: cnc-nesting.nc
                    kind: file
                    status: active
                    metadata:
                      sizeBytes: 128
                      mimeType: text/plain
                      checksum: null
                      version: 1
                      owner: planner
                      tags: [cnc, release]
                      createdAt: "2026-04-30T00:00:00Z"
                      updatedAt: "2026-04-30T00:00:00Z"
        "400": { $ref: "#/components/responses/ValidationError" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
        "500": { $ref: "#/components/responses/InternalServerError" }
    patch:
      operationId: updateModuleFile
      summary: Update module file metadata
      tags: [module-files]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateModuleFileRequest" }
            examples:
              rename:
                value:
                  name: cnc-nesting-v2.nc
                  tags: [cnc, approved]
      responses:
        "200":
          description: File metadata updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ModuleFileNode" }
              examples:
                updated:
                  value:
                    id: 018f1d1d-7a7e-7f2b-a9d9-4c0f4c2f0002
                    moduleId: production_manufacturing
                    parentId: null
                    name: cnc-nesting-v2.nc
                    kind: file
                    status: active
                    metadata:
                      sizeBytes: 128
                      mimeType: text/plain
                      checksum: null
                      version: 2
                      owner: planner
                      tags: [cnc, approved]
                      createdAt: "2026-04-30T00:00:00Z"
                      updatedAt: "2026-04-30T00:10:00Z"
        "400": { $ref: "#/components/responses/ValidationError" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
        "500": { $ref: "#/components/responses/InternalServerError" }

  /v1/files/{file_id}/metadata:
    parameters:
      - { $ref: "#/components/parameters/FileIdParam" }
    get:
      operationId: getModuleFileMetadata
      summary: Get module file metadata
      tags: [module-files]
      responses:
        "200":
          description: File metadata
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ModuleFileMetadata" }
              examples:
                metadata:
                  value:
                    sizeBytes: 128
                    mimeType: text/plain
                    checksum: null
                    version: 1
                    owner: planner
                    tags: [cnc, release]
                    createdAt: "2026-04-30T00:00:00Z"
                    updatedAt: "2026-04-30T00:00:00Z"
        "400": { $ref: "#/components/responses/ValidationError" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
        "500": { $ref: "#/components/responses/InternalServerError" }

  /v1/files/{file_id}/content:
    parameters:
      - { $ref: "#/components/parameters/FileIdParam" }
    get:
      operationId: getModuleFileContent
      summary: Get in-memory module file content stub
      description: Preview-only content endpoint. The current gateway keeps small content strings in memory; production bytes will be served through ObjectStore.
      tags: [module-files]
      responses:
        "200":
          description: File content stub
          content:
            application/json:
              schema: { $ref: "#/components/schemas/FileContentResponse" }
              examples:
                content:
                  value:
                    fileId: 018f1d1d-7a7e-7f2b-a9d9-4c0f4c2f0002
                    content: "G01 X0 Y0"
                    contentType: text/plain
                    updatedAt: "2026-04-30T00:00:00Z"
        "400": { $ref: "#/components/responses/ValidationError" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
        "500": { $ref: "#/components/responses/InternalServerError" }
    put:
      operationId: updateModuleFileContent
      summary: Replace in-memory module file content stub
      description: Preview-only content endpoint. The current gateway keeps small content strings in memory; production bytes will be written through ObjectStore.
      tags: [module-files]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateFileContentRequest" }
            examples:
              content:
                value:
                  content: "G01 X0 Y0\nM30"
                  contentType: text/plain
                  actor: planner
      responses:
        "200":
          description: File content updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/FileContentResponse" }
              examples:
                content:
                  value:
                    fileId: 018f1d1d-7a7e-7f2b-a9d9-4c0f4c2f0002
                    content: "G01 X0 Y0\nM30"
                    contentType: text/plain
                    updatedAt: "2026-04-30T00:10:00Z"
        "400": { $ref: "#/components/responses/ValidationError" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
        "500": { $ref: "#/components/responses/InternalServerError" }

  /v1/files/{file_id}/move:
    parameters:
      - { $ref: "#/components/parameters/FileIdParam" }
    post:
      operationId: moveModuleFile
      summary: Move a module file or folder
      tags: [module-files]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/MoveFileRequest" }
            examples:
              moveToRoot:
                value:
                  targetParentId: null
                  actor: planner
      responses:
        "200":
          description: File moved
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ModuleFileNode" }
              examples:
                moved:
                  value:
                    id: 018f1d1d-7a7e-7f2b-a9d9-4c0f4c2f0002
                    moduleId: production_manufacturing
                    parentId: null
                    name: cnc-nesting.nc
                    kind: file
                    status: active
                    metadata:
                      sizeBytes: 128
                      mimeType: text/plain
                      checksum: null
                      version: 2
                      owner: planner
                      tags: [cnc, release]
                      createdAt: "2026-04-30T00:00:00Z"
                      updatedAt: "2026-04-30T00:10:00Z"
        "400": { $ref: "#/components/responses/ValidationError" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
        "500": { $ref: "#/components/responses/InternalServerError" }

  /v1/files/{file_id}/copy:
    parameters:
      - { $ref: "#/components/parameters/FileIdParam" }
    post:
      operationId: copyModuleFile
      summary: Copy a module file or folder
      tags: [module-files]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CopyFileRequest" }
            examples:
              copy:
                value:
                  targetModuleId: production_manufacturing
                  targetParentId: null
                  name: cnc-nesting-copy.nc
                  actor: planner
      responses:
        "201":
          description: File copy created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ModuleFileNode" }
              examples:
                copied:
                  value:
                    id: 018f1d1d-7a7e-7f2b-a9d9-4c0f4c2f0003
                    moduleId: production_manufacturing
                    parentId: null
                    name: cnc-nesting-copy.nc
                    kind: file
                    status: active
                    metadata:
                      sizeBytes: 128
                      mimeType: text/plain
                      checksum: null
                      version: 1
                      owner: planner
                      tags: [cnc, release]
                      createdAt: "2026-04-30T00:10:00Z"
                      updatedAt: "2026-04-30T00:10:00Z"
        "400": { $ref: "#/components/responses/ValidationError" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
        "500": { $ref: "#/components/responses/InternalServerError" }

  /v1/files/{file_id}/share:
    parameters:
      - { $ref: "#/components/parameters/FileIdParam" }
    post:
      operationId: shareModuleFile
      summary: Generate a module file share link placeholder
      tags: [module-files]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ShareFileRequest" }
            examples:
              readOnly:
                value:
                  permissions: [read]
                  expiresAt: "2026-05-01T00:00:00Z"
                  actor: planner
      responses:
        "200":
          description: Share link generated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ShareFileResponse" }
              examples:
                shared:
                  value:
                    fileId: 018f1d1d-7a7e-7f2b-a9d9-4c0f4c2f0002
                    shareUrl: /v1/files/018f1d1d-7a7e-7f2b-a9d9-4c0f4c2f0002/shared/018f1d1d-7a7e-7f2b-a9d9-4c0f4c2f0004
                    permissions: [read]
                    expiresAt: "2026-05-01T00:00:00Z"
        "400": { $ref: "#/components/responses/ValidationError" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
        "500": { $ref: "#/components/responses/InternalServerError" }

  /v1/files/{file_id}/trash:
    parameters:
      - { $ref: "#/components/parameters/FileIdParam" }
    post:
      operationId: trashModuleFile
      summary: Soft-delete a module file or folder
      tags: [module-files]
      responses:
        "200":
          description: File soft-deleted
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ModuleFileNode" }
              examples:
                trashed:
                  value:
                    id: 018f1d1d-7a7e-7f2b-a9d9-4c0f4c2f0002
                    moduleId: production_manufacturing
                    parentId: null
                    name: cnc-nesting.nc
                    kind: file
                    status: soft_deleted
                    metadata:
                      sizeBytes: 128
                      mimeType: text/plain
                      checksum: null
                      version: 1
                      owner: planner
                      tags: [cnc, release]
                      createdAt: "2026-04-30T00:00:00Z"
                      updatedAt: "2026-04-30T00:15:00Z"
        "400": { $ref: "#/components/responses/ValidationError" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
        "500": { $ref: "#/components/responses/InternalServerError" }

  /v1/transactions:
    get:
      operationId: listModuleTransactions
      summary: List module lifecycle transactions
      description: In-memory preview of module lifecycle transactions. Production persistence will move behind TransactionStore.
      tags: [module-lifecycle]
      parameters:
        - { $ref: "#/components/parameters/TransactionModuleIdQuery" }
        - { $ref: "#/components/parameters/TransactionStatusQuery" }
        - { $ref: "#/components/parameters/LimitParam" }
        - { $ref: "#/components/parameters/CursorParam" }
      responses:
        "200":
          description: Lifecycle transactions
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ModuleTransactionListResponse" }
              examples:
                transactions:
                  value:
                    transactions:
                      - id: 018f1d1d-7a7e-7f2b-a9d9-4c0f4c2f0101
                        moduleId: production_manufacturing
                        transactionType: release
                        status: pending_approval
                        actor: planner
                        createdAt: "2026-04-30T00:00:00Z"
                        updatedAt: "2026-04-30T00:30:00Z"
                        relatedFileIds: [018f1d1d-7a7e-7f2b-a9d9-4c0f4c2f0002]
                        relatedArtifactIds: [cnc-package-v1]
                        approvals: []
                    total: 1
                    pageInfo:
                      limit: 50
                      nextCursor: null
                      hasMore: false
        "400": { $ref: "#/components/responses/ValidationError" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
        "500": { $ref: "#/components/responses/InternalServerError" }
    post:
      operationId: createModuleTransaction
      summary: Create a module lifecycle transaction
      description: Creates an in-memory preview transaction. Production persistence will move behind TransactionStore.
      tags: [module-lifecycle]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateModuleTransactionRequest" }
            examples:
              transaction:
                value:
                  moduleId: production_manufacturing
                  transactionType: release
                  actor: planner
                  relatedFileIds: [018f1d1d-7a7e-7f2b-a9d9-4c0f4c2f0002]
                  relatedArtifactIds: [cnc-package-v1]
      responses:
        "201":
          description: Transaction created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ModuleTransaction" }
              examples:
                created:
                  value:
                    id: 018f1d1d-7a7e-7f2b-a9d9-4c0f4c2f0101
                    moduleId: production_manufacturing
                    transactionType: release
                    status: draft
                    actor: planner
                    createdAt: "2026-04-30T00:00:00Z"
                    updatedAt: "2026-04-30T00:00:00Z"
                    relatedFileIds: [018f1d1d-7a7e-7f2b-a9d9-4c0f4c2f0002]
                    relatedArtifactIds: [cnc-package-v1]
                    approvals: []
        "400": { $ref: "#/components/responses/ValidationError" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
        "500": { $ref: "#/components/responses/InternalServerError" }

  /v1/transactions/{transaction_id}:
    parameters:
      - { $ref: "#/components/parameters/TransactionIdParam" }
    get:
      operationId: getModuleTransaction
      summary: Get a module lifecycle transaction
      tags: [module-lifecycle]
      responses:
        "200":
          description: Lifecycle transaction
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ModuleTransaction" }
              examples:
                transaction:
                  value:
                    id: 018f1d1d-7a7e-7f2b-a9d9-4c0f4c2f0101
                    moduleId: production_manufacturing
                    transactionType: release
                    status: pending_approval
                    actor: planner
                    createdAt: "2026-04-30T00:00:00Z"
                    updatedAt: "2026-04-30T00:30:00Z"
                    relatedFileIds: [018f1d1d-7a7e-7f2b-a9d9-4c0f4c2f0002]
                    relatedArtifactIds: [cnc-package-v1]
                    approvals: []
        "400": { $ref: "#/components/responses/ValidationError" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
        "500": { $ref: "#/components/responses/InternalServerError" }

  /v1/transactions/{transaction_id}/transition:
    parameters:
      - { $ref: "#/components/parameters/TransactionIdParam" }
    post:
      operationId: transitionModuleTransaction
      summary: Apply a typed lifecycle transition
      tags: [module-lifecycle]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ModuleTransitionRequest" }
            examples:
              submit:
                value:
                  event: submit
                  actor: planner
                  comment: ready for review
      responses:
        "200":
          description: Transaction transitioned
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ModuleTransaction" }
              examples:
                transitioned:
                  value:
                    id: 018f1d1d-7a7e-7f2b-a9d9-4c0f4c2f0101
                    moduleId: production_manufacturing
                    transactionType: release
                    status: submitted
                    actor: planner
                    createdAt: "2026-04-30T00:00:00Z"
                    updatedAt: "2026-04-30T00:10:00Z"
                    relatedFileIds: [018f1d1d-7a7e-7f2b-a9d9-4c0f4c2f0002]
                    relatedArtifactIds: [cnc-package-v1]
                    approvals: []
        "400": { $ref: "#/components/responses/ValidationError" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
        "500": { $ref: "#/components/responses/InternalServerError" }

  /v1/transactions/{transaction_id}/approve:
    parameters:
      - { $ref: "#/components/parameters/TransactionIdParam" }
    post:
      operationId: approveModuleTransaction
      summary: Approve a module lifecycle transaction
      tags: [module-lifecycle]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ApprovalDecisionRequest" }
            examples:
              approve:
                value:
                  actor: approver
                  comment: approved for release
      responses:
        "200":
          description: Transaction approved
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ModuleTransaction" }
              examples:
                approved:
                  value:
