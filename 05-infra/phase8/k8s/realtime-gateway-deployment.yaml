apiVersion: apps/v1
kind: Deployment
metadata:
  name: architoken-realtime-gateway
  namespace: architoken-phase8
  labels:
    app.kubernetes.io/name: architoken-realtime-gateway
    app.kubernetes.io/component: realtime
spec:
  replicas: 4
  selector:
    matchLabels:
      app.kubernetes.io/name: architoken-realtime-gateway
      app.kubernetes.io/component: realtime
  template:
    metadata:
      labels:
        app.kubernetes.io/name: architoken-realtime-gateway
        app.kubernetes.io/component: realtime
    spec:
      containers:
        - name: realtime-gateway
          image: ghcr.io/activeinai/architoken-realtime-gateway:phase8-placeholder
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8082
          env:
            - name: ARCHITOKEN_PROFILE
              value: production
            - name: NATS_URL
              valueFrom:
                secretKeyRef:
                  name: architoken-runtime-secrets
                  key: nats-url
            - name: VALKEY_URL
              valueFrom:
                secretKeyRef:
                  name: architoken-runtime-secrets
                  key: valkey-url
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://otel-collector:4317
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: "500m"
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 2Gi
---
apiVersion: v1
kind: Service
metadata:
  name: architoken-realtime-gateway
  namespace: architoken-phase8
  labels:
    app.kubernetes.io/name: architoken-realtime-gateway
    app.kubernetes.io/component: realtime
spec:
  selector:
    app.kubernetes.io/name: architoken-realtime-gateway
    app.kubernetes.io/component: realtime
  ports:
    - name: http
      port: 80
      targetPort: http
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: architoken-realtime-gateway
  namespace: architoken-phase8
spec:
  minAvailable: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: architoken-realtime-gateway
      app.kubernetes.io/component: realtime
