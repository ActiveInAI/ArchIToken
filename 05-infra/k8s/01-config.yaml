# k8s/01-config.yaml
# License: Apache-2.0
apiVersion: v1
kind: ConfigMap
metadata:
  name: architoken-config
  namespace: architoken
data:
  ARCHITOKEN_PROFILE: production
  ARCHITOKEN_SERVER__HOST: "0.0.0.0"
  ARCHITOKEN_SERVER__PORT: "8080"
  ARCHITOKEN_OBSERVABILITY__OTLP_ENDPOINT: "http://otel-collector.architoken.svc.cluster.local:4317"
  ARCHITOKEN_OBSERVABILITY__SERVICE_NAME: "architoken"
  ARCHITOKEN_OBSERVABILITY__PROMETHEUS_PORT: "9090"
  ARCHITOKEN_INFERENCE__DEFAULT_ENGINE: "v_llm"
  # Constitution §10 model aliases; provider-specific versions live in secrets/runtime config.
  ARCHITOKEN_INFERENCE__WHITELISTED_MODELS: >-
    architoken-planner,architoken-generator,architoken-evaluator
---
# Secrets are NOT in git; apply via sealed-secrets or ExternalSecrets.
# Below is a TEMPLATE showing the required shape.
apiVersion: v1
kind: Secret
metadata:
  name: architoken-secrets
  namespace: architoken
type: Opaque
stringData:
  # REPLACE these placeholders via sealed-secrets in real deployment.
  ARCHITOKEN_DATABASE__URL: "postgres://architoken:REPLACE@supabase-db.architoken:5432/architoken"
  ARCHITOKEN_CACHE__URL: "redis://valkey.architoken:6379/0"
  ARCHITOKEN_AUTH__JWT_SECRET: "REPLACE_WITH_32_BYTES_BASE64"
  ARCHITOKEN_AUTH__JWT_ISSUER: "https://auth.architoken.io"
