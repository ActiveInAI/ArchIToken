const storageKey="architoken-full-product-architecture-doc-v19-20260609";
const initialHtml="<h1>ArchIToken 全产品应用、BOM、数据库、智能体、工作流与技术架构</h1>\n<p>版本日期: 2026-06-09<br>适用对象: ArchIToken 16 模块产品架构、BOM 数据主线、PostgreSQL/ObjectStore/VectorStore/EventStore、Agent 编排、工作流、技术栈、运行时、部署和实施计划。<br>产品定位: AEC AI-Native + Harness Engineering + OpenBIM CDE Workflow OS。<br>核心主线: 客户需求 -&gt; 项目计划 -&gt; 方案设计 -&gt; 标准族库 -&gt; 深化设计 -&gt; 构件物料 BOM -&gt; 计量造价 -&gt; 采购物流 -&gt; 生产制造 -&gt; 施工管理 -&gt; 数字孪生 -&gt; 数字档案 -&gt; 财务 / 人力 / AI / 设置治理。</p>\n<hr>\n<h2>0. 全产品架构总览</h2>\n<h3>0.1 产品定义</h3>\n<p>ArchIToken 是工程业务操作系统,不是单个 BIM、CAD、造价、项目管理或 AI 聊天工具。产品核心是把以下对象放到同一个可审计系统里运行:</p>\n<table>\n<thead>\n<tr>\n<th>对象</th>\n<th>系统职责</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>客户需求</td>\n<td>从市场客服、会议纪要、图片、草图、合同和项目文件中结构化提取</td>\n</tr>\n<tr>\n<td>项目计划</td>\n<td>WBS、里程碑、资源、审批计划、责任矩阵、风险和变更</td>\n</tr>\n<tr>\n<td>方案</td>\n<td>户型、体量、风格、初算、客户确认记录</td>\n</tr>\n<tr>\n<td>标准族库</td>\n<td>标准条文、SJG157 类目、构件命名、材料等级、型钢规格、节点做法</td>\n</tr>\n<tr>\n<td>图纸 / 模型 / 文档</td>\n<td>DWG/DXF、IFC、STEP、SKP、3DM、Office 文档（Excel/Word/PPT）、PDF、图片、点云和派生模型</td>\n</tr>\n<tr>\n<td>构件物料 BOM</td>\n<td>构件、材料、连接件、紧固件的编码、名称、尺寸、材料、数量和重量</td>\n</tr>\n<tr>\n<td>工程量 / 造价</td>\n<td>BOQ、清单、定额、价格、成本测算、变更影响</td>\n</tr>\n<tr>\n<td>采购 / 物流</td>\n<td>供应商、采购单、批次、运输、到货、现场签收</td>\n</tr>\n<tr>\n<td>生产制造</td>\n<td>工单、下料、CNC、焊接、涂装、防腐、防火、质检、包装、发运</td>\n</tr>\n<tr>\n<td>施工管理</td>\n<td>进度、班组、日志、安全、质量、安装、验收、整改</td>\n</tr>\n<tr>\n<td>数字孪生</td>\n<td>IFC/3D Tiles/OpenUSD/GLB、点云、3DGS、IoT、告警、维保</td>\n</tr>\n<tr>\n<td>数字档案</td>\n<td>合同、图纸、BOM、BOQ、审批、验收、审计、归档包</td>\n</tr>\n<tr>\n<td>财务</td>\n<td>预算、合同、付款、发票、凭证、对账、结算、审计证据</td>\n</tr>\n<tr>\n<td>人力</td>\n<td>组织、岗位、人员、班组、资质、考勤、绩效、培训</td>\n</tr>\n<tr>\n<td>AI 治理</td>\n<td>ModelRouter、ToolRouter、Agent、RAG、成本、审计、安全策略</td>\n</tr>\n<tr>\n<td>设置治理</td>\n<td>租户、账号、角色、权限、审批矩阵、数据字典、系统参数</td>\n</tr>\n</tbody></table>\n<h3>0.2 端到端业务闭环</h3>\n<pre><code class=\"language-text\">marketing_service\n  -&gt; planning_management\n  -&gt; concept_design\n  -&gt; standard_library\n  -&gt; detailed_design\n  -&gt; component/material BOM\n  -&gt; quantity_costing\n  -&gt; material_logistics\n  -&gt; production_manufacturing\n  -&gt; construction_management\n  -&gt; digital_twin\n  -&gt; digital_archive\n  -&gt; finance_management / human_resources\n  -&gt; ai_center / settings_center 全程治理\n</code></pre>\n<h3>0.3 产品层级</h3>\n<table>\n<thead>\n<tr>\n<th>层级</th>\n<th>名称</th>\n<th>作用</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>L7</td>\n<td>Web / Desktop / Mobile 工作台</td>\n<td>16 模块统一入口、文件、对象、审批、审计、AI 助手</td>\n</tr>\n<tr>\n<td>L6</td>\n<td>SDK / API 合同</td>\n<td>OpenAPI、AsyncAPI、TypeScript/Python/Rust/Go SDK</td>\n</tr>\n<tr>\n<td>L5</td>\n<td>Gateway</td>\n<td>鉴权、租户、限流、审计、REST/SSE/gRPC/MCP</td>\n</tr>\n<tr>\n<td>L4</td>\n<td>Workflow / Agent</td>\n<td>Planner、Generator、Evaluator、RuleChecker、SchemaValidator、Approver</td>\n</tr>\n<tr>\n<td>L3</td>\n<td>Harness Core</td>\n<td>Rust 服务、事务、Router、Registry、Schema、权限、审计</td>\n</tr>\n<tr>\n<td>L2</td>\n<td>Data Plane</td>\n<td>PostgreSQL、ObjectStore、VectorStore、EventStore、CacheStore、GraphStore、AnalyticsStore</td>\n</tr>\n<tr>\n<td>L1</td>\n<td>Worker / Runtime</td>\n<td>Office 文档、PDF、CAD、BIM、IFC、DWG、图片/视频、AI、GPU、导出</td>\n</tr>\n<tr>\n<td>L0</td>\n<td>Infrastructure</td>\n<td>Docker、Kubernetes、GPU 节点、NVIDIA/AMD/Intel/Apple 加速、私有化部署</td>\n</tr>\n</tbody></table>\n<h3>0.4 全局不变量</h3>\n<table>\n<thead>\n<tr>\n<th>不变量</th>\n<th>说明</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>Registry 替代 Enum</td>\n<td>模块、模型、工具、工作流、文件类型、规则、Schema 都走注册表</td>\n</tr>\n<tr>\n<td>CDE 文件是真源</td>\n<td>浏览器状态、截图、派生文件、AI 输出都不能替代源文件</td>\n</tr>\n<tr>\n<td>AI 不直接发布专业判定</td>\n<td>AI 只能生成草稿、校验、建议和报告；专业判定必须走审批</td>\n</tr>\n<tr>\n<td>Router 是强边界</td>\n<td>模型、工具、存储、工作流、几何、渲染都通过内部 Router</td>\n</tr>\n<tr>\n<td>版本和审计必备</td>\n<td>文件、BOM、图纸、模型、审批、Agent 调用、导出都必须有版本和审计</td>\n</tr>\n<tr>\n<td>下游只读发布态</td>\n<td>造价、采购、生产、施工只能消费 <code>issued</code> 或项目批准状态的数据</td>\n</tr>\n<tr>\n<td>私有化可运行</td>\n<td>核心业务不能依赖外部 SaaS 才能成立</td>\n</tr>\n</tbody></table>\n<h3>0.5 会议目标到系统落点</h3>\n<p>本节把 2026-06 会议确定的 AI 企业运营、4A 架构、BOM 数据底座、Agent 编排、现场数字化和硬件预算转成可执行的系统边界。每一项都必须能落到模块、数据表、工作流、Agent、权限和验收证据。</p>\n<table>\n<thead>\n<tr>\n<th>会议目标 / 问题</th>\n<th>ArchIToken 系统决策</th>\n<th>直接落点</th>\n<th>验收标准</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>AI 运行企业,人辅助 AI</td>\n<td>AI 不直接替代责任人。AI 负责采集、抽取、生成、校验、提醒、排程和异常定位；人负责客户/供应商界面、专业判断、审批签发、例外处置和战略决策。</td>\n<td><code>ai_center</code>, <code>settings_center</code>, 全模块 <code>approval_tasks</code>, <code>audit_events</code>, <code>agent_runs</code>, <code>module_transactions</code></td>\n<td>任一 AI 输出必须记录输入文件、提示、模型、工具、RAG、规则结果、人工审批和最终交付物。没有审批的 AI 输出不能进入采购、生产、施工和财务。</td>\n</tr>\n<tr>\n<td>三层智能体工程架构</td>\n<td>不做一个大模型横扫业务。按任务 Agent、流程 Agent、企业 Agent 分层,通过 Harness 和 Workflow 编排。</td>\n<td>Agent Registry、Workflow Template、ModelRouter、ToolRouter、Outbox/EventStore、Worker 队列</td>\n<td>128-160 个 Agent 任务能以容器或队列任务运行；每个任务都有 <code>planned/running/evaluated/blocked/approved/failed</code> 状态和重试记录。</td>\n</tr>\n<tr>\n<td>4A 架构落地</td>\n<td>业务架构定义对象和责任,数据架构定义事实来源,应用架构定义操作入口,技术架构定义运行边界。四者通过同一组 ID 串联。</td>\n<td><code>module_id</code>, <code>project_id</code>, <code>source_file_id</code>, <code>bom_version_id</code>, <code>workflow_run_id</code>, <code>audit_event_id</code></td>\n<td>能从客户需求追溯到项目计划、方案、图纸/模型、构件物料 BOM、采购、生产、施工、档案、财务凭证和责任人。</td>\n</tr>\n<tr>\n<td>BOM 是企业数据核心</td>\n<td>BOM 指构件物料清单,不是泛化阶段 BOM 口径。以 <code>应舍美居_构件物料清单.xlsx</code> 为当前真实模板,叠加 SJG157 编码表和构件标准化命名规则。</td>\n<td><code>component_bom</code>, <code>component_bom_versions</code>, <code>component_bom_lines</code>, <code>bom_line_sources</code>, <code>sjg157_categories</code>, <code>component_naming_tokens</code></td>\n<td>每一行 BOM 必须能追溯到源 Excel、Sheet、行列、SJG157 类目、构件命名 token、材料/规格/数量/重量校验结果。</td>\n</tr>\n<tr>\n<td>单一事实来源</td>\n<td>PostgreSQL 是结构化业务真源；ObjectStore/CDE 是文件真源；VectorStore 只做检索索引；EventStore 只做事件和回放；缓存不是真源。</td>\n<td><code>source_files</code>, <code>business_objects</code>, <code>object_versions</code>, <code>file_versions</code>, <code>event_outbox</code>, <code>vector_index_jobs</code></td>\n<td>同一客户、项目、构件、材料、供应商、手机号、合同号只能有一个权威对象；其它模块引用 ID,不能复制字段形成第二真源。</td>\n</tr>\n<tr>\n<td>权限与变更管理</td>\n<td>所有关键对象走 RBAC/RLS、审批矩阵、版本差异、变更原因和审计链。</td>\n<td><code>settings_center</code>, <code>rbac_policies</code>, <code>row_level_policies</code>, <code>approval_matrices</code>, <code>change_records</code>, <code>audit_events</code></td>\n<td>任一关键字段变更必须有旧值、新值、原因、操作者、审批人、时间、来源模块和回滚路径。</td>\n</tr>\n<tr>\n<td>现场工序数字化</td>\n<td>现场不是单独 App。施工、生产、物流、档案共用项目、构件、物料、工单、照片和验收证据。</td>\n<td><code>production_manufacturing</code>, <code>construction_management</code>, <code>digital_archive</code>, 移动端工作台</td>\n<td>每道工序有工单、构件/材料、负责人、照片/视频、检查项、整改记录、验收状态和归档包。</td>\n</tr>\n<tr>\n<td>混合模型路由</td>\n<td>简单结构化任务优先本地小模型或国内模型；复杂代码、设计推理、长文规划可走外部高性能模型；所有调用必须经过 ModelRouter。</td>\n<td><code>ai_center.model_routes</code>, <code>tool_policies</code>, <code>agent_tool_calls</code>, <code>model_cost_events</code></td>\n<td>业务代码不得直接调用外部模型 SDK；每次调用可统计成本、延迟、输入输出、脱敏策略和失败降级。</td>\n</tr>\n<tr>\n<td>40-50 万硬件预算</td>\n<td>一期预算服务于内部试点、CDE/NAS、数据库/CI、Agent 编排、日志审计和备份。GPU 本地推理、6 台 CPU 服务器和高可用机房放二期/三期。</td>\n<td><code>5.25 2026-06 硬件选型、网络、安全与预算</code></td>\n<td>一期采购不承诺 1 万/10 万公网生产 SLA；100/1000 用户阶段以私有试点、托管云和排队任务组合承载。</td>\n</tr>\n</tbody></table>\n<h3>0.6 三层 Agent 工程架构</h3>\n<p>Agent 是受控工程能力,不是聊天窗口。每个 Agent 必须声明输入、工具、规则、输出 Schema、失败边界和审批门槛。</p>\n<table>\n<thead>\n<tr>\n<th>层级</th>\n<th>职责</th>\n<th>典型 Agent</th>\n<th>输入</th>\n<th>输出</th>\n<th>失败边界</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>个体 Agent</td>\n<td>完成单一任务,不跨越业务责任边界。</td>\n<td><code>ExcelBOMImportAgent</code>, <code>SJG157ClassifyAgent</code>, <code>ComponentNameParseAgent</code>, <code>PDFExtractAgent</code>, <code>DWGMetaReadAgent</code>, <code>CostLineNormalizeAgent</code>, <code>PhotoQualityCheckAgent</code></td>\n<td>文件、对象版本、规则、字典、用户指令</td>\n<td>结构化草稿、校验报告、差异清单、待确认项</td>\n<td>低置信度、缺字段、冲突字段、规则缺失时只能输出待确认项。</td>\n</tr>\n<tr>\n<td>流程 Agent</td>\n<td>串联多个模块的任务,推动状态机流转。</td>\n<td><code>RequirementToPlanAgent</code>, <code>DesignToBOMAgent</code>, <code>BOMToPurchaseAgent</code>, <code>BOMToWorkOrderAgent</code>, <code>SiteAcceptanceToArchiveAgent</code>, <code>ChangeImpactAgent</code></td>\n<td>上游已审批对象、项目状态、工作流模板</td>\n<td>下游草稿、审批任务、变更影响、风险提醒</td>\n<td>不允许绕过审批生成发布态；下游只能消费 <code>issued/approved</code> 数据。</td>\n</tr>\n<tr>\n<td>企业 Agent</td>\n<td>汇总经营级风险、成本、进度、现金流和资源瓶颈。</td>\n<td><code>OperationsReviewAgent</code>, <code>CostRiskAgent</code>, <code>CashflowWatchAgent</code>, <code>ScheduleRiskAgent</code>, <code>SupplierRiskAgent</code>, <code>DataQualityGovernorAgent</code></td>\n<td>全模块事件、指标、审批、异常、审计</td>\n<td>经营日报、风险清单、资源建议、例外升级</td>\n<td>只能建议和预警,不能直接改合同、付款、采购、人员和生产计划。</td>\n</tr>\n</tbody></table>\n<p>Agent 标准门禁链固定为:</p>\n<pre><code class=\"language-text\">Planner -&gt; Generator -&gt; Evaluator -&gt; RuleChecker -&gt; SchemaValidator -&gt; Approver\n</code></pre>\n<table>\n<thead>\n<tr>\n<th>门禁</th>\n<th>必做动作</th>\n<th>不通过处理</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>Planner</td>\n<td>识别任务、来源文件、目标对象、权限和所需工具</td>\n<td>缺权限或缺来源文件时拒绝执行</td>\n</tr>\n<tr>\n<td>Generator</td>\n<td>调用模型、工具、RAG 和解析器生成候选结果</td>\n<td>输出必须带引用和置信度</td>\n</tr>\n<tr>\n<td>Evaluator</td>\n<td>对比需求、历史案例、上下文和质量标准</td>\n<td>低分结果进入返工或人工确认</td>\n</tr>\n<tr>\n<td>RuleChecker</td>\n<td>校验 SJG157、构件命名、材料规格、数量、审批状态和专业规则</td>\n<td>规则缺失时标为启发式建议</td>\n</tr>\n<tr>\n<td>SchemaValidator</td>\n<td>校验 JSON Schema、数据库约束、枚举注册表和跨表引用</td>\n<td>不写入生产表,只保留草稿和错误</td>\n</tr>\n<tr>\n<td>Approver</td>\n<td>人工确认、签发、退回或作废</td>\n<td>未批准不得进入下游发布态</td>\n</tr>\n</tbody></table>\n<h3>0.7 4A 落地蓝图</h3>\n<table>\n<thead>\n<tr>\n<th>架构域</th>\n<th>ArchIToken 落地</th>\n<th>主键 / 对象</th>\n<th>禁止事项</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>业务架构 BA</td>\n<td>16 模块覆盖客户需求、计划、设计、标准库、BOM、造价、采购、生产、施工、孪生、档案、财务、人力、AI 和设置治理。</td>\n<td><code>module_id</code>, <code>business_object_id</code>, <code>project_id</code>, <code>workflow_state</code></td>\n<td>禁止把模块做成孤立页面、营销页或只读报表。</td>\n</tr>\n<tr>\n<td>数据架构 DA</td>\n<td>PostgreSQL 保存业务对象和事务；ObjectStore/CDE 保存源文件和派生文件；VectorStore 保存索引；EventStore 保存事件；AnalyticsStore 保存指标。</td>\n<td><code>source_file_id</code>, <code>object_version_id</code>, <code>bom_line_id</code>, <code>event_id</code>, <code>audit_event_id</code></td>\n<td>禁止用向量库、Excel 副本、浏览器缓存或 Agent 记忆作为权威数据。</td>\n</tr>\n<tr>\n<td>应用架构 AA</td>\n<td>统一 Workbench、模块页面、文件抽屉、对象表格、审批面板、Agent 门禁、操作队列和审计时间线。</td>\n<td><code>/app/modules/{module_id}</code>, <code>approval_task_id</code>, <code>operation_id</code></td>\n<td>禁止给数字孪生、BOM、AI 中心单独做割裂入口。</td>\n</tr>\n<tr>\n<td>技术架构 TA</td>\n<td>Rust Gateway/Harness Core、Python Agent Orchestrator、Next.js 工作台、Worker 运行时、PostgreSQL、对象存储、Kubernetes/Docker、NAS/服务器。</td>\n<td><code>service_id</code>, <code>worker_id</code>, <code>agent_run_id</code>, <code>deployment_id</code></td>\n<td>禁止业务逻辑直连外部模型、直写对象存储绕过审计、硬编码模块枚举。</td>\n</tr>\n</tbody></table>\n<h3>0.8 六个月实施切片</h3>\n<table>\n<thead>\n<tr>\n<th>阶段</th>\n<th>目标</th>\n<th>交付</th>\n<th>验收</th>\n<th>资源边界</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>第 0-1 月</td>\n<td>建立数据真源和权限底座</td>\n<td>租户/账号/角色/RLS、CDE 文件、源文件登记、BOM 导入最小链路、审计事件</td>\n<td>上传 Excel 后能生成 BOM 草稿,并追溯 Sheet/行列/操作者/版本</td>\n<td>用一期 <code>srv-01</code> + <code>srv-02</code>；不采购 GPU worker。</td>\n</tr>\n<tr>\n<td>第 1-2 月</td>\n<td>打通构件物料 BOM 主线</td>\n<td>SJG157 类目、构件命名、BOM 行校验、版本差异、发布审批</td>\n<td>BOM 从草稿到发布态可走审批；下游只能读取发布态</td>\n<td>NAS RAID5 存源文件、快照、归档包和数据库备份。</td>\n</tr>\n<tr>\n<td>第 2-3 月</td>\n<td>打通项目、方案、造价、采购</td>\n<td>项目/WBS、方案对象、BOQ、采购需求、变更影响</td>\n<td>客户需求能生成项目计划和候选方案,发布 BOM 能生成 BOQ/采购草稿</td>\n<td>复杂模型推理走外部模型或云端排队,本地只做编排和结构化任务。</td>\n</tr>\n<tr>\n<td>第 3-4 月</td>\n<td>Agent 编排进入可控运行</td>\n<td>Agent Registry、ModelRouter、ToolRouter、Workflow Template、成本审计</td>\n<td>每次 Agent 执行可查输入、工具、模型、输出、规则、审批和费用</td>\n<td>128-160 个 Agent 是任务规模,不是同时满载模型推理规模。</td>\n</tr>\n<tr>\n<td>第 4-5 月</td>\n<td>生产和现场闭环</td>\n<td>工单、下料/质检/包装、现场安装、照片证据、整改、验收</td>\n<td>每个构件从 BOM 到生产到安装到验收有证据链</td>\n<td>移动端优先做现场确认和拍照留痕,不做孤立 App。</td>\n</tr>\n<tr>\n<td>第 5-6 月</td>\n<td>经营级 AI 运营</td>\n<td>经营日报、进度/成本/现金流/供应商风险、异常升级、归档包</td>\n<td>管理层能看到跨模块瓶颈,并能回跳到原始文件、对象和责任人</td>\n<td>一期硬件只支撑内部生产力和试点；高并发公网生产、GPU 推理和灾备进二期。</td>\n</tr>\n</tbody></table>\n<h3>0.9 当前排查结论与整改优先级</h3>\n<table>\n<thead>\n<tr>\n<th>排查项</th>\n<th>当前问题</th>\n<th>必须整改成什么</th>\n<th>优先级</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>产品边界</td>\n<td>容易被写成“BOM 文档 + 硬件清单”,不能支撑 AI 运行企业。</td>\n<td>必须以 16 模块、4A、BOM 真源、Workflow、Agent、审计和权限组成统一产品架构。</td>\n<td>P0</td>\n</tr>\n<tr>\n<td>BOM 主线</td>\n<td>BOM 容易泛化成阶段名词。</td>\n<td>只把构件物料清单作为当前核心 BOM,用 SJG157、构件命名规则、应舍美居样表建立真实字段、校验和下游引用。</td>\n<td>P0</td>\n</tr>\n<tr>\n<td>数据真源</td>\n<td>文件、数据库、向量、缓存和 Agent 记忆容易混用。</td>\n<td>PostgreSQL 做结构化真源,ObjectStore/CDE 做文件真源,VectorStore 只做索引,EventStore 只做事件。</td>\n<td>P0</td>\n</tr>\n<tr>\n<td>Agent 编排</td>\n<td>单个模型直接写业务结论会造成不可控风险。</td>\n<td>必须进入 Planner -&gt; Generator -&gt; Evaluator -&gt; RuleChecker -&gt; SchemaValidator -&gt; Approver。</td>\n<td>P0</td>\n</tr>\n<tr>\n<td>权限与审计</td>\n<td>只有账号登录不够,不能满足生产责任追溯。</td>\n<td>对象级权限、RLS、审批矩阵、变更原因、JumpServer 会话、Agent 调用和文件版本全部审计。</td>\n<td>P0</td>\n</tr>\n<tr>\n<td>生产可用</td>\n<td>只有页面和静态文档不能算生产可用。</td>\n<td>必须有数据库迁移、API、Worker、前端、测试 fixture、备份恢复、监控告警和演练记录。</td>\n<td>P0</td>\n</tr>\n<tr>\n<td>大厂对标</td>\n<td>不能口头宣称超越广联达、华东院、Autodesk、Tekla。</td>\n<td>只能在开放数据闭环、AI 审计、私有化、证据链、重钢场景模板上建立可验证差异化。</td>\n<td>P1</td>\n</tr>\n<tr>\n<td>硬件预算</td>\n<td>40-50 万不能同时买 6 台 CPU 服务器、1-2 台 GPU 服务器和完整高可用机房。</td>\n<td>一期只跑内部试点和生产力底座；GPU、本地大模型、6 节点集群、1 万/10 万公网生产放二期/三期。</td>\n<td>P0</td>\n</tr>\n<tr>\n<td>等保基础</td>\n<td>缺堡垒机、日志、备份、VLAN、最小权限时不能上线生产数据。</td>\n<td>一期纳入 JumpServer、VPN/MFA、VLAN、日志审计、ZFS 快照、离线备份、主机加固。</td>\n<td>P0</td>\n</tr>\n<tr>\n<td>实施管理</td>\n<td>没有 Backlog、验收和责任人会变成空架构。</td>\n<td>每个模块必须落到页面、表、API、事件、Agent、测试和验收命令。</td>\n<td>P0</td>\n</tr>\n</tbody></table>\n<h3>0.10 生产可用等级</h3>\n<table>\n<thead>\n<tr>\n<th>等级</th>\n<th>能做什么</th>\n<th>不能做什么</th>\n<th>必须具备</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>L1 内部原型</td>\n<td>本地导入样表、查看模块、跑单个 Agent、生成静态报告</td>\n<td>不能承载真实项目生产数据</td>\n<td>单机数据库、fixture、手工备份、基础审计</td>\n</tr>\n<tr>\n<td>L2 内部生产力</td>\n<td>30 人团队内部使用,管理 BOM、文件、审批、Agent 草稿和归档</td>\n<td>不承诺外部客户 SLA,不承载 1 万公网用户</td>\n<td><code>srv-01</code> + <code>srv-02</code>,权限、审计、备份、JumpServer、最小监控</td>\n</tr>\n<tr>\n<td>L3 商业试点</td>\n<td>100/1000 用户试点,客户项目可进入受控流程</td>\n<td>不承诺大规模公网平台运营</td>\n<td>独立生产环境、灰度、备份恢复演练、日志告警、工单和审批闭环</td>\n</tr>\n<tr>\n<td>L4 规模生产</td>\n<td>1 万用户以上公网访问、跨项目并发、客户 SLA</td>\n<td>不能放办公室单点设备</td>\n<td>云/IDC K8s、数据库 HA、对象存储多副本、WAF/CDN、灾备、SOC/审计</td>\n</tr>\n</tbody></table>\n<hr>\n<h2>1. 16 模块产品应用架构</h2>\n<h3>1.1 模块总表</h3>\n<table>\n<thead>\n<tr>\n<th align=\"right\">order</th>\n<th>模块 ID</th>\n<th>中文名</th>\n<th>核心业务对象</th>\n<th>关键输出</th>\n</tr>\n</thead>\n<tbody><tr>\n<td align=\"right\">1</td>\n<td><code>personal_center</code></td>\n<td>个人中心</td>\n<td>个人资料、待办、通知、最近工作、审批任务</td>\n<td>个人工作台、待办流</td>\n</tr>\n<tr>\n<td align=\"right\">2</td>\n<td><code>marketing_service</code></td>\n<td>市场客服</td>\n<td>线索、客户、需求、会议、报价草案、合同意向</td>\n<td>需求摘要、报价草案、项目机会</td>\n</tr>\n<tr>\n<td align=\"right\">3</td>\n<td><code>planning_management</code></td>\n<td>计划管理</td>\n<td>项目、WBS、里程碑、资源、风险、变更</td>\n<td>项目基线、审批计划、责任矩阵</td>\n</tr>\n<tr>\n<td align=\"right\">4</td>\n<td><code>concept_design</code></td>\n<td>方案设计</td>\n<td>方案、户型、风格、体量、初算、客户确认</td>\n<td>候选方案、方案比较、客户确认</td>\n</tr>\n<tr>\n<td align=\"right\">5</td>\n<td><code>standard_library</code></td>\n<td>标准族库</td>\n<td>标准条文、族库、材料、构件、命名规则、SJG157</td>\n<td>可复用标准库、规则库、构件模板</td>\n</tr>\n<tr>\n<td align=\"right\">6</td>\n<td><code>detailed_design</code></td>\n<td>深化设计</td>\n<td>图纸、IFC、结构计算、节点、构件物料 BOM</td>\n<td>深化包、构件清单、校验报告</td>\n</tr>\n<tr>\n<td align=\"right\">7</td>\n<td><code>quantity_costing</code></td>\n<td>计量造价</td>\n<td>工程量、BOQ、价格、成本、变更</td>\n<td>造价文件、成本测算、变更影响</td>\n</tr>\n<tr>\n<td align=\"right\">8</td>\n<td><code>material_logistics</code></td>\n<td>材料物流</td>\n<td>供应商、采购、批次、运输、到货、堆场</td>\n<td>采购计划、物流计划、签收记录</td>\n</tr>\n<tr>\n<td align=\"right\">9</td>\n<td><code>production_manufacturing</code></td>\n<td>生产制造</td>\n<td>工单、下料、CNC、焊接、质检、包装、发运</td>\n<td>工单、CNC 文件、质检单、发运批次</td>\n</tr>\n<tr>\n<td align=\"right\">10</td>\n<td><code>construction_management</code></td>\n<td>施工管理</td>\n<td>进度、班组、日志、安全、质量、安装、验收</td>\n<td>施工日志、验收报告、整改闭环</td>\n</tr>\n<tr>\n<td align=\"right\">11</td>\n<td><code>digital_twin</code></td>\n<td>数字孪生</td>\n<td>模型、点云、3DGS、IoT、告警、维保</td>\n<td>运维模型、告警、维保计划</td>\n</tr>\n<tr>\n<td align=\"right\">12</td>\n<td><code>digital_archive</code></td>\n<td>数字档案</td>\n<td>归档包、档案项、保存期限、审计链</td>\n<td>竣工档案、证据包、长期追溯</td>\n</tr>\n<tr>\n<td align=\"right\">13</td>\n<td><code>finance_management</code></td>\n<td>财务管理</td>\n<td>合同、预算、付款、发票、凭证、对账</td>\n<td>凭证、结算、审计证据</td>\n</tr>\n<tr>\n<td align=\"right\">14</td>\n<td><code>human_resources</code></td>\n<td>人力资源</td>\n<td>员工、班组、岗位、资质、考勤、绩效</td>\n<td>工时、资质、绩效、结算依据</td>\n</tr>\n<tr>\n<td align=\"right\">15</td>\n<td><code>ai_center</code></td>\n<td>AI中心</td>\n<td>模型路由、工具、RAG、Agent、成本、审计</td>\n<td>AI 能力注册、运行审计、成本控制</td>\n</tr>\n<tr>\n<td align=\"right\">16</td>\n<td><code>settings_center</code></td>\n<td>设置中心</td>\n<td>租户、账号、角色、权限、审批矩阵、系统参数</td>\n<td>身份权限、审批配置、系统治理</td>\n</tr>\n</tbody></table>\n<h3>1.2 模块之间的数据合同</h3>\n<table>\n<thead>\n<tr>\n<th>上游模块</th>\n<th>交付物</th>\n<th>下游模块</th>\n<th>数据合同</th>\n</tr>\n</thead>\n<tbody><tr>\n<td><code>marketing_service</code></td>\n<td>客户需求、会议纪要、报价草案</td>\n<td><code>planning_management</code>, <code>concept_design</code></td>\n<td><code>customer_requirement.v1</code>, <code>quote_draft.v1</code></td>\n</tr>\n<tr>\n<td><code>planning_management</code></td>\n<td>WBS、里程碑、责任矩阵</td>\n<td><code>concept_design</code>, <code>detailed_design</code>, <code>construction_management</code></td>\n<td><code>project_plan.v1</code>, <code>wbs.v1</code></td>\n</tr>\n<tr>\n<td><code>concept_design</code></td>\n<td>方案、初算、客户确认</td>\n<td><code>detailed_design</code>, <code>quantity_costing</code></td>\n<td><code>concept_variant.v1</code>, <code>concept_acceptance.v1</code></td>\n</tr>\n<tr>\n<td><code>standard_library</code></td>\n<td>标准、构件、材料、命名规则</td>\n<td>全模块</td>\n<td><code>standard_clause.v1</code>, <code>component_template.v1</code>, <code>naming_rule.v1</code></td>\n</tr>\n<tr>\n<td><code>detailed_design</code></td>\n<td>图纸、IFC、BOM、校验报告</td>\n<td><code>quantity_costing</code>, <code>production_manufacturing</code>, <code>construction_management</code></td>\n<td><code>drawing_package.v1</code>, <code>ifc_model.v1</code>, <code>component_bom.v1</code></td>\n</tr>\n<tr>\n<td><code>quantity_costing</code></td>\n<td>BOQ、成本、变更影响</td>\n<td><code>material_logistics</code>, <code>finance_management</code></td>\n<td><code>boq.v1</code>, <code>cost_breakdown.v1</code></td>\n</tr>\n<tr>\n<td><code>material_logistics</code></td>\n<td>采购单、到货、批次</td>\n<td><code>production_manufacturing</code>, <code>construction_management</code>, <code>finance_management</code></td>\n<td><code>purchase_order.v1</code>, <code>shipment_batch.v1</code></td>\n</tr>\n<tr>\n<td><code>production_manufacturing</code></td>\n<td>工单、质检、发运</td>\n<td><code>construction_management</code>, <code>finance_management</code>, <code>digital_archive</code></td>\n<td><code>work_order.v1</code>, <code>qc_record.v1</code>, <code>dispatch_batch.v1</code></td>\n</tr>\n<tr>\n<td><code>construction_management</code></td>\n<td>日志、安装、验收、整改</td>\n<td><code>digital_twin</code>, <code>digital_archive</code>, <code>finance_management</code></td>\n<td><code>site_installation.v1</code>, <code>acceptance_record.v1</code></td>\n</tr>\n<tr>\n<td><code>digital_twin</code></td>\n<td>运维模型、告警、设备状态</td>\n<td><code>digital_archive</code>, <code>construction_management</code></td>\n<td><code>twin_model.v1</code>, <code>iot_event.v1</code></td>\n</tr>\n<tr>\n<td><code>finance_management</code></td>\n<td>凭证、付款、对账</td>\n<td><code>digital_archive</code>, <code>human_resources</code></td>\n<td><code>voucher.v1</code>, <code>payment_record.v1</code></td>\n</tr>\n<tr>\n<td><code>human_resources</code></td>\n<td>班组、工时、资质</td>\n<td><code>planning_management</code>, <code>construction_management</code>, <code>finance_management</code></td>\n<td><code>crew_assignment.v1</code>, <code>timesheet.v1</code></td>\n</tr>\n<tr>\n<td><code>ai_center</code></td>\n<td>模型、工具、Agent 配置</td>\n<td>全模块</td>\n<td><code>agent_profile.v1</code>, <code>model_route.v1</code>, <code>tool_policy.v1</code></td>\n</tr>\n<tr>\n<td><code>settings_center</code></td>\n<td>用户、角色、权限、审批矩阵</td>\n<td>全模块</td>\n<td><code>identity.v1</code>, <code>rbac_policy.v1</code>, <code>approval_matrix.v1</code></td>\n</tr>\n</tbody></table>\n<h3>1.3 每个模块的应用页面</h3>\n<table>\n<thead>\n<tr>\n<th>模块</th>\n<th>主页面</th>\n<th>子页面</th>\n</tr>\n</thead>\n<tbody><tr>\n<td><code>personal_center</code></td>\n<td><code>/app/modules/personal_center</code></td>\n<td>待办、最近文件、个人审批、安全会话</td>\n</tr>\n<tr>\n<td><code>marketing_service</code></td>\n<td><code>/app/modules/marketing_service</code></td>\n<td>线索、客户、需求采集、报价草案、合同意向</td>\n</tr>\n<tr>\n<td><code>planning_management</code></td>\n<td><code>/app/modules/planning_management</code></td>\n<td>WBS、甘特图、资源、风险、变更、审批计划</td>\n</tr>\n<tr>\n<td><code>concept_design</code></td>\n<td><code>/app/modules/concept_design</code></td>\n<td>方案生成、方案对比、风格库、客户确认</td>\n</tr>\n<tr>\n<td><code>standard_library</code></td>\n<td><code>/app/modules/standard_library</code></td>\n<td>标准条文、SJG157、构件命名、材料库、型钢库</td>\n</tr>\n<tr>\n<td><code>detailed_design</code></td>\n<td><code>/app/modules/detailed_design</code></td>\n<td>图纸、IFC、节点、结构计算、构件 BOM、校验</td>\n</tr>\n<tr>\n<td><code>quantity_costing</code></td>\n<td><code>/app/modules/quantity_costing</code></td>\n<td>BOQ、价格库、成本、报价、变更影响</td>\n</tr>\n<tr>\n<td><code>material_logistics</code></td>\n<td><code>/app/modules/material_logistics</code></td>\n<td>供应商、采购、运输、到货、堆场</td>\n</tr>\n<tr>\n<td><code>production_manufacturing</code></td>\n<td><code>/app/modules/production_manufacturing</code></td>\n<td>工单、CNC、焊接、质检、包装、发运</td>\n</tr>\n<tr>\n<td><code>construction_management</code></td>\n<td><code>/app/modules/construction_management</code></td>\n<td>进度、班组、日志、安全、质量、验收、整改</td>\n</tr>\n<tr>\n<td><code>digital_twin</code></td>\n<td><code>/app/modules/digital_twin</code></td>\n<td>模型层、点云、IoT、告警、维保</td>\n</tr>\n<tr>\n<td><code>digital_archive</code></td>\n<td><code>/app/modules/digital_archive</code></td>\n<td>项目档案、归档包、审计链、保存期限</td>\n</tr>\n<tr>\n<td><code>finance_management</code></td>\n<td><code>/app/modules/finance_management</code></td>\n<td>预算、合同、付款、发票、凭证、对账</td>\n</tr>\n<tr>\n<td><code>human_resources</code></td>\n<td><code>/app/modules/human_resources</code></td>\n<td>组织、人员、班组、资质、考勤、绩效</td>\n</tr>\n<tr>\n<td><code>ai_center</code></td>\n<td><code>/app/modules/ai_center</code></td>\n<td>模型路由、RAG、Agent、MCP、成本、审计</td>\n</tr>\n<tr>\n<td><code>settings_center</code></td>\n<td><code>/app/modules/settings_center</code></td>\n<td>租户、账号、角色、权限、审批、数据源</td>\n</tr>\n</tbody></table>\n<h3>1.4 全局工作台组件</h3>\n<table>\n<thead>\n<tr>\n<th>组件</th>\n<th>作用</th>\n</tr>\n</thead>\n<tbody><tr>\n<td><code>ModuleWorkbenchShell</code></td>\n<td>统一模块壳、导航、主区、右侧抽屉</td>\n</tr>\n<tr>\n<td><code>ModuleFileExplorer</code></td>\n<td>CDE 文件树、目录、上传、重命名、移动、权限</td>\n</tr>\n<tr>\n<td><code>FilePreviewDrawer</code></td>\n<td>文件预览、完整查看、属性和版本</td>\n</tr>\n<tr>\n<td><code>LifecycleTransactionPanel</code></td>\n<td>事务状态机</td>\n</tr>\n<tr>\n<td><code>ApprovalWorkflowPanel</code></td>\n<td>审批人、审批意见、通过/退回</td>\n</tr>\n<tr>\n<td><code>AgentGateTimeline</code></td>\n<td>Planner -&gt; Generator -&gt; Evaluator -&gt; RuleChecker -&gt; SchemaValidator -&gt; Approver</td>\n</tr>\n<tr>\n<td><code>ArtifactBoard</code></td>\n<td>交付物、状态、操作</td>\n</tr>\n<tr>\n<td><code>ModuleRelationshipMap</code></td>\n<td>上下游数据关系</td>\n</tr>\n<tr>\n<td><code>FloatingAIAssistant</code></td>\n<td>受控 AI 助手入口</td>\n</tr>\n</tbody></table>\n<h3>1.5 每个模块的落地蓝图</h3>\n<p>本节把 16 个模块拆到可开发粒度。每个模块都必须落在同一套 Open CDE 工作台、同一套文件版本、同一套事务状态机、同一套审批、同一套审计和同一套 AI 门禁链上。模块之间不是页面跳转关系,而是对象、文件、事件和审批状态的传递关系。</p>\n<h4>1.5.1 <code>personal_center</code> 个人中心</h4>\n<table>\n<thead>\n<tr>\n<th>项</th>\n<th>设计</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>核心职责</td>\n<td>汇总个人待办、审批、最近文件、风险提醒、通知、安全会话和个人偏好。它不拥有业务真源,只聚合来自其它模块的工作项。</td>\n</tr>\n<tr>\n<td>核心对象</td>\n<td><code>personal_work_items</code>, <code>approval_inbox_items</code>, <code>user_recent_objects</code>, <code>notification_deliveries</code>, <code>user_preferences</code>, <code>security_sessions</code></td>\n</tr>\n<tr>\n<td>主页面</td>\n<td><code>/app/modules/personal_center</code></td>\n</tr>\n<tr>\n<td>子页面</td>\n<td>我的待办、我的审批、最近项目、最近文件、通知中心、账号安全、个人偏好</td>\n</tr>\n<tr>\n<td>输入</td>\n<td>全模块 <code>module_transactions</code>, <code>approval_tasks</code>, <code>audit_events</code>, <code>notifications</code>, <code>module_files</code></td>\n</tr>\n<tr>\n<td>输出</td>\n<td>已处理待办、审批意见、个人偏好、通知已读状态、安全会话审计</td>\n</tr>\n<tr>\n<td>关键表</td>\n<td><code>user_profiles</code>, <code>user_preferences</code>, <code>personal_work_items</code>, <code>user_recent_objects</code>, <code>approval_inbox_items</code>, <code>notification_deliveries</code>, <code>security_sessions</code></td>\n</tr>\n<tr>\n<td>关键工作流</td>\n<td>工作项生成 -&gt; 用户查看 -&gt; 打开来源模块 -&gt; 处理/评论/转派 -&gt; 回写来源事务 -&gt; 写个人审计</td>\n</tr>\n<tr>\n<td>Agent</td>\n<td><code>PersonalBriefingAgent</code>, <code>ApprovalTriageAgent</code>, <code>RiskReminderAgent</code>, <code>DailyDigestAgent</code></td>\n</tr>\n<tr>\n<td>API</td>\n<td><code>GET /v1/personal/inbox</code>, <code>GET /v1/personal/approvals</code>, <code>GET /v1/personal/recent</code>, <code>PATCH /v1/personal/preferences</code>, <code>POST /v1/personal/security-sessions/revoke</code></td>\n</tr>\n<tr>\n<td>事件</td>\n<td><code>personal.work_item.created</code>, <code>personal.notification.read</code>, <code>personal.approval.opened</code>, <code>personal.session.revoked</code></td>\n</tr>\n<tr>\n<td>验收</td>\n<td>任一待办必须能跳回来源模块、来源对象、来源文件、来源审批和来源审计；个人中心不得复制业务数据形成第二真源。</td>\n</tr>\n</tbody></table>\n<h4>1.5.2 <code>marketing_service</code> 市场客服</h4>\n<table>\n<thead>\n<tr>\n<th>项</th>\n<th>设计</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>核心职责</td>\n<td>把客户、线索、会议、图片、草图、需求、约束和报价意向结构化,形成项目机会和可交给计划/方案模块的需求包。</td>\n</tr>\n<tr>\n<td>核心对象</td>\n<td><code>leads</code>, <code>customers</code>, <code>contacts</code>, <code>requirement_documents</code>, <code>meeting_records</code>, <code>site_photos</code>, <code>quote_drafts</code>, <code>contract_intents</code></td>\n</tr>\n<tr>\n<td>主页面</td>\n<td><code>/app/modules/marketing_service</code></td>\n</tr>\n<tr>\n<td>子页面</td>\n<td>线索池、客户档案、联系人、需求采集、会议纪要、附件证据、报价草案、合同意向</td>\n</tr>\n<tr>\n<td>输入</td>\n<td>微信/电话/邮件/表单/图片/草图/会议录音/历史项目/标准问卷</td>\n</tr>\n<tr>\n<td>输出</td>\n<td><code>customer_requirement.v1</code>, <code>quote_draft.v1</code>, <code>project_opportunity.v1</code>, <code>customer_confirmation.v1</code></td>\n</tr>\n<tr>\n<td>关键表</td>\n<td><code>leads</code>, <code>customers</code>, <code>contacts</code>, <code>requirement_sources</code>, <code>requirement_items</code>, <code>meeting_records</code>, <code>quote_drafts</code>, <code>contract_intents</code></td>\n</tr>\n<tr>\n<td>关键工作流</td>\n<td>线索录入 -&gt; 客户确认 -&gt; 需求抽取 -&gt; 需求分解 -&gt; 风险提示 -&gt; 报价草案 -&gt; 项目机会审批 -&gt; 移交计划/方案</td>\n</tr>\n<tr>\n<td>Agent</td>\n<td><code>RequirementCaptureAgent</code>, <code>MeetingSummaryAgent</code>, <code>QuestionnaireAgent</code>, <code>QuoteDraftAgent</code>, <code>ContractRiskAgent</code></td>\n</tr>\n<tr>\n<td>API</td>\n<td><code>POST /v1/marketing/leads</code>, <code>POST /v1/marketing/requirements/extract</code>, <code>POST /v1/marketing/quote-drafts</code>, <code>POST /v1/marketing/opportunities/{id}/handoff</code></td>\n</tr>\n<tr>\n<td>事件</td>\n<td><code>marketing.lead.created</code>, <code>marketing.requirement.extracted</code>, <code>marketing.quote.generated</code>, <code>marketing.opportunity.handoff_requested</code>, <code>marketing.opportunity.approved</code></td>\n</tr>\n<tr>\n<td>验收</td>\n<td>每条需求必须保留来源证据,包括客户原话、文件、图片、会议时间、采集人和确认状态；没有客户确认的需求只能是草稿。</td>\n</tr>\n</tbody></table>\n<h4>1.5.3 <code>planning_management</code> 计划管理</h4>\n<table>\n<thead>\n<tr>\n<th>项</th>\n<th>设计</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>核心职责</td>\n<td>把项目机会变成可执行项目: WBS、里程碑、责任矩阵、资源、风险、变更、基线和跨模块交付节奏。</td>\n</tr>\n<tr>\n<td>核心对象</td>\n<td><code>projects</code>, <code>project_plans</code>, <code>wbs_items</code>, <code>milestones</code>, <code>resource_allocations</code>, <code>risk_registers</code>, <code>change_requests</code>, <code>plan_baselines</code></td>\n</tr>\n<tr>\n<td>主页面</td>\n<td><code>/app/modules/planning_management</code></td>\n</tr>\n<tr>\n<td>子页面</td>\n<td>项目总览、WBS、甘特图、资源计划、风险台账、变更、里程碑、审批计划</td>\n</tr>\n<tr>\n<td>输入</td>\n<td><code>project_opportunity.v1</code>, <code>customer_requirement.v1</code>, 历史项目模板、合同约束、人员/班组资源</td>\n</tr>\n<tr>\n<td>输出</td>\n<td><code>project_plan.v1</code>, <code>wbs.v1</code>, <code>responsibility_matrix.v1</code>, <code>risk_register.v1</code>, <code>change_request.v1</code></td>\n</tr>\n<tr>\n<td>关键表</td>\n<td><code>projects</code>, <code>project_plans</code>, <code>wbs_items</code>, <code>milestones</code>, <code>dependencies</code>, <code>resource_allocations</code>, <code>risks</code>, <code>change_requests</code>, <code>plan_baselines</code></td>\n</tr>\n<tr>\n<td>关键工作流</td>\n<td>项目创建 -&gt; WBS 拆解 -&gt; 资源排程 -&gt; 风险识别 -&gt; 计划评审 -&gt; 发布基线 -&gt; 下发各模块任务 -&gt; 进度回收 -&gt; 变更评估</td>\n</tr>\n<tr>\n<td>Agent</td>\n<td><code>WbsPlannerAgent</code>, <code>ScheduleRiskAgent</code>, <code>ResourceAllocatorAgent</code>, <code>ChangeImpactAgent</code>, <code>ProgressNarrativeAgent</code></td>\n</tr>\n<tr>\n<td>API</td>\n<td><code>POST /v1/planning/projects</code>, <code>POST /v1/planning/projects/{id}/wbs/generate</code>, <code>POST /v1/planning/baselines</code>, <code>POST /v1/planning/change-requests</code></td>\n</tr>\n<tr>\n<td>事件</td>\n<td><code>planning.project.created</code>, <code>planning.wbs.generated</code>, <code>planning.baseline.issued</code>, <code>planning.change.submitted</code>, <code>planning.risk.escalated</code></td>\n</tr>\n<tr>\n<td>验收</td>\n<td>已发布基线必须能驱动方案、深化、采购、生产、施工任务；变更必须显示对工期、成本、BOM、采购和施工的影响。</td>\n</tr>\n</tbody></table>\n<h4>1.5.4 <code>concept_design</code> 方案设计</h4>\n<table>\n<thead>\n<tr>\n<th>项</th>\n<th>设计</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>核心职责</td>\n<td>基于客户需求和计划约束生成多个候选方案,完成方案对比、初算、可视化展示和客户确认。</td>\n</tr>\n<tr>\n<td>核心对象</td>\n<td><code>concept_briefs</code>, <code>concept_variants</code>, <code>floorplan_candidates</code>, <code>mass_models</code>, <code>style_profiles</code>, <code>concept_evaluations</code>, <code>client_confirmations</code></td>\n</tr>\n<tr>\n<td>主页面</td>\n<td><code>/app/modules/concept_design</code></td>\n</tr>\n<tr>\n<td>子页面</td>\n<td>设计任务书、方案生成、平面/体量、风格库、方案对比、初算、客户确认</td>\n</tr>\n<tr>\n<td>输入</td>\n<td><code>customer_requirement.v1</code>, <code>project_plan.v1</code>, 标准族库、历史方案、场地条件、预算边界</td>\n</tr>\n<tr>\n<td>输出</td>\n<td><code>concept_variant.v1</code>, <code>concept_evaluation_report.v1</code>, <code>concept_acceptance.v1</code>, <code>concept_package.v1</code></td>\n</tr>\n<tr>\n<td>关键表</td>\n<td><code>concept_briefs</code>, <code>concept_variants</code>, <code>floorplan_candidates</code>, <code>mass_models</code>, <code>concept_scores</code>, <code>client_confirmation_records</code>, <code>presentation_packages</code></td>\n</tr>\n<tr>\n<td>关键工作流</td>\n<td>需求读取 -&gt; 生成候选 -&gt; 规则评估 -&gt; 初算 -&gt; 内部评审 -&gt; 客户展示 -&gt; 客户确认 -&gt; 移交深化</td>\n</tr>\n<tr>\n<td>Agent</td>\n<td><code>ConceptGeneratorAgent</code>, <code>FloorplanFitAgent</code>, <code>ConceptEvaluatorAgent</code>, <code>PresentationPackAgent</code>, <code>ClientChangeCaptureAgent</code></td>\n</tr>\n<tr>\n<td>API</td>\n<td><code>POST /v1/concept/briefs</code>, <code>POST /v1/concept/variants/generate</code>, <code>POST /v1/concept/variants/{id}/evaluate</code>, <code>POST /v1/concept/confirmations</code></td>\n</tr>\n<tr>\n<td>事件</td>\n<td><code>concept.variant.generated</code>, <code>concept.variant.evaluated</code>, <code>concept.package.issued</code>, <code>concept.client.confirmed</code>, <code>concept.handoff.detailed_design</code></td>\n</tr>\n<tr>\n<td>验收</td>\n<td>候选方案必须引用需求条目、约束、评估规则和版本；客户确认后才能进入深化设计。</td>\n</tr>\n</tbody></table>\n<h4>1.5.5 <code>standard_library</code> 标准族库</h4>\n<table>\n<thead>\n<tr>\n<th>项</th>\n<th>设计</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>核心职责</td>\n<td>管理标准、语义字典、SJG157、构件命名、材料等级、型钢/紧固件规格、节点做法和规则库,为全模块提供受控引用。</td>\n</tr>\n<tr>\n<td>核心对象</td>\n<td><code>standards</code>, <code>standard_clauses</code>, <code>sjg157_categories</code>, <code>component_naming_rules</code>, <code>material_grades</code>, <code>section_profiles</code>, <code>connection_details</code>, <code>rule_sets</code></td>\n</tr>\n<tr>\n<td>主页面</td>\n<td><code>/app/modules/standard_library</code></td>\n</tr>\n<tr>\n<td>子页面</td>\n<td>标准条文、SJG157、构件命名、材料库、型钢库、节点库、规则库、版本发布</td>\n</tr>\n<tr>\n<td>输入</td>\n<td>标准文件、企业标准、Excel 编码表、构件命名规则、材料/型钢规格表、历史项目沉淀</td>\n</tr>\n<tr>\n<td>输出</td>\n<td><code>standard_clause.v1</code>, <code>sjg157_category.v1</code>, <code>component_template.v1</code>, <code>naming_rule.v1</code>, <code>rule_set.v1</code></td>\n</tr>\n<tr>\n<td>关键表</td>\n<td><code>standards</code>, <code>standard_versions</code>, <code>standard_clauses</code>, <code>terminology_entries</code>, <code>sjg157_categories</code>, <code>component_templates</code>, <code>material_grades</code>, <code>section_profiles</code>, <code>rule_sets</code>, <code>rule_bindings</code></td>\n</tr>\n<tr>\n<td>关键工作流</td>\n<td>来源导入 -&gt; 条目结构化 -&gt; 去重/版本化 -&gt; 专业复核 -&gt; 发布规则集 -&gt; 被设计/BOM/造价/施工引用</td>\n</tr>\n<tr>\n<td>Agent</td>\n<td><code>StandardIngestionAgent</code>, <code>ClauseIndexerAgent</code>, <code>RuleAuthoringAgent</code>, <code>ComponentLibraryAgent</code>, <code>TerminologyLinkAgent</code></td>\n</tr>\n<tr>\n<td>API</td>\n<td><code>POST /v1/standards/import</code>, <code>GET /v1/standards/clauses</code>, <code>POST /v1/standards/rule-sets</code>, <code>POST /v1/standards/rule-sets/{id}/publish</code></td>\n</tr>\n<tr>\n<td>事件</td>\n<td><code>standard.import.completed</code>, <code>standard.rule_set.published</code>, <code>standard.category.updated</code>, <code>standard.library.item.deprecated</code></td>\n</tr>\n<tr>\n<td>验收</td>\n<td>被下游引用的标准/规则必须有来源文件、版本、适用范围、状态和复核人；未发布规则不得阻断生产流程。</td>\n</tr>\n</tbody></table>\n<h4>1.5.6 <code>detailed_design</code> 深化设计</h4>\n<table>\n<thead>\n<tr>\n<th>项</th>\n<th>设计</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>核心职责</td>\n<td>管理 DWG/DXF/IFC/STEP/SKP/3DM、Office 文档、PDF 等工程文件,生成深化图纸、结构计算、节点、碰撞报告和构件物料 BOM。</td>\n</tr>\n<tr>\n<td>核心对象</td>\n<td><code>design_packages</code>, <code>drawings</code>, <code>bim_models</code>, <code>structure_calculations</code>, <code>node_details</code>, <code>clash_reports</code>, <code>component_bom_documents</code>, <code>design_review_records</code></td>\n</tr>\n<tr>\n<td>主页面</td>\n<td><code>/app/modules/detailed_design</code></td>\n</tr>\n<tr>\n<td>子页面</td>\n<td>图纸、模型、结构计算、节点深化、构件物料 BOM、碰撞检查、审图意见、发布包</td>\n</tr>\n<tr>\n<td>输入</td>\n<td><code>concept_acceptance.v1</code>, <code>project_plan.v1</code>, 标准族库、客户确认、源工程文件、现场反馈</td>\n</tr>\n<tr>\n<td>输出</td>\n<td><code>drawing_package.v1</code>, <code>ifc_model.v1</code>, <code>component_bom.v1</code>, <code>design_check_report.v1</code>, <code>design_issue_package.v1</code></td>\n</tr>\n<tr>\n<td>关键表</td>\n<td><code>design_packages</code>, <code>drawings</code>, <code>drawing_versions</code>, <code>bim_models</code>, <code>model_elements</code>, <code>structure_calculations</code>, <code>node_details</code>, <code>clash_reports</code>, <code>component_bom.*</code>, <code>design_reviews</code></td>\n</tr>\n<tr>\n<td>关键工作流</td>\n<td>接收方案 -&gt; 建立深化包 -&gt; 上传/解析源文件 -&gt; 生成派生模型 -&gt; 结构/规范/碰撞校验 -&gt; 生成构件物料 BOM -&gt; 专业复核 -&gt; 发布深化包</td>\n</tr>\n<tr>\n<td>Agent</td>\n<td><code>DrawingParseAgent</code>, <code>IfcIndexAgent</code>, <code>DesignRuleCheckAgent</code>, <code>ClashExplainAgent</code>, <code>ComponentBomImportAgent</code>, <code>DesignReviewAgent</code></td>\n</tr>\n<tr>\n<td>API</td>\n<td><code>POST /v1/detailed-design/packages</code>, <code>POST /v1/detailed-design/files/{id}/parse</code>, <code>POST /v1/detailed-design/checks/run</code>, <code>POST /v1/component-bom/documents/import</code></td>\n</tr>\n<tr>\n<td>事件</td>\n<td><code>design.file.uploaded</code>, <code>design.file.parsed</code>, <code>design.check.completed</code>, <code>component_bom.version.issued</code>, <code>design.package.issued</code></td>\n</tr>\n<tr>\n<td>验收</td>\n<td>所有下游只能消费发布态深化包和发布态 BOM；源文件、派生文件、校验报告和签审记录必须完整归档。</td>\n</tr>\n</tbody></table>\n<h4>1.5.7 <code>quantity_costing</code> 计量造价</h4>\n<table>\n<thead>\n<tr>\n<th>项</th>\n<th>设计</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>核心职责</td>\n<td>从发布态图纸、模型和 BOM 中形成工程量、BOQ、成本测算、报价、变更影响和财务预算依据。</td>\n</tr>\n<tr>\n<td>核心对象</td>\n<td><code>boq_documents</code>, <code>boq_items</code>, <code>quantity_takeoffs</code>, <code>price_snapshots</code>, <code>cost_breakdowns</code>, <code>change_cost_impacts</code>, <code>quote_versions</code></td>\n</tr>\n<tr>\n<td>主页面</td>\n<td><code>/app/modules/quantity_costing</code></td>\n</tr>\n<tr>\n<td>子页面</td>\n<td>工程量、BOQ、价格库、成本测算、报价、变更影响、审核</td>\n</tr>\n<tr>\n<td>输入</td>\n<td><code>component_bom.v1</code>, <code>drawing_package.v1</code>, <code>ifc_model.v1</code>, 价格库、合同、采购报价</td>\n</tr>\n<tr>\n<td>输出</td>\n<td><code>boq.v1</code>, <code>cost_breakdown.v1</code>, <code>quote_version.v1</code>, <code>change_cost_impact.v1</code></td>\n</tr>\n<tr>\n<td>关键表</td>\n<td><code>boq_documents</code>, <code>boq_items</code>, <code>quantity_takeoff_runs</code>, <code>price_books</code>, <code>price_snapshots</code>, <code>cost_breakdowns</code>, <code>quote_versions</code>, <code>change_cost_impacts</code></td>\n</tr>\n<tr>\n<td>关键工作流</td>\n<td>读取发布态 BOM/图纸 -&gt; 生成工程量 -&gt; 匹配价格 -&gt; 成本测算 -&gt; 造价复核 -&gt; 报价发布 -&gt; 变更影响追踪</td>\n</tr>\n<tr>\n<td>Agent</td>\n<td><code>BoqExtractAgent</code>, <code>CostingAgent</code>, <code>PriceCompareAgent</code>, <code>ChangeCostImpactAgent</code>, <code>QuoteReviewAgent</code></td>\n</tr>\n<tr>\n<td>API</td>\n<td><code>POST /v1/costing/boq/from-bom</code>, <code>POST /v1/costing/price-match</code>, <code>POST /v1/costing/quotes</code>, <code>POST /v1/costing/change-impact</code></td>\n</tr>\n<tr>\n<td>事件</td>\n<td><code>costing.boq.generated</code>, <code>costing.price_snapshot.created</code>, <code>costing.quote.submitted</code>, <code>costing.quote.approved</code>, <code>costing.change_impact.completed</code></td>\n</tr>\n<tr>\n<td>验收</td>\n<td>每个造价行必须能追溯到 BOM 行、图纸/模型元素、价格来源和计算公式；报价发布必须走商务/财务审批。</td>\n</tr>\n</tbody></table>\n<h4>1.5.8 <code>material_logistics</code> 材料物流</h4>\n<table>\n<thead>\n<tr>\n<th>项</th>\n<th>设计</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>核心职责</td>\n<td>把 BOQ/BOM 转成采购计划、供应商询价、采购单、批次、物流、到货、签收、库存和堆场记录。</td>\n</tr>\n<tr>\n<td>核心对象</td>\n<td><code>suppliers</code>, <code>supplier_quotes</code>, <code>purchase_plans</code>, <code>purchase_orders</code>, <code>shipment_batches</code>, <code>receiving_records</code>, <code>inventory_batches</code>, <code>yard_locations</code></td>\n</tr>\n<tr>\n<td>主页面</td>\n<td><code>/app/modules/material_logistics</code></td>\n</tr>\n<tr>\n<td>子页面</td>\n<td>供应商、采购计划、询比价、采购单、物流批次、到货签收、库存、堆场</td>\n</tr>\n<tr>\n<td>输入</td>\n<td><code>boq.v1</code>, <code>component_bom.v1</code>, <code>cost_breakdown.v1</code>, 供应商报价、生产计划、施工计划</td>\n</tr>\n<tr>\n<td>输出</td>\n<td><code>purchase_plan.v1</code>, <code>purchase_order.v1</code>, <code>shipment_batch.v1</code>, <code>receiving_record.v1</code>, <code>inventory_batch.v1</code></td>\n</tr>\n<tr>\n<td>关键表</td>\n<td><code>suppliers</code>, <code>supplier_contacts</code>, <code>supplier_quotes</code>, <code>purchase_plans</code>, <code>purchase_orders</code>, <code>purchase_order_lines</code>, <code>shipments</code>, <code>receiving_records</code>, <code>inventory_batches</code>, <code>yard_locations</code></td>\n</tr>\n<tr>\n<td>关键工作流</td>\n<td>需求汇总 -&gt; 供应商询价 -&gt; 比价 -&gt; 采购审批 -&gt; 下单 -&gt; 发货跟踪 -&gt; 到货质检 -&gt; 入库/堆场 -&gt; 生产/施工领用</td>\n</tr>\n<tr>\n<td>Agent</td>\n<td><code>ProcurementPlanAgent</code>, <code>SupplierCompareAgent</code>, <code>PurchaseOrderDraftAgent</code>, <code>ShipmentPlanAgent</code>, <code>ReceivingCheckAgent</code></td>\n</tr>\n<tr>\n<td>API</td>\n<td><code>POST /v1/logistics/purchase-plans/from-boq</code>, <code>POST /v1/logistics/supplier-quotes</code>, <code>POST /v1/logistics/purchase-orders</code>, <code>POST /v1/logistics/receipts</code></td>\n</tr>\n<tr>\n<td>事件</td>\n<td><code>logistics.purchase_plan.generated</code>, <code>logistics.po.approved</code>, <code>logistics.shipment.dispatched</code>, <code>logistics.receipt.accepted</code>, <code>logistics.inventory.updated</code></td>\n</tr>\n<tr>\n<td>验收</td>\n<td>采购数量必须能追溯到 BOM/BOQ；到货签收必须有批次、照片、质检、签收人和时间。</td>\n</tr>\n</tbody></table>\n<h4>1.5.9 <code>production_manufacturing</code> 生产制造</h4>\n<table>\n<thead>\n<tr>\n<th>项</th>\n<th>设计</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>核心职责</td>\n<td>把发布态 BOM、图纸、采购批次和计划基线转成工单、下料、CNC、焊接、涂装、防腐、防火、质检、包装和发运。</td>\n</tr>\n<tr>\n<td>核心对象</td>\n<td><code>work_orders</code>, <code>production_batches</code>, <code>cutting_lists</code>, <code>cnc_files</code>, <code>welding_records</code>, <code>coating_records</code>, <code>qc_records</code>, <code>packaging_records</code>, <code>dispatch_batches</code></td>\n</tr>\n<tr>\n<td>主页面</td>\n<td><code>/app/modules/production_manufacturing</code></td>\n</tr>\n<tr>\n<td>子页面</td>\n<td>工单、批次、下料、CNC、焊接、涂装/防腐/防火、质检、包装、发运</td>\n</tr>\n<tr>\n<td>输入</td>\n<td><code>component_bom.v1</code>, <code>drawing_package.v1</code>, <code>purchase_order.v1</code>, <code>inventory_batch.v1</code>, <code>project_plan.v1</code></td>\n</tr>\n<tr>\n<td>输出</td>\n<td><code>work_order.v1</code>, <code>cutting_list.v1</code>, <code>cnc_file.v1</code>, <code>qc_record.v1</code>, <code>dispatch_batch.v1</code></td>\n</tr>\n<tr>\n<td>关键表</td>\n<td><code>work_orders</code>, <code>work_order_lines</code>, <code>production_batches</code>, <code>cutting_lists</code>, <code>cnc_files</code>, <code>process_steps</code>, <code>welding_records</code>, <code>coating_records</code>, <code>qc_records</code>, <code>packaging_records</code>, <code>dispatch_batches</code></td>\n</tr>\n<tr>\n<td>关键工作流</td>\n<td>接收发布态 BOM -&gt; 生成生产批次 -&gt; 生成工单 -&gt; 下料/CNC -&gt; 工序流转 -&gt; 质检 -&gt; 包装 -&gt; 发运 -&gt; 回写施工/档案</td>\n</tr>\n<tr>\n<td>Agent</td>\n<td><code>WorkOrderAgent</code>, <code>CuttingListAgent</code>, <code>CncFileAgent</code>, <code>QcAgent</code>, <code>DispatchPlanAgent</code></td>\n</tr>\n<tr>\n<td>API</td>\n<td><code>POST /v1/production/work-orders/from-bom</code>, <code>POST /v1/production/cutting-lists</code>, <code>POST /v1/production/qc-records</code>, <code>POST /v1/production/dispatch-batches</code></td>\n</tr>\n<tr>\n<td>事件</td>\n<td><code>production.work_order.created</code>, <code>production.cnc.generated</code>, <code>production.qc.passed</code>, <code>production.dispatch.ready</code>, <code>production.dispatch.sent</code></td>\n</tr>\n<tr>\n<td>验收</td>\n<td>每个构件必须能从生产记录追溯到 BOM 行、图号、材料批次、工序、质检和发运批次。</td>\n</tr>\n</tbody></table>\n<h4>1.5.10 <code>construction_management</code> 施工管理</h4>\n<table>\n<thead>\n<tr>\n<th>项</th>\n<th>设计</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>核心职责</td>\n<td>管理现场进度、班组、施工日志、安全、质量、材料进场、构件安装、验收、整改和竣工资料。</td>\n</tr>\n<tr>\n<td>核心对象</td>\n<td><code>site_schedules</code>, <code>crew_assignments</code>, <code>daily_logs</code>, <code>safety_inspections</code>, <code>quality_inspections</code>, <code>installation_records</code>, <code>acceptance_reports</code>, <code>rectification_items</code></td>\n</tr>\n<tr>\n<td>主页面</td>\n<td><code>/app/modules/construction_management</code></td>\n</tr>\n<tr>\n<td>子页面</td>\n<td>进度、班组、日志、安全、质量、材料进场、安装清单、验收、整改、竣工资料</td>\n</tr>\n<tr>\n<td>输入</td>\n<td><code>dispatch_batch.v1</code>, <code>shipment_batch.v1</code>, <code>project_plan.v1</code>, <code>drawing_package.v1</code>, <code>component_bom.v1</code>, 班组/资质</td>\n</tr>\n<tr>\n<td>输出</td>\n<td><code>site_daily_log.v1</code>, <code>installation_record.v1</code>, <code>inspection_record.v1</code>, <code>acceptance_record.v1</code>, <code>rectification_record.v1</code></td>\n</tr>\n<tr>\n<td>关键表</td>\n<td><code>site_schedules</code>, <code>crew_assignments</code>, <code>daily_logs</code>, <code>safety_inspections</code>, <code>quality_inspections</code>, <code>installation_records</code>, <code>acceptance_reports</code>, <code>rectification_items</code>, <code>site_photos</code></td>\n</tr>\n<tr>\n<td>关键工作流</td>\n<td>接收发运/到货 -&gt; 班组排程 -&gt; 现场安装 -&gt; 拍照/扫码留痕 -&gt; 安全质量检查 -&gt; 验收 -&gt; 整改闭环 -&gt; 归档</td>\n</tr>\n<tr>\n<td>Agent</td>\n<td><code>SiteScheduleAgent</code>, <code>DailyLogAgent</code>, <code>SafetyCheckAgent</code>, <code>InspectionAgent</code>, <code>RectificationAgent</code></td>\n</tr>\n<tr>\n<td>API</td>\n<td><code>POST /v1/construction/daily-logs</code>, <code>POST /v1/construction/installations</code>, <code>POST /v1/construction/inspections</code>, <code>POST /v1/construction/acceptance-reports</code></td>\n</tr>\n<tr>\n<td>事件</td>\n<td><code>construction.daily_log.created</code>, <code>construction.installation.recorded</code>, <code>construction.inspection.failed</code>, <code>construction.rectification.closed</code>, <code>construction.acceptance.approved</code></td>\n</tr>\n<tr>\n<td>验收</td>\n<td>验收记录必须关联构件、图纸、批次、照片、检查项、责任人和签字；未闭环整改不得进入竣工归档。</td>\n</tr>\n</tbody></table>\n<h4>1.5.11 <code>digital_twin</code> 数字孪生</h4>\n<table>\n<thead>\n<tr>\n<th>项</th>\n<th>设计</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>核心职责</td>\n<td>在统一模块工作台中管理竣工模型、构件映射、点云/3DGS、IoT、进度回放、告警和维保,不得做成孤立大屏。</td>\n</tr>\n<tr>\n<td>核心对象</td>\n<td><code>twin_models</code>, <code>twin_elements</code>, <code>model_layers</code>, <code>point_clouds</code>, <code>gaussian_splats</code>, <code>iot_devices</code>, <code>iot_events</code>, <code>alerts</code>, <code>maintenance_plans</code></td>\n</tr>\n<tr>\n<td>主页面</td>\n<td><code>/app/modules/digital_twin</code></td>\n</tr>\n<tr>\n<td>子页面</td>\n<td>模型层、构件树、点云/3DGS、进度回放、IoT、告警、维保、孪生快照</td>\n</tr>\n<tr>\n<td>输入</td>\n<td><code>ifc_model.v1</code>, <code>as_built_archive.v1</code>, <code>installation_record.v1</code>, <code>iot_event.v1</code>, 设备台账</td>\n</tr>\n<tr>\n<td>输出</td>\n<td><code>twin_model.v1</code>, <code>twin_snapshot.v1</code>, <code>alert.v1</code>, <code>maintenance_plan.v1</code></td>\n</tr>\n<tr>\n<td>关键表</td>\n<td><code>twin_models</code>, <code>twin_model_versions</code>, <code>twin_elements</code>, <code>twin_element_links</code>, <code>model_layers</code>, <code>point_cloud_assets</code>, <code>gaussian_splat_assets</code>, <code>iot_devices</code>, <code>iot_events</code>, <code>alerts</code>, <code>maintenance_plans</code></td>\n</tr>\n<tr>\n<td>关键工作流</td>\n<td>接收竣工模型 -&gt; 生成元素索引 -&gt; 绑定构件/BOM/施工验收 -&gt; 接入 IoT -&gt; 告警/维保 -&gt; 生成孪生快照 -&gt; 归档</td>\n</tr>\n<tr>\n<td>Agent</td>\n<td><code>TwinSyncAgent</code>, <code>ElementLinkAgent</code>, <code>IotAnomalyAgent</code>, <code>MaintenancePlanAgent</code>, <code>TwinSnapshotAgent</code></td>\n</tr>\n<tr>\n<td>API</td>\n<td><code>POST /v1/twin/models/import</code>, <code>GET /v1/twin/models/{id}/elements</code>, <code>POST /v1/twin/iot/events</code>, <code>POST /v1/twin/alerts/{id}/ack</code></td>\n</tr>\n<tr>\n<td>事件</td>\n<td><code>twin.model.imported</code>, <code>twin.element.linked</code>, <code>twin.iot_event.received</code>, <code>twin.alert.created</code>, <code>twin.snapshot.created</code></td>\n</tr>\n<tr>\n<td>验收</td>\n<td>任一孪生构件必须能追溯到 IFC/模型元素、BOM 行、生产批次、安装记录和验收记录。</td>\n</tr>\n</tbody></table>\n<h4>1.5.12 <code>digital_archive</code> 数字档案</h4>\n<table>\n<thead>\n<tr>\n<th>项</th>\n<th>设计</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>核心职责</td>\n<td>生成项目、合同、图纸、BOM、BOQ、生产、施工、验收、财务、审计的长期档案包和证据链。</td>\n</tr>\n<tr>\n<td>核心对象</td>\n<td><code>archive_packages</code>, <code>archive_items</code>, <code>retention_policies</code>, <code>evidence_chains</code>, <code>archive_exports</code>, <code>integrity_checks</code></td>\n</tr>\n<tr>\n<td>主页面</td>\n<td><code>/app/modules/digital_archive</code></td>\n</tr>\n<tr>\n<td>子页面</td>\n<td>项目档案、归档包、证据链、完整性校验、保存期限、导出</td>\n</tr>\n<tr>\n<td>输入</td>\n<td>全模块发布态交付物、审批记录、审计事件、源文件、派生文件</td>\n</tr>\n<tr>\n<td>输出</td>\n<td><code>archive_package.v1</code>, <code>evidence_chain.v1</code>, <code>integrity_report.v1</code>, <code>handover_archive.v1</code></td>\n</tr>\n<tr>\n<td>关键表</td>\n<td><code>archive_packages</code>, <code>archive_items</code>, <code>archive_item_links</code>, <code>retention_policies</code>, <code>evidence_chain_nodes</code>, <code>integrity_checks</code>, <code>archive_exports</code></td>\n</tr>\n<tr>\n<td>关键工作流</td>\n<td>选择项目/阶段 -&gt; 收集发布态交付物 -&gt; 完整性校验 -&gt; 证据链生成 -&gt; 档案审批 -&gt; 导出/封存</td>\n</tr>\n<tr>\n<td>Agent</td>\n<td><code>ArchivePackAgent</code>, <code>EvidenceChainAgent</code>, <code>IntegrityCheckAgent</code>, <code>RetentionPolicyAgent</code></td>\n</tr>\n<tr>\n<td>API</td>\n<td><code>POST /v1/archive/packages</code>, <code>POST /v1/archive/packages/{id}/collect</code>, <code>POST /v1/archive/packages/{id}/integrity-check</code>, <code>POST /v1/archive/packages/{id}/export</code></td>\n</tr>\n<tr>\n<td>事件</td>\n<td><code>archive.package.created</code>, <code>archive.item.collected</code>, <code>archive.integrity.checked</code>, <code>archive.package.sealed</code>, <code>archive.export.completed</code></td>\n</tr>\n<tr>\n<td>验收</td>\n<td>归档包必须包含源文件、发布文件、审批、审计、校验报告和 checksum；缺项必须列出责任模块。</td>\n</tr>\n</tbody></table>\n<h4>1.5.13 <code>finance_management</code> 财务管理</h4>\n<table>\n<thead>\n<tr>\n<th>项</th>\n<th>设计</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>核心职责</td>\n<td>管理预算、合同、付款、发票、凭证、对账、结算和财务审计证据,与造价、采购、生产、施工、人力打通。</td>\n</tr>\n<tr>\n<td>核心对象</td>\n<td><code>budgets</code>, <code>contracts</code>, <code>payment_requests</code>, <code>invoices</code>, <code>voucher_templates</code>, <code>vouchers</code>, <code>reconciliation_runs</code>, <code>settlement_documents</code></td>\n</tr>\n<tr>\n<td>主页面</td>\n<td><code>/app/modules/finance_management</code></td>\n</tr>\n<tr>\n<td>子页面</td>\n<td>预算、合同、付款、发票、凭证、对账、结算、财务审计</td>\n</tr>\n<tr>\n<td>输入</td>\n<td><code>quote_version.v1</code>, <code>purchase_order.v1</code>, <code>receiving_record.v1</code>, <code>timesheet.v1</code>, <code>acceptance_record.v1</code>, 发票/银行流水</td>\n</tr>\n<tr>\n<td>输出</td>\n<td><code>budget.v1</code>, <code>payment_record.v1</code>, <code>voucher.v1</code>, <code>reconciliation_report.v1</code>, <code>settlement_document.v1</code></td>\n</tr>\n<tr>\n<td>关键表</td>\n<td><code>budgets</code>, <code>contracts</code>, <code>payment_requests</code>, <code>invoice_records</code>, <code>voucher_templates</code>, <code>vouchers</code>, <code>reconciliation_runs</code>, <code>settlement_documents</code>, <code>financial_audit_events</code></td>\n</tr>\n<tr>\n<td>关键工作流</td>\n<td>预算形成 -&gt; 合同登记 -&gt; 付款申请 -&gt; 发票匹配 -&gt; 凭证生成 -&gt; 对账 -&gt; 结算 -&gt; 财务归档</td>\n</tr>\n<tr>\n<td>Agent</td>\n<td><code>BudgetAgent</code>, <code>InvoiceMatchAgent</code>, <code>VoucherAgent</code>, <code>ReconciliationAgent</code>, <code>SettlementReviewAgent</code></td>\n</tr>\n<tr>\n<td>API</td>\n<td><code>POST /v1/finance/budgets</code>, <code>POST /v1/finance/payment-requests</code>, <code>POST /v1/finance/vouchers/generate</code>, <code>POST /v1/finance/reconciliation-runs</code></td>\n</tr>\n<tr>\n<td>事件</td>\n<td><code>finance.budget.approved</code>, <code>finance.payment.requested</code>, <code>finance.invoice.matched</code>, <code>finance.voucher.generated</code>, <code>finance.reconciliation.completed</code></td>\n</tr>\n<tr>\n<td>验收</td>\n<td>财务凭证必须追溯合同、采购/验收/工时/发票/付款来源；AI 只能生成草稿,过账必须人工审批。</td>\n</tr>\n</tbody></table>\n<h4>1.5.14 <code>human_resources</code> 人力资源</h4>\n<table>\n<thead>\n<tr>\n<th>项</th>\n<th>设计</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>核心职责</td>\n<td>管理组织、岗位、人员、班组、资质、考勤、工时、培训、绩效和施工/生产资源供给。</td>\n</tr>\n<tr>\n<td>核心对象</td>\n<td><code>organizations</code>, <code>positions</code>, <code>employees</code>, <code>crews</code>, <code>qualifications</code>, <code>attendance_records</code>, <code>timesheets</code>, <code>training_records</code>, <code>performance_records</code></td>\n</tr>\n<tr>\n<td>主页面</td>\n<td><code>/app/modules/human_resources</code></td>\n</tr>\n<tr>\n<td>子页面</td>\n<td>组织、岗位、人员、班组、资质、考勤、工时、培训、绩效</td>\n</tr>\n<tr>\n<td>输入</td>\n<td>员工资料、资质证书、项目计划、生产/施工任务、考勤设备或移动端确认</td>\n</tr>\n<tr>\n<td>输出</td>\n<td><code>crew_assignment.v1</code>, <code>qualification_status.v1</code>, <code>timesheet.v1</code>, <code>training_record.v1</code>, <code>performance_record.v1</code></td>\n</tr>\n<tr>\n<td>关键表</td>\n<td><code>organizations</code>, <code>positions</code>, <code>employees</code>, <code>employee_qualifications</code>, <code>crews</code>, <code>crew_members</code>, <code>attendance_records</code>, <code>timesheets</code>, <code>training_records</code>, <code>performance_records</code></td>\n</tr>\n<tr>\n<td>关键工作流</td>\n<td>人员建档 -&gt; 资质登记 -&gt; 班组组建 -&gt; 项目派工 -&gt; 考勤/工时 -&gt; 绩效/结算依据 -&gt; 财务/计划回写</td>\n</tr>\n<tr>\n<td>Agent</td>\n<td><code>CrewAssignmentAgent</code>, <code>QualificationCheckAgent</code>, <code>TimesheetAgent</code>, <code>TrainingReminderAgent</code>, <code>PerformanceSummaryAgent</code></td>\n</tr>\n<tr>\n<td>API</td>\n<td><code>POST /v1/hr/employees</code>, <code>POST /v1/hr/crews</code>, <code>POST /v1/hr/timesheets</code>, <code>POST /v1/hr/qualifications/validate</code></td>\n</tr>\n<tr>\n<td>事件</td>\n<td><code>hr.employee.created</code>, <code>hr.qualification.expiring</code>, <code>hr.crew.assigned</code>, <code>hr.timesheet.submitted</code>, <code>hr.performance.generated</code></td>\n</tr>\n<tr>\n<td>验收</td>\n<td>派工必须检查资质、岗位和项目权限；工时必须能追溯到项目、任务、班组和审批。</td>\n</tr>\n</tbody></table>\n<h4>1.5.15 <code>ai_center</code> AI 中心</h4>\n<table>\n<thead>\n<tr>\n<th>项</th>\n<th>设计</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>核心职责</td>\n<td>统一管理模型、推理路由、工具路由、RAG、Agent、知识源、成本、限流、安全策略和 AI 审计。业务模块不得直接调用外部模型。</td>\n</tr>\n<tr>\n<td>核心对象</td>\n<td><code>model_providers</code>, <code>model_routes</code>, <code>tool_registry</code>, <code>tool_policies</code>, <code>rag_sources</code>, <code>agent_profiles</code>, <code>agent_runs</code>, <code>ai_cost_events</code>, <code>eval_runs</code></td>\n</tr>\n<tr>\n<td>主页面</td>\n<td><code>/app/modules/ai_center</code></td>\n</tr>\n<tr>\n<td>子页面</td>\n<td>模型路由、工具路由、RAG、Agent、MCP、评测、成本、审计、安全策略</td>\n</tr>\n<tr>\n<td>输入</td>\n<td>模型配置、供应商密钥、知识源、工具清单、模块策略、审计规则</td>\n</tr>\n<tr>\n<td>输出</td>\n<td><code>model_route.v1</code>, <code>tool_policy.v1</code>, <code>agent_profile.v1</code>, <code>rag_index.v1</code>, <code>ai_cost_report.v1</code>, <code>eval_report.v1</code></td>\n</tr>\n<tr>\n<td>关键表</td>\n<td><code>model_providers</code>, <code>model_routes</code>, <code>tool_registry</code>, <code>tool_policies</code>, <code>rag_sources</code>, <code>rag_chunks</code>, <code>agent_profiles</code>, <code>agent_runs</code>, <code>agent_tool_calls</code>, <code>ai_cost_events</code>, <code>eval_runs</code></td>\n</tr>\n<tr>\n<td>关键工作流</td>\n<td>注册模型 -&gt; 定义路由 -&gt; 注册工具 -&gt; 配置 Agent -&gt; 绑定模块策略 -&gt; 运行审计 -&gt; 成本/质量评估 -&gt; 策略调整</td>\n</tr>\n<tr>\n<td>Agent</td>\n<td><code>ModelRoutingAgent</code>, <code>ToolPolicyAgent</code>, <code>RagIndexAgent</code>, <code>EvalAgent</code>, <code>CostGuardAgent</code></td>\n</tr>\n<tr>\n<td>API</td>\n<td><code>POST /v1/ai/model-routes</code>, <code>POST /v1/ai/tool-policies</code>, <code>POST /v1/ai/agent-runs</code>, <code>GET /v1/ai/cost-events</code>, <code>POST /v1/ai/evals</code></td>\n</tr>\n<tr>\n<td>事件</td>\n<td><code>ai.model_route.updated</code>, <code>ai.tool_policy.published</code>, <code>ai.agent_run.completed</code>, <code>ai.cost.threshold_exceeded</code>, <code>ai.eval.completed</code></td>\n</tr>\n<tr>\n<td>验收</td>\n<td>每次 AI 调用必须记录模型、输入引用、工具调用、输出引用、成本、策略、审批状态和审计 ID。</td>\n</tr>\n</tbody></table>\n<h4>1.5.16 <code>settings_center</code> 设置中心</h4>\n<table>\n<thead>\n<tr>\n<th>项</th>\n<th>设计</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>核心职责</td>\n<td>管理租户、组织、账号、角色、权限、审批矩阵、模块注册、数据字典、系统参数、连接器、密钥、运行时配置和数据库巡检。</td>\n</tr>\n<tr>\n<td>核心对象</td>\n<td><code>tenants</code>, <code>organizations</code>, <code>users</code>, <code>roles</code>, <code>permissions</code>, <code>approval_matrices</code>, <code>module_registry_entries</code>, <code>data_dictionaries</code>, <code>system_settings</code>, <code>connector_configs</code>, <code>secrets</code></td>\n</tr>\n<tr>\n<td>主页面</td>\n<td><code>/app/modules/settings_center</code></td>\n</tr>\n<tr>\n<td>子页面</td>\n<td>租户、组织、账号、角色、权限、审批矩阵、模块注册、数据字典、连接器、密钥、数据库运行态</td>\n</tr>\n<tr>\n<td>输入</td>\n<td>企业组织架构、账号申请、权限申请、审批制度、系统参数、数据库/存储/消息队列连接</td>\n</tr>\n<tr>\n<td>输出</td>\n<td><code>identity.v1</code>, <code>rbac_policy.v1</code>, <code>approval_matrix.v1</code>, <code>module_registry.v1</code>, <code>system_config.v1</code>, <code>runtime_health_report.v1</code></td>\n</tr>\n<tr>\n<td>关键表</td>\n<td><code>tenants</code>, <code>organizations</code>, <code>users</code>, <code>roles</code>, <code>permissions</code>, <code>role_bindings</code>, <code>approval_matrices</code>, <code>module_registry_entries</code>, <code>data_dictionaries</code>, <code>system_settings</code>, <code>connector_configs</code>, <code>secrets</code>, <code>runtime_health_checks</code></td>\n</tr>\n<tr>\n<td>关键工作流</td>\n<td>租户初始化 -&gt; 账号开通 -&gt; 角色绑定 -&gt; 审批矩阵配置 -&gt; 模块启用 -&gt; 字典发布 -&gt; 运行时巡检 -&gt; 审计归档</td>\n</tr>\n<tr>\n<td>Agent</td>\n<td><code>PermissionReviewAgent</code>, <code>ApprovalMatrixAgent</code>, <code>ConfigDriftAgent</code>, <code>RuntimeHealthAgent</code>, <code>DataDictionaryAgent</code></td>\n</tr>\n<tr>\n<td>API</td>\n<td><code>POST /v1/settings/users</code>, <code>POST /v1/settings/role-bindings</code>, <code>POST /v1/settings/approval-matrices</code>, <code>POST /v1/settings/runtime-health-checks</code></td>\n</tr>\n<tr>\n<td>事件</td>\n<td><code>settings.user.created</code>, <code>settings.permission.changed</code>, <code>settings.approval_matrix.published</code>, <code>settings.runtime.health_checked</code>, <code>settings.config.changed</code></td>\n</tr>\n<tr>\n<td>验收</td>\n<td>权限变更、审批矩阵变更、密钥变更和模块启停必须写审计；任何业务模块不得绕过设置中心直接定义权限。</td>\n</tr>\n</tbody></table>\n<h3>1.6 模块交付物发布规则</h3>\n<table>\n<thead>\n<tr>\n<th>状态</th>\n<th>含义</th>\n<th>下游可见性</th>\n</tr>\n</thead>\n<tbody><tr>\n<td><code>draft</code></td>\n<td>人工或 AI 生成草稿</td>\n<td>仅本模块编辑者可见</td>\n</tr>\n<tr>\n<td><code>generated</code></td>\n<td>Agent 已生成交付物</td>\n<td>不可作为下游依据</td>\n</tr>\n<tr>\n<td><code>evaluated</code></td>\n<td>Evaluator 已做质量评估</td>\n<td>可内部讨论,不可发布</td>\n</tr>\n<tr>\n<td><code>rule_checked</code></td>\n<td>规则引擎已校核</td>\n<td>有阻断项则不可提交</td>\n</tr>\n<tr>\n<td><code>schema_validated</code></td>\n<td>Schema 合同通过</td>\n<td>可提交审批</td>\n</tr>\n<tr>\n<td><code>reviewing</code></td>\n<td>专业/业务复核中</td>\n<td>下游只可预览</td>\n</tr>\n<tr>\n<td><code>approved</code></td>\n<td>审批通过</td>\n<td>可进入发布动作</td>\n</tr>\n<tr>\n<td><code>issued</code></td>\n<td>已发布</td>\n<td>下游模块可消费</td>\n</tr>\n<tr>\n<td><code>archived</code></td>\n<td>已归档</td>\n<td>只读,可审计</td>\n</tr>\n<tr>\n<td><code>blocked</code></td>\n<td>阻断</td>\n<td>必须退回来源模块处理</td>\n</tr>\n</tbody></table>\n<h3>1.7 模块间主数据所有权</h3>\n<table>\n<thead>\n<tr>\n<th>主数据</th>\n<th>Owner</th>\n<th>Reader</th>\n<th>修改规则</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>客户、联系人</td>\n<td><code>marketing_service</code></td>\n<td>计划、财务、档案</td>\n<td>修改需保留客户证据和历史版本</td>\n</tr>\n<tr>\n<td>项目、WBS、里程碑</td>\n<td><code>planning_management</code></td>\n<td>全模块</td>\n<td>基线发布后只能通过变更流程修改</td>\n</tr>\n<tr>\n<td>标准、规则、构件字典</td>\n<td><code>standard_library</code></td>\n<td>全模块</td>\n<td>发布版本只读,新版本并行</td>\n</tr>\n<tr>\n<td>图纸、模型、BOM</td>\n<td><code>detailed_design</code></td>\n<td>造价、采购、生产、施工、孪生、档案</td>\n<td>下游只读 <code>issued</code> 版本</td>\n</tr>\n<tr>\n<td>BOQ、价格、成本</td>\n<td><code>quantity_costing</code></td>\n<td>采购、财务、计划</td>\n<td>报价发布后变更必须有审批</td>\n</tr>\n<tr>\n<td>采购、批次、库存</td>\n<td><code>material_logistics</code></td>\n<td>生产、施工、财务、档案</td>\n<td>入库/签收后改动必须有冲销或更正记录</td>\n</tr>\n<tr>\n<td>工单、质检、发运</td>\n<td><code>production_manufacturing</code></td>\n<td>施工、财务、档案</td>\n<td>质检和发运记录不可物理删除</td>\n</tr>\n<tr>\n<td>施工、验收、整改</td>\n<td><code>construction_management</code></td>\n<td>孪生、档案、财务</td>\n<td>验收签字后只允许补充记录</td>\n</tr>\n<tr>\n<td>孪生模型、设备事件</td>\n<td><code>digital_twin</code></td>\n<td>施工、档案</td>\n<td>设备事件不可改写,只能追加</td>\n</tr>\n<tr>\n<td>档案包</td>\n<td><code>digital_archive</code></td>\n<td>全模块</td>\n<td>封存后只读</td>\n</tr>\n<tr>\n<td>财务凭证和付款</td>\n<td><code>finance_management</code></td>\n<td>档案、管理层</td>\n<td>过账后按财务制度更正</td>\n</tr>\n<tr>\n<td>员工、班组、工时</td>\n<td><code>human_resources</code></td>\n<td>计划、施工、生产、财务</td>\n<td>工时审批后只能更正</td>\n</tr>\n<tr>\n<td>模型/工具/Agent 策略</td>\n<td><code>ai_center</code></td>\n<td>全模块</td>\n<td>策略发布走审计和回滚</td>\n</tr>\n<tr>\n<td>账号、角色、权限</td>\n<td><code>settings_center</code></td>\n<td>全模块</td>\n<td>所有变更写审计</td>\n</tr>\n</tbody></table>\n<hr>\n<h2>2. 全产品数据架构</h2>\n<h3>2.1 数据域</h3>\n<table>\n<thead>\n<tr>\n<th>数据域</th>\n<th>核心表 / 存储</th>\n<th>责任模块</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>身份权限域</td>\n<td>tenants, users, roles, permissions, role_bindings, approval_matrices</td>\n<td><code>settings_center</code></td>\n</tr>\n<tr>\n<td>CDE 文件域</td>\n<td>module_files, file_versions, object_store_objects, file_permissions</td>\n<td>全模块</td>\n</tr>\n<tr>\n<td>项目域</td>\n<td>projects, project_plans, wbs_items, milestones, risks, changes</td>\n<td><code>planning_management</code></td>\n</tr>\n<tr>\n<td>客户与合同域</td>\n<td>leads, contacts, requirements, quote_drafts, contracts</td>\n<td><code>marketing_service</code>, <code>finance_management</code></td>\n</tr>\n<tr>\n<td>标准与规则域</td>\n<td>standards, clauses, terminology, rules, sjg157_categories, naming_rules</td>\n<td><code>standard_library</code></td>\n</tr>\n<tr>\n<td>设计域</td>\n<td>concept_variants, drawings, bim_models, structure_calcs, clash_reports</td>\n<td><code>concept_design</code>, <code>detailed_design</code></td>\n</tr>\n<tr>\n<td>BOM 域</td>\n<td>bom_documents, bom_versions, bom_lines, validation_results, weight_results</td>\n<td><code>detailed_design</code></td>\n</tr>\n<tr>\n<td>造价域</td>\n<td>boq_items, cost_breakdowns, price_snapshots, change_cost_impacts</td>\n<td><code>quantity_costing</code></td>\n</tr>\n<tr>\n<td>采购物流域</td>\n<td>suppliers, purchase_orders, shipments, receiving_records, inventory_batches</td>\n<td><code>material_logistics</code></td>\n</tr>\n<tr>\n<td>生产域</td>\n<td>work_orders, cnc_files, qc_records, production_batches, dispatch_batches</td>\n<td><code>production_manufacturing</code></td>\n</tr>\n<tr>\n<td>施工域</td>\n<td>schedules, crews, daily_logs, inspections, acceptance_reports, rectifications</td>\n<td><code>construction_management</code></td>\n</tr>\n<tr>\n<td>孪生域</td>\n<td>twin_models, iot_streams, alerts, maintenance_plans</td>\n<td><code>digital_twin</code></td>\n</tr>\n<tr>\n<td>档案域</td>\n<td>archives, archive_items, retention_policies, archive_packages</td>\n<td><code>digital_archive</code></td>\n</tr>\n<tr>\n<td>财务域</td>\n<td>budgets, invoices, payments, voucher_templates, vouchers, reconciliation_runs</td>\n<td><code>finance_management</code></td>\n</tr>\n<tr>\n<td>人力域</td>\n<td>employees, qualifications, attendance_records, timesheets, training_records</td>\n<td><code>human_resources</code></td>\n</tr>\n<tr>\n<td>AI 域</td>\n<td>model_routes, tool_policies, rag_sources, agent_runs, ai_cost_events</td>\n<td><code>ai_center</code></td>\n</tr>\n<tr>\n<td>审计域</td>\n<td>audit_events, module_transactions, approval_tasks, event_outbox</td>\n<td>全模块</td>\n</tr>\n</tbody></table>\n<h3>2.2 数据能力与物理存储</h3>\n<table>\n<thead>\n<tr>\n<th>能力</th>\n<th>默认实现</th>\n<th>扩展实现</th>\n<th>使用场景</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>TransactionStore</td>\n<td>PostgreSQL</td>\n<td>Supabase Postgres</td>\n<td>业务事务、版本、审批</td>\n</tr>\n<tr>\n<td>ObjectStore</td>\n<td>S3 兼容对象存储 / SeaweedFS</td>\n<td>MinIO 隔离替代、云对象存储</td>\n<td>IFC、DWG、Office 文档、PDF、图片、视频、归档包</td>\n</tr>\n<tr>\n<td>VectorStore</td>\n<td>PostgreSQL pgvector</td>\n<td>Qdrant</td>\n<td>标准检索、图纸片段、RAG</td>\n</tr>\n<tr>\n<td>EventStore</td>\n<td>PostgreSQL outbox</td>\n<td>NATS JetStream</td>\n<td>工作流事件、异步任务</td>\n</tr>\n<tr>\n<td>CacheStore</td>\n<td>Valkey</td>\n<td>Redis-compatible adapter</td>\n<td>会话、锁、队列状态</td>\n</tr>\n<tr>\n<td>TimeSeriesStore</td>\n<td>PostgreSQL 分区表</td>\n<td>ClickHouse</td>\n<td>IoT、进度、设备状态</td>\n</tr>\n<tr>\n<td>GraphStore</td>\n<td>PostgreSQL adjacency</td>\n<td>Neo4j/AGE 等隔离适配</td>\n<td>构件关系、供应链、工作流依赖</td>\n</tr>\n<tr>\n<td>AnalyticsStore</td>\n<td>PostgreSQL materialized view</td>\n<td>ClickHouse</td>\n<td>BI、进度、成本、效率</td>\n</tr>\n</tbody></table>\n<h3>2.3 全局核心表</h3>\n<pre><code class=\"language-sql\">CREATE TABLE modules (\n    id TEXT PRIMARY KEY,\n    zh_name TEXT NOT NULL,\n    en_name TEXT NOT NULL,\n    order_num INTEGER NOT NULL,\n    enabled BOOLEAN NOT NULL DEFAULT TRUE\n);\n\nCREATE TABLE module_transactions (\n    id UUID PRIMARY KEY DEFAULT gen_random_uuid(),\n    tenant_id UUID NOT NULL,\n    module_id TEXT NOT NULL REFERENCES modules(id),\n    object_type TEXT NOT NULL,\n    object_id UUID NOT NULL,\n    state TEXT NOT NULL,\n    previous_state TEXT,\n    action TEXT NOT NULL,\n    actor_id UUID,\n    metadata JSONB NOT NULL DEFAULT &#39;{}&#39;::jsonb,\n    created_at TIMESTAMPTZ NOT NULL DEFAULT NOW()\n);\n\nCREATE TABLE approval_tasks (\n    id UUID PRIMARY KEY DEFAULT gen_random_uuid(),\n    tenant_id UUID NOT NULL,\n    module_id TEXT NOT NULL REFERENCES modules(id),\n    transaction_id UUID REFERENCES module_transactions(id),\n    object_type TEXT NOT NULL,\n    object_id UUID NOT NULL,\n    approver_id UUID,\n    role_key TEXT NOT NULL,\n    state TEXT NOT NULL,\n    comment TEXT NOT NULL DEFAULT &#39;&#39;,\n    created_at TIMESTAMPTZ NOT NULL DEFAULT NOW(),\n    updated_at TIMESTAMPTZ NOT NULL DEFAULT NOW()\n);\n\nCREATE TABLE audit_events (\n    id UUID PRIMARY KEY DEFAULT gen_random_uuid(),\n    tenant_id UUID NOT NULL,\n    module_id TEXT NOT NULL REFERENCES modules(id),\n    actor_id UUID,\n    event_type TEXT NOT NULL,\n    object_type TEXT NOT NULL,\n    object_id TEXT NOT NULL,\n    before JSONB,\n    after JSONB,\n    evidence JSONB NOT NULL DEFAULT &#39;{}&#39;::jsonb,\n    created_at TIMESTAMPTZ NOT NULL DEFAULT NOW()\n);\n</code></pre>\n<h3>2.4 文件真源表</h3>\n<pre><code class=\"language-sql\">CREATE TABLE module_files (\n    id UUID PRIMARY KEY DEFAULT gen_random_uuid(),\n    tenant_id UUID NOT NULL,\n    project_id UUID,\n    module_id TEXT NOT NULL REFERENCES modules(id),\n    parent_id UUID REFERENCES module_files(id),\n    name TEXT NOT NULL,\n    file_kind TEXT NOT NULL,\n    mime_type TEXT NOT NULL DEFAULT &#39;&#39;,\n    object_key TEXT NOT NULL DEFAULT &#39;&#39;,\n    sha256 TEXT NOT NULL DEFAULT &#39;&#39;,\n    size_bytes BIGINT NOT NULL DEFAULT 0,\n    status TEXT NOT NULL DEFAULT &#39;draft&#39;,\n    current_version INTEGER NOT NULL DEFAULT 1,\n    owner_id UUID,\n    metadata JSONB NOT NULL DEFAULT &#39;{}&#39;::jsonb,\n    created_at TIMESTAMPTZ NOT NULL DEFAULT NOW(),\n    updated_at TIMESTAMPTZ NOT NULL DEFAULT NOW()\n);\n\nCREATE TABLE file_versions (\n    id UUID PRIMARY KEY DEFAULT gen_random_uuid(),\n    tenant_id UUID NOT NULL,\n    file_id UUID NOT NULL REFERENCES module_files(id) ON DELETE CASCADE,\n    version_no INTEGER NOT NULL,\n    object_key TEXT NOT NULL,\n    sha256 TEXT NOT NULL,\n    size_bytes BIGINT NOT NULL,\n    created_by UUID,\n    created_at TIMESTAMPTZ NOT NULL DEFAULT NOW(),\n    UNIQUE(file_id, version_no)\n);\n</code></pre>\n<hr>\n<h2>3. 全产品智能体架构</h2>\n<h3>3.1 Agent 分层</h3>\n<table>\n<thead>\n<tr>\n<th>层级</th>\n<th>Agent 类型</th>\n<th>职责</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>L1 个体智能体</td>\n<td>单任务 Agent</td>\n<td>抽取字段、解析文件、生成草稿、匹配类目、计算重量</td>\n</tr>\n<tr>\n<td>L2 流程智能体</td>\n<td>工作流 Agent</td>\n<td>串联导入、校验、审批、导出、下游同步</td>\n</tr>\n<tr>\n<td>L3 企业智能体</td>\n<td>经营协同 Agent</td>\n<td>计划、成本、采购、生产、施工、财务、人力跨模块协同</td>\n</tr>\n</tbody></table>\n<h3>3.2 全局 Agent 门禁</h3>\n<pre><code class=\"language-text\">User / Event\n  -&gt; Planner\n  -&gt; ToolRouter\n  -&gt; Generator\n  -&gt; Evaluator\n  -&gt; RuleChecker\n  -&gt; SchemaValidator\n  -&gt; Approver\n  -&gt; Artifact / Transaction / Audit\n</code></pre>\n<h3>3.3 模块 Agent 清单</h3>\n<table>\n<thead>\n<tr>\n<th>模块</th>\n<th>Agent</th>\n<th>输入</th>\n<th>输出</th>\n</tr>\n</thead>\n<tbody><tr>\n<td><code>marketing_service</code></td>\n<td><code>RequirementCaptureAgent</code></td>\n<td>聊天、会议、图片、文档</td>\n<td>需求结构化 JSON</td>\n</tr>\n<tr>\n<td><code>marketing_service</code></td>\n<td><code>QuoteDraftAgent</code></td>\n<td>需求、历史价格、方案模板</td>\n<td>报价草案</td>\n</tr>\n<tr>\n<td><code>planning_management</code></td>\n<td><code>WbsPlannerAgent</code></td>\n<td>需求、合同、资源</td>\n<td>WBS、里程碑</td>\n</tr>\n<tr>\n<td><code>planning_management</code></td>\n<td><code>RiskChangeAgent</code></td>\n<td>计划、变更、现场反馈</td>\n<td>风险和变更建议</td>\n</tr>\n<tr>\n<td><code>concept_design</code></td>\n<td><code>ConceptGeneratorAgent</code></td>\n<td>需求、风格、面积、约束</td>\n<td>多方案草稿</td>\n</tr>\n<tr>\n<td><code>concept_design</code></td>\n<td><code>ConceptEvaluatorAgent</code></td>\n<td>方案、规则、客户偏好</td>\n<td>方案评分</td>\n</tr>\n<tr>\n<td><code>standard_library</code></td>\n<td><code>StandardIngestionAgent</code></td>\n<td>标准文件、规范、企业制度</td>\n<td>条文索引</td>\n</tr>\n<tr>\n<td><code>standard_library</code></td>\n<td><code>ComponentLibraryAgent</code></td>\n<td>SJG157、命名规则、构件库</td>\n<td>构件模板</td>\n</tr>\n<tr>\n<td><code>detailed_design</code></td>\n<td><code>DrawingParseAgent</code></td>\n<td>DWG/DXF/PDF/IFC</td>\n<td>图纸对象索引</td>\n</tr>\n<tr>\n<td><code>detailed_design</code></td>\n<td><code>ComponentBomImportAgent</code></td>\n<td>XLSX、图纸、IFC</td>\n<td>BOM 行项</td>\n</tr>\n<tr>\n<td><code>detailed_design</code></td>\n<td><code>DesignRuleCheckAgent</code></td>\n<td>图纸、BOM、标准</td>\n<td>校验报告</td>\n</tr>\n<tr>\n<td><code>quantity_costing</code></td>\n<td><code>BoqExtractAgent</code></td>\n<td>IFC、BOM、图纸</td>\n<td>工程量清单</td>\n</tr>\n<tr>\n<td><code>quantity_costing</code></td>\n<td><code>CostingAgent</code></td>\n<td>BOQ、价格库、定额</td>\n<td>成本测算</td>\n</tr>\n<tr>\n<td><code>material_logistics</code></td>\n<td><code>ProcurementPlanAgent</code></td>\n<td>BOM、BOQ、库存、供应商</td>\n<td>采购计划</td>\n</tr>\n<tr>\n<td><code>material_logistics</code></td>\n<td><code>ShipmentPlanAgent</code></td>\n<td>批次、场地、运输约束</td>\n<td>物流计划</td>\n</tr>\n<tr>\n<td><code>production_manufacturing</code></td>\n<td><code>WorkOrderAgent</code></td>\n<td>issued BOM、图纸、工艺</td>\n<td>工单</td>\n</tr>\n<tr>\n<td><code>production_manufacturing</code></td>\n<td><code>QcAgent</code></td>\n<td>工单、质检规则、照片</td>\n<td>质检记录</td>\n</tr>\n<tr>\n<td><code>construction_management</code></td>\n<td><code>SiteScheduleAgent</code></td>\n<td>计划、批次、班组</td>\n<td>施工排程</td>\n</tr>\n<tr>\n<td><code>construction_management</code></td>\n<td><code>InspectionAgent</code></td>\n<td>现场照片、BOM、规范</td>\n<td>验收/整改</td>\n</tr>\n<tr>\n<td><code>digital_twin</code></td>\n<td><code>TwinSyncAgent</code></td>\n<td>IFC、IoT、施工状态</td>\n<td>孪生更新</td>\n</tr>\n<tr>\n<td><code>digital_archive</code></td>\n<td><code>ArchivePackAgent</code></td>\n<td>发布交付物、审计</td>\n<td>归档包</td>\n</tr>\n<tr>\n<td><code>finance_management</code></td>\n<td><code>VoucherAgent</code></td>\n<td>合同、付款、发票、业务单据</td>\n<td>凭证草稿</td>\n</tr>\n<tr>\n<td><code>finance_management</code></td>\n<td><code>ReconciliationAgent</code></td>\n<td>业务单据、银行/票据</td>\n<td>对账差异</td>\n</tr>\n<tr>\n<td><code>human_resources</code></td>\n<td><code>CrewAssignmentAgent</code></td>\n<td>计划、资质、班组</td>\n<td>班组安排</td>\n</tr>\n<tr>\n<td><code>human_resources</code></td>\n<td><code>TimesheetAgent</code></td>\n<td>日志、考勤、工单</td>\n<td>工时</td>\n</tr>\n<tr>\n<td><code>ai_center</code></td>\n<td><code>ModelRoutingAgent</code></td>\n<td>任务、成本、SLA、权限</td>\n<td>模型路由策略</td>\n</tr>\n<tr>\n<td><code>settings_center</code></td>\n<td><code>PermissionReviewAgent</code></td>\n<td>用户、岗位、审批矩阵</td>\n<td>权限建议</td>\n</tr>\n</tbody></table>\n<h3>3.4 Agent 输出合同</h3>\n<pre><code class=\"language-json\">{\n  &quot;agent_run_id&quot;: &quot;uuid&quot;,\n  &quot;module_id&quot;: &quot;detailed_design&quot;,\n  &quot;agent_key&quot;: &quot;ComponentBomImportAgent&quot;,\n  &quot;input_refs&quot;: [&quot;file:...&quot;, &quot;bom_version:...&quot;],\n  &quot;tool_calls&quot;: [\n    {&quot;tool&quot;: &quot;xlsx_read&quot;, &quot;status&quot;: &quot;succeeded&quot;, &quot;artifact&quot;: &quot;manifest.json&quot;}\n  ],\n  &quot;outputs&quot;: [\n    {&quot;type&quot;: &quot;bom_version&quot;, &quot;id&quot;: &quot;...&quot;},\n    {&quot;type&quot;: &quot;validation_report&quot;, &quot;id&quot;: &quot;...&quot;}\n  ],\n  &quot;ai_state&quot;: &quot;professional_review_required&quot;,\n  &quot;rule_check&quot;: &quot;passed_with_warnings&quot;,\n  &quot;schema_validation&quot;: &quot;passed&quot;,\n  &quot;approval_required&quot;: true,\n  &quot;audit_event_id&quot;: &quot;uuid&quot;\n}\n</code></pre>\n<hr>\n<h2>4. 全产品工作流架构</h2>\n<h3>4.1 项目从线索到归档的状态机</h3>\n<pre><code class=\"language-text\">lead\n  -&gt; requirement_captured\n  -&gt; project_planned\n  -&gt; concept_selected\n  -&gt; detailed_design_draft\n  -&gt; detailed_design_reviewed\n  -&gt; bom_issued\n  -&gt; cost_approved\n  -&gt; procurement_started\n  -&gt; manufacturing_started\n  -&gt; shipment_started\n  -&gt; site_installation\n  -&gt; acceptance_review\n  -&gt; handover\n  -&gt; archived\n</code></pre>\n<h3>4.2 每个模块统一状态</h3>\n<table>\n<thead>\n<tr>\n<th>状态</th>\n<th>含义</th>\n</tr>\n</thead>\n<tbody><tr>\n<td><code>draft</code></td>\n<td>草稿,可编辑</td>\n</tr>\n<tr>\n<td><code>generated</code></td>\n<td>AI 或工具生成</td>\n</tr>\n<tr>\n<td><code>evaluated</code></td>\n<td>已评估</td>\n</tr>\n<tr>\n<td><code>rule_checked</code></td>\n<td>已规则校验</td>\n</tr>\n<tr>\n<td><code>schema_validated</code></td>\n<td>已 Schema 校验</td>\n</tr>\n<tr>\n<td><code>reviewing</code></td>\n<td>人工审核中</td>\n</tr>\n<tr>\n<td><code>approved</code></td>\n<td>已批准</td>\n</tr>\n<tr>\n<td><code>issued</code></td>\n<td>已发布给下游</td>\n</tr>\n<tr>\n<td><code>archived</code></td>\n<td>已归档</td>\n</tr>\n<tr>\n<td><code>blocked</code></td>\n<td>阻断,需修复</td>\n</tr>\n</tbody></table>\n<h3>4.3 跨模块工作流</h3>\n s</code>, <code>approval_matrices</code>, <code>runtime_health_checks</code></td>\n<td>PermissionReviewAgent + ConfigDriftAgent</td>\n<td><code>settings.permission.changed</code></td>\n<td>权限和配置变更必须审计</td>\n</tr>\n</tbody></table>\n<h3>4.6 跨模块对象主键与引用规则</h3>\n<table>\n<thead>\n<tr>\n<th>对象</th>\n<th>全局主键</th>\n<th>版本键</th>\n<th>引用方式</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>项目</td>\n<td><code>project_id</code></td>\n<td><code>plan_baseline_id</code></td>\n<td>所有业务对象必须带 <code>tenant_id</code>, <code>project_id</code></td>\n</tr>\n<tr>\n<td>文件</td>\n<td><code>file_id</code></td>\n<td><code>file_version_id</code></td>\n<td>业务对象只引用文件版本,不引用浏览器临时文件</td>\n</tr>\n<tr>\n<td>交付物</td>\n<td><code>artifact_id</code></td>\n<td><code>artifact_version_id</code></td>\n<td>下游消费 <code>issued</code> 版本</td>\n</tr>\n<tr>\n<td>BOM</td>\n<td><code>bom_document_id</code></td>\n<td><code>bom_version_id</code></td>\n<td>造价/采购/生产/施工必须记录来源 <code>bom_line_id</code></td>\n</tr>\n<tr>\n<td>图纸/模型</td>\n<td><code>drawing_id</code> / <code>model_id</code></td>\n<td><code>drawing_version_id</code> / <code>model_version_id</code></td>\n<td>生产和施工引用发布态图纸版本</td>\n</tr>\n<tr>\n<td>审批</td>\n<td><code>approval_task_id</code></td>\n<td><code>approval_step_id</code></td>\n<td>任一发布动作必须绑定审批记录</td>\n</tr>\n<tr>\n<td>审计</td>\n<td><code>audit_event_id</code></td>\n<td>不变</td>\n<td>任一写操作必须生成审计事件</td>\n</tr>\n<tr>\n<td>Agent 调用</td>\n<td><code>agent_run_id</code></td>\n<td><code>agent_run_step_id</code></td>\n<td>AI 输出必须绑定输入/工具/输出引用</td>\n</tr>\n</tbody></table>\n<h3>4.7 事件命名与幂等规则</h3>\n<table>\n<thead>\n<tr>\n<th>规则</th>\n<th>要求</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>命名</td>\n<td><code>{module}.{object}.{verb}</code>,例如 <code>component_bom.version.issued</code></td>\n</tr>\n<tr>\n<td>幂等键</td>\n<td><code>tenant_id + source_object_id + source_version_id + action + payload_hash</code></td>\n</tr>\n<tr>\n<td>Outbox</td>\n<td>业务事务先写 PostgreSQL,同事务写 <code>event_outbox</code></td>\n</tr>\n<tr>\n<td>消费</td>\n<td>Worker 消费事件后
