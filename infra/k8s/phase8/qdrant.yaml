apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: qdrant
  namespace: architoken-phase8
  labels:
    app.kubernetes.io/name: qdrant
    app.kubernetes.io/component: vector-search
spec:
  serviceName: qdrant
  replicas: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: qdrant
      app.kubernetes.io/component: vector-search
  template:
    metadata:
      labels:
        app.kubernetes.io/name: qdrant
        app.kubernetes.io/component: vector-search
    spec:
      containers:
        - name: qdrant
          image: qdrant/qdrant:v1.13.4
          ports:
            - name: http
              containerPort: 6333
            - name: grpc
              containerPort: 6334
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /livez
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: "1"
              memory: 2Gi
            limits:
              cpu: "4"
              memory: 8Gi
          volumeMounts:
            - name: data
              mountPath: /qdrant/storage
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 100Gi
---
apiVersion: v1
kind: Service
metadata:
  name: qdrant
  namespace: architoken-phase8
  labels:
    app.kubernetes.io/name: qdrant
    app.kubernetes.io/component: vector-search
spec:
  selector:
    app.kubernetes.io/name: qdrant
    app.kubernetes.io/component: vector-search
  ports:
    - name: http
      port: 6333
      targetPort: http
    - name: grpc
      port: 6334
      targetPort: grpc
