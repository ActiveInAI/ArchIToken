F1</td>\n<td>Q235B</td>\n<td>D12_L1200</td>\n<td>40118066</td>\n<td align=\"right\">1</td>\n<td>SET</td>\n<td align=\"right\">48</td>\n<td align=\"right\">48</td>\n</tr>\n<tr>\n<td align=\"right\">10</td>\n<td>钢拉条</td>\n<td>30-03.95.33.30</td>\n<td><code>Connect_KneeBrace_L50X50X5_L600_F1_V0</code></td>\n<td>L50X50X5</td>\n<td align=\"right\">600</td>\n<td>F1</td>\n<td>Q235B</td>\n<td>L50x50x5_L600</td>\n<td>50118067</td>\n<td align=\"right\">1</td>\n<td>SET</td>\n<td align=\"right\">32</td>\n<td align=\"right\">32</td>\n</tr>\n<tr>\n<td align=\"right\">11</td>\n<td>箱型钢柱</td>\n<td>30-03.95.03.10</td>\n<td><code>Column_Main_S200X200X8X12_H3600_F1_V0</code></td>\n<td>S200X200X8X12</td>\n<td align=\"right\">3600</td>\n<td>F1</td>\n<td>Q355D</td>\n<td>S200x200x8x12_H3600</td>\n<td>10118068</td>\n<td align=\"right\">1</td>\n<td>PCS</td>\n<td align=\"right\">5</td>\n<td align=\"right\">5</td>\n</tr>\n<tr>\n<td align=\"right\">12</td>\n<td>螺栓</td>\n<td>30-03.95.42.20.10</td>\n<td><code>Fastener_HighStr_M20_L80_V0</code></td>\n<td>M20</td>\n<td align=\"right\">80</td>\n<td>全楼</td>\n<td>10.9S</td>\n<td>M20_L80</td>\n<td>60118069</td>\n<td align=\"right\">1</td>\n<td>SET</td>\n<td align=\"right\">200</td>\n<td align=\"right\">200</td>\n</tr>\n<tr>\n<td align=\"right\">13</td>\n<td>钢结构锚栓</td>\n<td>30-03.95.42.20.20</td>\n<td><code>Fastener_Anchor_M24_L400_V0</code></td>\n<td>M24</td>\n<td align=\"right\">400</td>\n<td>F0</td>\n<td>Q355D</td>\n<td>M24_L400</td>\n<td>60118070</td>\n<td align=\"right\">1</td>\n<td>SET</td>\n<td align=\"right\">64</td>\n<td align=\"right\">64</td>\n</tr>\n<tr>\n<td align=\"right\">14</td>\n<td>镀锌钢板</td>\n<td>30-03.40.10.20</td>\n<td><code>Plate_Galv_T6_L3000XW1500_F1_V0</code></td>\n<td>T6</td>\n<td align=\"right\">3000</td>\n<td>F1</td>\n<td></td>\n<td>T6_3000x1500</td>\n<td>70118071</td>\n<td align=\"right\">1</td>\n<td>PCS</td>\n<td align=\"right\">20</td>\n<td align=\"right\">20</td>\n</tr>\n</tbody></table>\n<hr>\n<h2>9. BOM 应用应解决的问题</h2>\n<h3>9.1 核心能力</h3>\n<p>ArchIToken 应做的是“可审计、可校验、可追溯、可版本化”的构件物料 BOM:</p>\n<table>\n<thead>\n<tr>\n<th>能力</th>\n<th>Excel 当前状态</th>\n<th>ArchIToken 应实现</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>类目名称与编码联动</td>\n<td>Excel 下拉 / 公式</td>\n<td>数据库外键 + API 校验 + 前端选择器</td>\n</tr>\n<tr>\n<td>构件名称规范</td>\n<td>人工输入</td>\n<td>命名规则解析器 + 自动提示 + 命名 Agent</td>\n</tr>\n<tr>\n<td>截面/长度一致性</td>\n<td>人工检查</td>\n<td>自动解析构件名称并对比字段</td>\n</tr>\n<tr>\n<td>重量</td>\n<td>当前为空</td>\n<td>型钢库/材料密度/公式计算 + 人工确认</td>\n</tr>\n<tr>\n<td>版本</td>\n<td>文件层面版本</td>\n<td>BOM 文档版本 + 行项版本 + 变更记录</td>\n</tr>\n<tr>\n<td>审批</td>\n<td>编制/审核/批准文本</td>\n<td>Module Transaction + Approver + 审计</td>\n</tr>\n<tr>\n<td>来源</td>\n<td>Excel 文件</td>\n<td>源 Excel + 图纸 + IFC + Agent trace</td>\n</tr>\n<tr>\n<td>下游</td>\n<td>人工复制</td>\n<td>造价、采购、生产、施工直接引用 issued 版本</td>\n</tr>\n</tbody></table>\n<h3>9.2 必须自动抓出的现有数据问题</h3>\n<p>系统必须按规则输出以下数据质量问题:</p>\n<table>\n<thead>\n<tr>\n<th align=\"right\">行号</th>\n<th>问题</th>\n<th>规则</th>\n</tr>\n</thead>\n<tbody><tr>\n<td align=\"right\">1</td>\n<td>类目名称是“铜管”,但构件名称是 <code>Column_Main...</code>,材料等级是 Q355D,与铜管类目冲突</td>\n<td><code>category_name/category_code</code> 必须与 <code>component_name</code> 解析类型一致</td>\n</tr>\n<tr>\n<td align=\"right\">1</td>\n<td><code>构件名称</code> 和 <code>规格型号</code> 中为 <code>L5694</code>,但 <code>长度</code> 字段是 5475</td>\n<td>名称、规格型号、长度字段必须一致</td>\n</tr>\n<tr>\n<td align=\"right\">4</td>\n<td>类目名称是“目字形钢柱”,但构件名称是 <code>Beam_Main...</code></td>\n<td><code>Beam</code> 不能映射到“钢柱”类目</td>\n</tr>\n<tr>\n<td align=\"right\">6</td>\n<td>类目名称是“目字形钢柱”,但构件名称是 <code>Beam_Main...</code></td>\n<td>同上</td>\n</tr>\n<tr>\n<td align=\"right\">10</td>\n<td>类目名称是“钢拉条”,但构件名称是 <code>Connect_KneeBrace...</code></td>\n<td>需要确认 KneeBrace 是否归入拉条、支撑或连接件</td>\n</tr>\n<tr>\n<td align=\"right\">14</td>\n<td><code>材料等级</code> 为空</td>\n<td>镀锌钢板应有材料/镀锌层或材质依据</td>\n</tr>\n<tr>\n<td align=\"right\">1-14</td>\n<td>单套重量、总重量为空</td>\n<td>不能进入采购、生产、造价汇总最终态</td>\n</tr>\n</tbody></table>\n<p>校验结果不能直接改原表,应生成 <code>validation_result</code> 和 <code>fix_suggestion</code>,由设计/审核人员确认。</p>\n<hr>\n<h2>10. BOM 数据库模型</h2>\n<h3>10.1 Schema 分区</h3>\n<p>建议新增 schema:</p>\n<pre><code class=\"language-sql\">CREATE SCHEMA IF NOT EXISTS component_bom;\n</code></pre>\n<table>\n<thead>\n<tr>\n<th>表</th>\n<th>作用</th>\n</tr>\n</thead>\n<tbody><tr>\n<td><code>component_bom.sjg157_categories</code></td>\n<td>导入 SJG157 全部 5678 条类目</td>\n</tr>\n<tr>\n<td><code>component_bom.naming_rule_sets</code></td>\n<td>命名规则版本</td>\n</tr>\n<tr>\n<td><code>component_bom.naming_rules</code></td>\n<td>各 Sheet 中的命名公式、实例、释义</td>\n</tr>\n<tr>\n<td><code>component_bom.bom_documents</code></td>\n<td>一张构件物料清单的单据头</td>\n</tr>\n<tr>\n<td><code>component_bom.bom_versions</code></td>\n<td>BOM 版本</td>\n</tr>\n<tr>\n<td><code>component_bom.bom_lines</code></td>\n<td>A-Q 行项主表</td>\n</tr>\n<tr>\n<td><code>component_bom.component_name_tokens</code></td>\n<td>从构件名称解析出的 token</td>\n</tr>\n<tr>\n<td><code>component_bom.line_validation_results</code></td>\n<td>行级校验结果</td>\n</tr>\n<tr>\n<td><code>component_bom.weight_calculation_results</code></td>\n<td>重量计算结果</td>\n</tr>\n<tr>\n<td><code>component_bom.change_records</code></td>\n<td>变更记录</td>\n</tr>\n<tr>\n<td><code>component_bom.export_jobs</code></td>\n<td>导出 Excel/PDF/归档包任务</td>\n</tr>\n</tbody></table>\n<h3>10.2 SJG157 类目表</h3>\n<pre><code class=\"language-sql\">CREATE TABLE component_bom.sjg157_categories (\n    id              UUID PRIMARY KEY DEFAULT gen_random_uuid(),\n    section_no      TEXT NOT NULL,\n    section_name    TEXT NOT NULL,\n    table_code      TEXT NOT NULL,\n    category_code   TEXT NOT NULL,\n    category_name   TEXT NOT NULL,\n    category_name_raw TEXT NOT NULL,\n    hierarchy_level TEXT NOT NULL,\n    ifc_class       TEXT NOT NULL DEFAULT &#39;&#39;,\n    source_file_id  UUID,\n    source_sheet    TEXT NOT NULL,\n    source_row_no   INTEGER NOT NULL,\n    created_at      TIMESTAMPTZ NOT NULL DEFAULT NOW(),\n    UNIQUE (category_code)\n);\n\nCREATE INDEX idx_sjg157_categories_name\n    ON component_bom.sjg157_categories USING gin (category_name gin_trgm_ops);\n</code></pre>\n<p>导入规则:</p>\n<ol>\n<li><code>A1_建筑</code> -&gt; <code>section_no=A.1</code>, <code>section_name=建筑</code>, <code>ifc_class=IfcBuilding</code>。</li>\n<li><code>A2_空间</code> -&gt; <code>section_no=A.2</code>, <code>section_name=空间</code>, <code>ifc_class=IfcSpace</code>。</li>\n<li><code>A3_构件</code> -&gt; <code>section_no=A.3</code>, <code>section_name=构件</code>, <code>ifc_class=IfcElement</code>。</li>\n<li><code>A4_系统</code> -&gt; <code>section_no=A.4</code>, <code>section_name=系统</code>, <code>ifc_class=IfcSystem</code>。</li>\n<li>类目名称要保留原始缩进 <code>category_name_raw</code>,同时保存去掉全角空格的 <code>category_name</code>。</li>\n</ol>\n<h3>10.3 命名规则表</h3>\n<pre><code class=\"language-sql\">CREATE TABLE component_bom.naming_rule_sets (\n    id              UUID PRIMARY KEY DEFAULT gen_random_uuid(),\n    rule_set_key    TEXT NOT NULL UNIQUE,\n    name            TEXT NOT NULL,\n    version_label   TEXT NOT NULL,\n    source_file_id  UUID,\n    status          TEXT NOT NULL DEFAULT &#39;draft&#39;,\n    created_at      TIMESTAMPTZ NOT NULL DEFAULT NOW()\n);\n\nCREATE TABLE component_bom.naming_rules (\n    id              UUID PRIMARY KEY DEFAULT gen_random_uuid(),\n    rule_set_id     UUID NOT NULL REFERENCES component_bom.naming_rule_sets(id) ON DELETE CASCADE,\n    source_sheet    TEXT NOT NULL,\n    line_no         INTEGER NOT NULL,\n    component_group TEXT NOT NULL,\n    component_type_zh TEXT NOT NULL,\n    naming_formula  TEXT NOT NULL,\n    naming_example  TEXT NOT NULL,\n    field_explanation TEXT NOT NULL DEFAULT &#39;&#39;,\n    remark          TEXT NOT NULL DEFAULT &#39;&#39;,\n    created_at      TIMESTAMPTZ NOT NULL DEFAULT NOW()\n);\n</code></pre>\n<h3>10.4 BOM 单据头</h3>\n<pre><code class=\"language-sql\">CREATE TABLE component_bom.bom_documents (\n    id                  UUID PRIMARY KEY DEFAULT gen_random_uuid(),\n    tenant_id           UUID NOT NULL REFERENCES tenants(id) ON DELETE CASCADE,\n    project_id          UUID REFERENCES projects(id) ON DELETE SET NULL,\n    module_id           TEXT NOT NULL REFERENCES modules(id) DEFAULT &#39;detailed_design&#39;,\n    company_name        TEXT NOT NULL,\n    document_title      TEXT NOT NULL DEFAULT &#39;物料清单&#39;,\n    project_name        TEXT NOT NULL DEFAULT &#39;&#39;,\n    document_no         TEXT NOT NULL DEFAULT &#39;&#39;,\n    document_date       DATE,\n    request_department  TEXT NOT NULL DEFAULT &#39;&#39;,\n    applicant           TEXT NOT NULL DEFAULT &#39;&#39;,\n    prepared_by         TEXT NOT NULL DEFAULT &#39;&#39;,\n    reviewed_by         TEXT NOT NULL DEFAULT &#39;&#39;,\n    approved_by         TEXT NOT NULL DEFAULT &#39;&#39;,\n    note                TEXT NOT NULL DEFAULT &#39;&#39;,\n    source_file_id      UUID,\n    status              TEXT NOT NULL DEFAULT &#39;draft&#39;,\n    created_by          UUID REFERENCES users(id),\n    created_at          TIMESTAMPTZ NOT NULL DEFAULT NOW(),\n    updated_at          TIMESTAMPTZ NOT NULL DEFAULT NOW()\n);\n</code></pre>\n<h3>10.5 BOM 版本</h3>\n<pre><code class=\"language-sql\">CREATE TABLE component_bom.bom_versions (\n    id                  UUID PRIMARY KEY DEFAULT gen_random_uuid(),\n    tenant_id           UUID NOT NULL REFERENCES tenants(id) ON DELETE CASCADE,\n    bom_document_id     UUID NOT NULL REFERENCES component_bom.bom_documents(id) ON DELETE CASCADE,\n    version_no          INTEGER NOT NULL CHECK (version_no &gt;= 1),\n    version_label       TEXT NOT NULL,\n    state               TEXT NOT NULL DEFAULT &#39;draft&#39;\n                        CHECK (state IN (&#39;draft&#39;,&#39;validated&#39;,&#39;reviewing&#39;,&#39;approved&#39;,&#39;issued&#39;,&#39;archived&#39;,&#39;rejected&#39;,&#39;blocked&#39;)),\n    source_version_id   UUID REFERENCES component_bom.bom_versions(id) ON DELETE SET NULL,\n    change_reason       TEXT NOT NULL DEFAULT &#39;&#39;,\n    transaction_id      UUID REFERENCES module_transactions(id) ON DELETE SET NULL,\n    approved_at         TIMESTAMPTZ,\n    metadata            JSONB NOT NULL DEFAULT &#39;{}&#39;::jsonb,\n    created_at          TIMESTAMPTZ NOT NULL DEFAULT NOW(),\n    updated_at          TIMESTAMPTZ NOT NULL DEFAULT NOW(),\n    UNIQUE (bom_document_id, version_no)\n);\n</code></pre>\n<h3>10.6 BOM 行项主表</h3>\n<p>这一张表必须严格覆盖 Excel A-Q 字段,再追加规范化字段。</p>\n<pre><code class=\"language-sql\">CREATE TABLE component_bom.bom_lines (\n    id                  UUID PRIMARY KEY DEFAULT gen_random_uuid(),\n    tenant_id           UUID NOT NULL REFERENCES tenants(id) ON DELETE CASCADE,\n    bom_version_id      UUID NOT NULL REFERENCES component_bom.bom_versions(id) ON DELETE CASCADE,\n    line_no             INTEGER NOT NULL,\n    category_name       TEXT NOT NULL,\n    category_code       TEXT NOT NULL REFERENCES component_bom.sjg157_categories(category_code),\n    component_name      TEXT NOT NULL,\n    section_size        TEXT NOT NULL DEFAULT &#39;&#39;,\n    length_mm           NUMERIC(18,3),\n    location_code       TEXT NOT NULL DEFAULT &#39;&#39;,\n    material_grade      TEXT NOT NULL DEFAULT &#39;&#39;,\n    spec_model          TEXT NOT NULL DEFAULT &#39;&#39;,\n    drawing_no          TEXT NOT NULL DEFAULT &#39;&#39;,\n    level_no            TEXT NOT NULL DEFAULT &#39;&#39;,\n    unit                TEXT NOT NULL DEFAULT &#39;&#39;,\n    qty_per_set         NUMERIC(18,3) NOT NULL DEFAULT 0,\n    total_qty           NUMERIC(18,3) NOT NULL DEFAULT 0,\n    unit_set_weight_kg  NUMERIC(18,6),\n    total_weight_kg     NUMERIC(18,6),\n    remark              TEXT NOT NULL DEFAULT &#39;&#39;,\n    parsed_component_type TEXT NOT NULL DEFAULT &#39;&#39;,\n    parsed_role         TEXT NOT NULL DEFAULT &#39;&#39;,\n    parsed_section      TEXT NOT NULL DEFAULT &#39;&#39;,\n    parsed_length_mm    NUMERIC(18,3),\n    parsed_location     TEXT NOT NULL DEFAULT &#39;&#39;,\n    parsed_version      TEXT NOT NULL DEFAULT &#39;&#39;,\n    validation_status   TEXT NOT NULL DEFAULT &#39;pending&#39;\n                        CHECK (validation_status IN (&#39;pending&#39;,&#39;passed&#39;,&#39;warning&#39;,&#39;blocked&#39;)),\n    review_required     BOOLEAN NOT NULL DEFAULT TRUE,\n    source_sheet        TEXT NOT NULL DEFAULT &#39;物料清单&#39;,\n    source_row_no       INTEGER NOT NULL,\n    metadata            JSONB NOT NULL DEFAULT &#39;{}&#39;::jsonb,\n    created_at          TIMESTAMPTZ NOT NULL DEFAULT NOW(),\n    updated_at          TIMESTAMPTZ NOT NULL DEFAULT NOW(),\n    UNIQUE (bom_version_id, line_no)\n);\n</code></pre>\n<p>索引:</p>\n<pre><code class=\"language-sql\">CREATE INDEX idx_component_bom_lines_version\n    ON component_bom.bom_lines(tenant_id, bom_version_id, line_no);\n\nCREATE INDEX idx_component_bom_lines_category\n    ON component_bom.bom_lines(tenant_id, category_code, category_name);\n\nCREATE INDEX idx_component_bom_lines_component_name\n    ON component_bom.bom_lines USING gin (component_name gin_trgm_ops);\n\nCREATE INDEX idx_component_bom_lines_drawing\n    ON component_bom.bom_lines(tenant_id, drawing_no);\n</code></pre>\n<h3>10.7 构件名称 token 表</h3>\n<pre><code class=\"language-sql\">CREATE TABLE component_bom.component_name_tokens (\n    id              UUID PRIMARY KEY DEFAULT gen_random_uuid(),\n    tenant_id       UUID NOT NULL REFERENCES tenants(id) ON DELETE CASCADE,\n    bom_line_id     UUID NOT NULL REFERENCES component_bom.bom_lines(id) ON DELETE CASCADE,\n    token_order     INTEGER NOT NULL,\n    token_key       TEXT NOT NULL,\n    token_value     TEXT NOT NULL,\n    token_source    TEXT NOT NULL DEFAULT &#39;component_name_parser&#39;,\n    confidence      NUMERIC(8,6) NOT NULL DEFAULT 1,\n    created_at      TIMESTAMPTZ NOT NULL DEFAULT NOW()\n);\n</code></pre>\n<p>示例:</p>\n<p><code>Column_Main_H200X200X8X12_L4200_F1_V0</code></p>\n<table>\n<thead>\n<tr>\n<th align=\"right\">token_order</th>\n<th>token_key</th>\n<th>token_value</th>\n</tr>\n</thead>\n<tbody><tr>\n<td align=\"right\">1</td>\n<td>component_type</td>\n<td>Column</td>\n</tr>\n<tr>\n<td align=\"right\">2</td>\n<td>role</td>\n<td>Main</td>\n</tr>\n<tr>\n<td align=\"right\">3</td>\n<td>section</td>\n<td>H200X200X8X12</td>\n</tr>\n<tr>\n<td align=\"right\">4</td>\n<td>length</td>\n<td>L4200</td>\n</tr>\n<tr>\n<td align=\"right\">5</td>\n<td>location</td>\n<td>F1</td>\n</tr>\n<tr>\n<td align=\"right\">6</td>\n<td>version</td>\n<td>V0</td>\n</tr>\n</tbody></table>\n<h3>10.8 行级校验结果</h3>\n<pre><code class=\"language-sql\">CREATE TABLE component_bom.line_validation_results (\n    id              UUID PRIMARY KEY DEFAULT gen_random_uuid(),\n    tenant_id       UUID NOT NULL REFERENCES tenants(id) ON DELETE CASCADE,\n    bom_line_id     UUID NOT NULL REFERENCES component_bom.bom_lines(id) ON DELETE CASCADE,\n    rule_code       TEXT NOT NULL,\n    severity        TEXT NOT NULL CHECK (severity IN (&#39;info&#39;,&#39;warning&#39;,&#39;error&#39;,&#39;blocked&#39;)),\n    message         TEXT NOT NULL,\n    expected_value  TEXT NOT NULL DEFAULT &#39;&#39;,\n    actual_value    TEXT NOT NULL DEFAULT &#39;&#39;,\n    fix_suggestion  TEXT NOT NULL DEFAULT &#39;&#39;,\n    created_by_agent TEXT NOT NULL DEFAULT &#39;&#39;,\n    created_at      TIMESTAMPTZ NOT NULL DEFAULT NOW()\n);\n</code></pre>\n<hr>\n<h2>11. BOM 校验规则</h2>\n<h3>11.1 类目与编码联动</h3>\n<table>\n<thead>\n<tr>\n<th>规则编号</th>\n<th>规则</th>\n</tr>\n</thead>\n<tbody><tr>\n<td><code>SJG-CODE-001</code></td>\n<td><code>category_code</code> 必须存在于 <code>component_bom.sjg157_categories</code></td>\n</tr>\n<tr>\n<td><code>SJG-CODE-002</code></td>\n<td><code>category_name</code> 必须与 <code>category_code</code> 对应的 SJG157 名称一致</td>\n</tr>\n<tr>\n<td><code>SJG-CODE-003</code></td>\n<td>构件物料清单默认只允许选择 A.3 构件类目,除非业务明确允许建筑/空间/系统</td>\n</tr>\n</tbody></table>\n<h3>11.2 构件名称语法</h3>\n<table>\n<thead>\n<tr>\n<th>规则编号</th>\n<th>规则</th>\n</tr>\n</thead>\n<tbody><tr>\n<td><code>NAME-001</code></td>\n<td>构件名称只能使用英文、数字、下划线、点和 X/x,不允许混入中文</td>\n</tr>\n<tr>\n<td><code>NAME-002</code></td>\n<td>必须能解析出构件类型和版本号</td>\n</tr>\n<tr>\n<td><code>NAME-003</code></td>\n<td>V0/V1/V2/V3 必须符合版本号规则说明</td>\n</tr>\n<tr>\n<td><code>NAME-004</code></td>\n<td><code>component_type</code> 必须存在于命名规则表</td>\n</tr>\n</tbody></table>\n<h3>11.3 字段一致性</h3>\n<table>\n<thead>\n<tr>\n<th>规则编号</th>\n<th>规则</th>\n<th>示例</th>\n</tr>\n</thead>\n<tbody><tr>\n<td><code>FIELD-SECTION-001</code></td>\n<td><code>截面尺寸</code> 应与构件名称/规格型号中的截面一致</td>\n<td><code>H200X200X8X12</code></td>\n</tr>\n<tr>\n<td><code>FIELD-LENGTH-001</code></td>\n<td><code>长度</code> 应与 <code>Lxxxx</code> 或 <code>Hxxxx</code> 一致</td>\n<td>L4200 -&gt; 长度 4200</td>\n</tr>\n<tr>\n<td><code>FIELD-LOC-001</code></td>\n<td><code>位置</code> 应与构件名称中的位置字段一致</td>\n<td>F1/F2/Roof/Wall</td>\n</tr>\n<tr>\n<td><code>FIELD-QTY-001</code></td>\n<td>总数量应等于单套数量乘以套数；若无套数字段,默认总数量=单套数量</td>\n<td></td>\n</tr>\n<tr>\n<td><code>FIELD-WEIGHT-001</code></td>\n<td>单套重量和总重量为空时不能进入 <code>issued</code></td>\n<td></td>\n</tr>\n</tbody></table>\n<h3>11.4 类目与构件类型一致性</h3>\n<table>\n<thead>\n<tr>\n<th>构件名称前缀</th>\n<th>应匹配的类目范围</th>\n</tr>\n</thead>\n<tbody><tr>\n<td><code>Column</code></td>\n<td>钢柱、箱型钢柱、焊接 H 型钢柱等柱类</td>\n</tr>\n<tr>\n<td><code>Beam</code></td>\n<td>钢梁、焊接 H 型钢梁、主梁、次梁等梁类</td>\n</tr>\n<tr>\n<td><code>Purlin</code></td>\n<td>檩条</td>\n</tr>\n<tr>\n<td><code>Fastener</code></td>\n<td>螺栓、锚栓、螺钉、紧固件</td>\n</tr>\n<tr>\n<td><code>Connect</code></td>\n<td>连接件、拉条、支撑、节点件,需按规则细分</td>\n</tr>\n<tr>\n<td><code>Plate</code></td>\n<td>钢板、镀锌钢板、板件</td>\n</tr>\n</tbody></table>\n<hr>\n<h2>12. BOM 前端应用设计</h2>\n<h3>12.1 工作台入口</h3>\n<p>构件物料 BOM 进入统一工作台:</p>\n<table>\n<thead>\n<tr>\n<th>模块</th>\n<th>入口</th>\n</tr>\n</thead>\n<tbody><tr>\n<td><code>standard_library</code></td>\n<td>SJG157 类目库、命名规则库、构件模板库</td>\n</tr>\n<tr>\n<td><code>detailed_design</code></td>\n<td>构件物料清单主工作区,从图纸/模型/Excel 生成和修正</td>\n</tr>\n<tr>\n<td><code>quantity_costing</code></td>\n<td>读取 issued 构件清单进行工程量和造价</td>\n</tr>\n<tr>\n<td><code>material_logistics</code></td>\n<td>读取 approved/issued 构件清单生成采购、发运和到货</td>\n</tr>\n<tr>\n<td><code>production_manufacturing</code></td>\n<td>读取构件清单生成工单、工序、CNC、质检</td>\n</tr>\n<tr>\n<td><code>construction_management</code></td>\n<td>读取构件清单进行扫码安装、验收和整改</td>\n</tr>\n<tr>\n<td><code>digital_archive</code></td>\n<td>保存最终版 Excel、PDF、审计链和签审记录</td>\n</tr>\n</tbody></table>\n<h3>12.2 构件物料清单界面</h3>\n<p>主界面使用生产表格:</p>\n<table>\n<thead>\n<tr>\n<th>区域</th>\n<th>功能</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>顶部单据头</td>\n<td>公司、项目名称、日期、NO、申请部门、申请人、编制、审核、批准</td>\n</tr>\n<tr>\n<td>主表格</td>\n<td>A-Q 字段完整显示,支持 Excel 式编辑、筛选、排序、冻结列</td>\n</tr>\n<tr>\n<td>类目选择器</td>\n<td>选择类目名称后自动写入 SJG157 编码</td>\n</tr>\n<tr>\n<td>构件名称解析器</td>\n<td>实时拆解 <code>Column_Main_...</code> token</td>\n</tr>\n<tr>\n<td>校验面板</td>\n<td>显示错误、警告、修复建议</td>\n</tr>\n<tr>\n<td>重量计算面板</td>\n<td>根据截面、长度、材料密度或型钢库计算重量</td>\n</tr>\n<tr>\n<td>来源面板</td>\n<td>源 Excel、图纸、IFC、Agent trace、修改人</td>\n</tr>\n<tr>\n<td>版本面板</td>\n<td>V1/V2 差异、审批、发布、归档</td>\n</tr>\n</tbody></table>\n<h3>12.3 界面约束</h3>\n<ol>\n<li>主界面使用构件物料清单表格。</li>\n<li>主表格完整显示 Excel A-Q 字段。</li>\n<li>行项编辑、校验、审批、导出在同一工作台完成。</li>\n<li>Agent 生成修复建议,人工确认后写入草稿。</li>\n<li>发布前必须完成行级校验、版本审批和审计记录。</li>\n</ol>\n<hr>\n<h2>13. BOM 智能体设计</h2>\n<h3>13.1 Agent 列表</h3>\n<table>\n<thead>\n<tr>\n<th>Agent</th>\n<th>输入</th>\n<th>输出</th>\n</tr>\n</thead>\n<tbody><tr>\n<td><code>SJG157ImportAgent</code></td>\n<td>SJG157 xlsx</td>\n<td><code>sjg157_categories</code></td>\n</tr>\n<tr>\n<td><code>NamingRuleImportAgent</code></td>\n<td>命名规则 xlsx</td>\n<td><code>naming_rule_sets</code>, <code>naming_rules</code></td>\n</tr>\n<tr>\n<td><code>ComponentBomImportAgent</code></td>\n<td>应舍美居构件物料清单 xlsx</td>\n<td><code>bom_documents</code>, <code>bom_versions</code>, <code>bom_lines</code></td>\n</tr>\n<tr>\n<td><code>CategoryCodeLinkAgent</code></td>\n<td>类目名称/编码</td>\n<td>自动联动、错配提示</td>\n</tr>\n<tr>\n<td><code>ComponentNameParserAgent</code></td>\n<td>构件名称</td>\n<td>token 化结果</td>\n</tr>\n<tr>\n<td><code>ComponentBomValidationAgent</code></td>\n<td>BOM 行项</td>\n<td>validation results</td>\n</tr>\n<tr>\n<td><code>WeightCalculationAgent</code></td>\n<td>截面、长度、材料等级、数量</td>\n<td>单套重量、总重量建议</td>\n</tr>\n<tr>\n<td><code>ComponentBomFixSuggestionAgent</code></td>\n<td>validation results</td>\n<td>修复建议</td>\n</tr>\n<tr>\n<td><code>ComponentBomReviewAgent</code></td>\n<td>整张 BOM</td>\n<td>审核报告、阻断项</td>\n</tr>\n<tr>\n<td><code>ComponentBomExportAgent</code></td>\n<td>issued 版本</td>\n<td>Excel/PDF/归档包</td>\n</tr>\n</tbody></table>\n<h3>13.2 Agent 输出边界</h3>\n<p>Agent 只能输出:</p>\n<table>\n<thead>\n<tr>\n<th>可输出</th>\n<th>不可输出</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>草稿行项</td>\n<td>自动审批</td>\n</tr>\n<tr>\n<td>校验错误</td>\n<td>擅自改源数据</td>\n</tr>\n<tr>\n<td>修复建议</td>\n<td>标记可生产</td>\n</tr>\n<tr>\n<td>重量计算建议</td>\n<td>自动付款/采购</td>\n</tr>\n<tr>\n<td>审核报告</td>\n<td>替代审核人签字</td>\n</tr>\n</tbody></table>\n<h3>13.3 Agent 调用链</h3>\n<pre><code class=\"language-text\">上传 Excel\n  -&gt; ComponentBomImportAgent\n  -&gt; ComponentNameParserAgent\n  -&gt; CategoryCodeLinkAgent\n  -&gt; ComponentBomValidationAgent\n  -&gt; WeightCalculationAgent\n  -&gt; ComponentBomReviewAgent\n  -&gt; 人工审核/批准\n  -&gt; issued\n  -&gt; ExportAgent\n</code></pre>\n<hr>\n<h2>14. BOM 工作流</h2>\n<h3>14.1 导入工作流</h3>\n<pre><code class=\"language-text\">选择 Excel\n  -&gt; ObjectStore 保存源文件\n  -&gt; module_files 建档\n  -&gt; 读取 workbook/sheet/header\n  -&gt; 识别模板版本\n  -&gt; 写 bom_documents\n  -&gt; 写 bom_versions V1 draft\n  -&gt; 写 bom_lines\n  -&gt; 写 component_name_tokens\n  -&gt; 写 validation_results\n  -&gt; 返回导入报告\n</code></pre>\n<h3>14.2 修正与审核</h3>\n<pre><code class=\"language-text\">draft\n  -&gt; validate\n  -&gt; warning / blocked\n  -&gt; 人工修正\n  -&gt; revalidate\n  -&gt; reviewing\n  -&gt; approved\n  -&gt; issued\n</code></pre>\n<h3>14.3 下游使用</h3>\n<p>只有 <code>issued</code> 的构件物料 BOM 可以进入:</p>\n<table>\n<thead>\n<tr>\n<th>下游</th>\n<th>使用字段</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>造价</td>\n<td>类目、编码、构件名称、截面、长度、数量、重量</td>\n</tr>\n<tr>\n<td>采购</td>\n<td>材料等级、规格型号、数量、单位、重量</td>\n</tr>\n<tr>\n<td>生产</td>\n<td>构件名称、截面、长度、图号、位置、数量</td>\n</tr>\n<tr>\n<td>施工</td>\n<td>构件名称、图号、位置、层次、数量</td>\n</tr>\n<tr>\n<td>档案</td>\n<td>全字段、审批、导入源、导出文件</td>\n</tr>\n</tbody></table>\n<hr>\n<h2>15. BOM API 设计</h2>\n<table>\n<thead>\n<tr>\n<th>方法</th>\n<th>Endpoint</th>\n<th>用途</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>POST</td>\n<td><code>/v1/component-bom/sjg157/import</code></td>\n<td>导入 SJG157 编码表</td>\n</tr>\n<tr>\n<td>GET</td>\n<td><code>/v1/component-bom/sjg157/categories</code></td>\n<td>查询类目</td>\n</tr>\n<tr>\n<td>POST</td>\n<td><code>/v1/component-bom/naming-rules/import</code></td>\n<td>导入命名规则</td>\n</tr>\n<tr>\n<td>GET</td>\n<td><code>/v1/component-bom/naming-rules</code></td>\n<td>查询命名规则</td>\n</tr>\n<tr>\n<td>POST</td>\n<td><code>/v1/component-bom/documents/import</code></td>\n<td>导入构件物料清单 Excel</td>\n</tr>\n<tr>\n<td>GET</td>\n<td><code>/v1/component-bom/documents</code></td>\n<td>BOM 单据列表</td>\n</tr>\n<tr>\n<td>GET</td>\n<td><code>/v1/component-bom/documents/{document_id}</code></td>\n<td>BOM 单据头</td>\n</tr>\n<tr>\n<td>GET</td>\n<td><code>/v1/component-bom/versions/{version_id}/lines</code></td>\n<td>行项列表</td>\n</tr>\n<tr>\n<td>PATCH</td>\n<td><code>/v1/component-bom/lines/{line_id}</code></td>\n<td>修改草稿行项</td>\n</tr>\n<tr>\n<td>POST</td>\n<td><code>/v1/component-bom/versions/{version_id}/validate</code></td>\n<td>校验整张表</td>\n</tr>\n<tr>\n<td>GET</td>\n<td><code>/v1/component-bom/lines/{line_id}/validations</code></td>\n<td>行级校验结果</td>\n</tr>\n<tr>\n<td>POST</td>\n<td><code>/v1/component-bom/versions/{version_id}/submit-review</code></td>\n<td>提交审核</td>\n</tr>\n<tr>\n<td>POST</td>\n<td><code>/v1/component-bom/versions/{version_id}/approve</code></td>\n<td>审核批准</td>\n</tr>\n<tr>\n<td>POST</td>\n<td><code>/v1/component-bom/versions/{version_id}/issue</code></td>\n<td>发布 issued 版本</td>\n</tr>\n<tr>\n<td>POST</td>\n<td><code>/v1/component-bom/versions/{version_id}/export.xlsx</code></td>\n<td>导出 Excel</td>\n</tr>\n</tbody></table>\n<hr>\n<h2>16. BOM 导入模板映射</h2>\n<h3>16.1 应舍美居 BOM Sheet 映射</h3>\n<table>\n<thead>\n<tr>\n<th>Excel 区域</th>\n<th>数据库</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>Row 1 <code>应舍美居（深圳）科技有限公司</code></td>\n<td><code>bom_documents.company_name</code></td>\n</tr>\n<tr>\n<td>Row 2 <code>物料清单</code></td>\n<td><code>bom_documents.document_title</code></td>\n</tr>\n<tr>\n<td>Row 3 项目名称/日期/NO</td>\n<td><code>project_name</code>, <code>document_date</code>, <code>document_no</code></td>\n</tr>\n<tr>\n<td>Row 4 申请部门/申请人</td>\n<td><code>request_department</code>, <code>applicant</code></td>\n</tr>\n<tr>\n<td>Row 5 A-Q 表头</td>\n<td>模板字段校验</td>\n</tr>\n<tr>\n<td>Row 6-19</td>\n<td><code>bom_lines</code></td>\n</tr>\n<tr>\n<td>Row 21 合计</td>\n<td>导入校验,不作为行项</td>\n</tr>\n<tr>\n<td>Row 24 编制/审核/批准/日期</td>\n<td><code>prepared_by</code>, <code>reviewed_by</code>, <code>approved_by</code></td>\n</tr>\n<tr>\n<td>Row 26 注释</td>\n<td><code>bom_documents.note</code></td>\n</tr>\n</tbody></table>\n<h3>16.2 类目参照 Sheet 映射</h3>\n<table>\n<thead>\n<tr>\n<th>Excel 字段</th>\n<th>数据库</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>序号</td>\n<td><code>source_row_no</code></td>\n</tr>\n<tr>\n<td>板块</td>\n<td><code>section_no/section_name</code></td>\n</tr>\n<tr>\n<td>层级</td>\n<td><code>hierarchy_level</code></td>\n</tr>\n<tr>\n<td>编码</td>\n<td><code>category_code</code></td>\n</tr>\n<tr>\n<td>类目名称</td>\n<td><code>category_name</code></td>\n</tr>\n</tbody></table>\n<p>该 Sheet 可以作为项目模板内置候选项,但最终仍应以完整 SJG157 字典表为准。</p>\n<hr>\n<h2>17. BOM 代码与文件落地</h2>\n<h3>17.1 后端</h3>\n<table>\n<thead>\n<tr>\n<th>文件</th>\n<th>内容</th>\n</tr>\n</thead>\n<tbody><tr>\n<td><code>04-backend/migrations/20260608000001_component_bom_schema.sql</code></td>\n<td>新建 schema 和表</td>\n</tr>\n<tr>\n<td><code>04-backend/harness-core/src/component_bom_types.rs</code></td>\n<td>DTO</td>\n</tr>\n<tr>\n<td><code>04-backend/harness-core/src/component_bom_service.rs</code></td>\n<td>业务服务</td>\n</tr>\n<tr>\n<td><code>04-backend/harness-core/src/component_bom_import.rs</code></td>\n<td>xlsx 导入任务接口</td>\n</tr>\n<tr>\n<td><code>04-backend/harness-core/src/component_bom_validation.rs</code></td>\n<td>校验规则</td>\n</tr>\n<tr>\n<td><code>04-backend/harness-core/src/component_bom_export.rs</code></td>\n<td>导出</td>\n</tr>\n</tbody></table>\n<h3>17.2 前端</h3>\n<table>\n<thead>\n<tr>\n<th>文件</th>\n<th>内容</th>\n</tr>\n</thead>\n<tbody><tr>\n<td><code>03-frontend/lib/component-bom-types.ts</code></td>\n<td>类型</td>\n</tr>\n<tr>\n<td><code>03-frontend/lib/component-bom-api-client.ts</code></td>\n<td>API client</td>\n</tr>\n<tr>\n<td><code>03-frontend/components/ComponentBomWorkbench.tsx</code></td>\n<td>主工作台</td>\n</tr>\n<tr>\n<td><code>03-frontend/components/ComponentBomGrid.tsx</code></td>\n<td>A-Q 表格</td>\n</tr>\n<tr>\n<td><code>03-frontend/components/ComponentCategorySelector.tsx</code></td>\n<td>SJG157 类目选择器</td>\n</tr>\n<tr>\n<td><code>03-frontend/components/ComponentNameInspector.tsx</code></td>\n<td>构件名称解析</td>\n</tr>\n<tr>\n<td><code>03-frontend/components/ComponentBomValidationPanel.tsx</code></td>\n<td>校验结果</td>\n</tr>\n<tr>\n<td><code>03-frontend/components/ComponentBomVersionPanel.tsx</code></td>\n<td>版本和审批</td>\n</tr>\n</tbody></table>\n<h3>17.3 Worker / Agent</h3>\n<table>\n<thead>\n<tr>\n<th>文件</th>\n<th>内容</th>\n</tr>\n</thead>\n<tbody><tr>\n<td><code>06-workers/architoken_workers/component_bom_xlsx_reader.py</code></td>\n<td>读取 xlsx</td>\n</tr>\n<tr>\n<td><code>06-workers/architoken_workers/component_name_parser.py</code></td>\n<td>构件名称解析</td>\n</tr>\n<tr>\n<td><code>06-workers/architoken_workers/component_bom_validator.py</code></td>\n<td>校验</td>\n</tr>\n<tr>\n<td><code>04-backend/agent-orchestrator/prompts/detailed_design/component_bom_importer.md</code></td>\n<td>导入 Agent</td>\n</tr>\n<tr>\n<td><code>04-backend/agent-orchestrator/prompts/detailed_design/component_bom_reviewer.md</code></td>\n<td>审核 Agent</td>\n</tr>\n</tbody></table>\n<hr>\n<h2>18. BOM 验收标准</h2>\n<table>\n<thead>\n<tr>\n<th>验收项</th>\n<th>标准</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>SJG157 导入</td>\n<td>5678 条类目可查询,A.3 构件可作为 BOM 下拉</td>\n</tr>\n<tr>\n<td>命名规则导入</td>\n<td>8 个 sheet 的公式和实例可查询</td>\n</tr>\n<tr>\n<td>应舍美居 BOM 导入</td>\n<td>14 条数据行、合计 470、A-Q 字段无丢失</td>\n</tr>\n<tr>\n<td>自动联动</td>\n<td>选择类目名称后编码自动写入</td>\n</tr>\n<tr>\n<td>名称解析</td>\n<td><code>Column_Main_H200X200X8X12_L4200_F1_V0</code> 可拆 token</td>\n</tr>\n<tr>\n<td>错误识别</td>\n<td>能识别行 1 铜管/Column 错配和长度不一致</td>\n</tr>\n<tr>\n<td>审批</td>\n<td>未 approved 不能 issued</td>\n</tr>\n<tr>\n<td>导出</td>\n<td>issued 版本可导出为同模板 Excel</td>\n</tr>\n<tr>\n<td>审计</td>\n<td>导入、修改、校验、审批、导出都有 AuditEvent</td>\n</tr>\n</tbody></table>\n<hr>\n<h2>19. BOM 落地顺序</h2>\n<pre><code class=\"language-text\">SJG157 类目字典导入\n  -&gt; 构件命名规则导入\n  -&gt; 应舍美居构件物料清单导入\n  -&gt; 构件名称解析\n  -&gt; 类目编码联动\n  -&gt; 行级校验\n  -&gt; 重量计算\n  -&gt; 人工修正\n  -&gt; 审批\n  -&gt; issued 版本\n  -&gt; Excel/PDF/归档包导出\n</code></pre>\n<hr>\n<h2>20. BOM 实施蓝图</h2>\n<h3>20.1 首期目标</h3>\n<table>\n<thead>\n<tr>\n<th>目标</th>\n<th>可交付结果</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>标准字典入库</td>\n<td>SJG157 全部类目可查询、可按板块筛选、可按编码和名称检索</td>\n</tr>\n<tr>\n<td>命名规则入库</td>\n<td>8 个命名规则 Sheet 可查询、可按构件类型匹配公式和示例</td>\n</tr>\n<tr>\n<td>构件物料清单入库</td>\n<td><code>应舍美居_构件物料清单.xlsx</code> 导入后形成单据头、版本、14 条行项、合计校验和源文件证据</td>\n</tr>\n<tr>\n<td>行项校验</td>\n<td>自动识别类目/编码错配、命名 token 错配、长度错配、材料等级缺失、重量缺失</td>\n</tr>\n<tr>\n<td>工作台编辑</td>\n<td>在 <code>detailed_design</code> 模块内用生产表格编辑 A-Q 字段,右侧显示校验和修复建议</td>\n</tr>\n<tr>\n<td>审批发布</td>\n<td>设计编制、复核、批准后形成 <code>issued</code> 版本,下游模块只读取 <code>issued</code> 版本</td>\n</tr>\n<tr>\n<td>导出归档</td>\n<td>导出同模板 Excel、PDF、校验报告、审计 JSON,进入 <code>digital_archive</code></td>\n</tr>\n</tbody></table>\n<h3>20.2 落地边界</h3>\n<table>\n<thead>\n<tr>\n<th>范围</th>\n<th>本期处理</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>文件来源</td>\n<td>XLSX 源文件、SJG157 编码表、构件命名规则表、后续图纸/IFC 关联</td>\n</tr>\n<tr>\n<td>数据真源</td>\n<td>PostgreSQL 结构化表 + ObjectStore 源文件 + AuditEvent</td>\n</tr>\n<tr>\n<td>AI 边界</td>\n<td>Agent 负责抽取、解析、校验、建议；人工负责确认、审批、发布</td>\n</tr>\n<tr>\n<td>模块入口</td>\n<td><code>standard_library</code> 管标准字典和命名规则；<code>detailed_design</code> 管构件物料清单编制；<code>quantity_costing</code>、<code>material_logistics</code>、<code>production_manufacturing</code>、<code>construction_management</code>、<code>digital_archive</code> 读取已发布版本</td>\n</tr>\n<tr>\n<td>状态门禁</td>\n<td><code>draft -&gt; validated -&gt; reviewing -&gt; approved -&gt; issued -&gt; archived</code></td>\n</tr>\n</tbody></table>\n<h3>20.3 业务对象清单</h3>\n<table>\n<thead>\n<tr>\n<th>对象</th>\n<th>说明</th>\n<th>主表</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>标准类目</td>\n<td>SJG157 建筑、空间、构件、系统类目</td>\n<td><code>component_bom.sjg157_categories</code></td>\n</tr>\n<tr>\n<td>构件命名规则</td>\n<td>装配式钢结构构件标准化命名公式和示例</td>\n<td><code>component_bom.naming_rule_sets</code>, <code>component_bom.naming_rules</code></td>\n</tr>\n<tr>\n<td>BOM 单据</td>\n<td>一张构件物料清单的单据头</td>\n<td><code>component_bom.bom_documents</code></td>\n</tr>\n<tr>\n<td>BOM 版本</td>\n<td>同一单据的草稿、审核、发布版本</td>\n<td><code>component_bom.bom_versions</code></td>\n</tr>\n<tr>\n<td>BOM 行项</td>\n<td>Excel A-Q 字段对应的构件明细</td>\n<td><code>component_bom.bom_lines</code></td>\n</tr>\n<tr>\n<td>构件 token</td>\n<td>从 <code>构件名称</code> 拆出的结构化 token</td>\n<td><code>component_bom.component_name_tokens</code></td>\n</tr>\n<tr>\n<td>校验结果</td>\n<td>每行每条规则的校验结果</td>\n<td><code>component_bom.line_validation_results</code></td>\n</tr>\n<tr>\n<td>重量结果</td>\n<td>单套重量、总重量、公式和人工确认状态</td>\n<td><code>component_bom.weight_calculation_results</code></td>\n</tr>\n<tr>\n<td>变更记录</td>\n<td>行项新增、修改、删除、版本差异</td>\n<td><code>component_bom.change_records</code></td>\n</tr>\n<tr>\n<td>导出任务</td>\n<td>Excel/PDF/归档包导出记录</td>\n<td><code>component_bom.export_jobs</code></td>\n</tr>\n</tbody></table>\n<hr>\n<h2>21. BOM 模块落位</h2>\n<h3>21.1 16 模块中的职责</h3>\n<table>\n<thead>\n<tr>\n<th>模块</th>\n<th>对构件物料 BOM 的职责</th>\n<th>读写权限</th>\n</tr>\n</thead>\n<tbody><tr>\n<td><code>standard_library</code> 标准族库</td>\n<td>维护 SJG157 类目、构件命名规则、材料等级、型钢规格库、重量公式库</td>\n<td>读写标准库</td>\n</tr>\n<tr>\n<td><code>detailed_design</code> 深化设计</td>\n<td>编制构件物料清单、关联图纸/IFC、修正校验问题、提交复核</td>\n<td>读写 BOM 草稿</td>\n</tr>\n<tr>\n<td><code>quantity_costing</code> 计量造价</td>\n<td>读取 <code>issued</code> BOM 生成工程量、材料量和成本测算</td>\n<td>只读已发布 BOM,写造价对象</td>\n</tr>\n<tr>\n<td><code>material_logistics</code> 材料物流</td>\n<td>读取 <code>issued</code> BOM 生成采购计划、到货计划、批次追踪</td>\n<td>只读已发布 BOM,写采购/物流对象</td>\n</tr>\n<tr>\n<td><code>production_manufacturing</code> 生产制造</td>\n<td>读取 <code>issued</code> BOM 生成工单、下料单、质检单、包装发运清单</td>\n<td>只读已发布 BOM,写生产对象</td>\n</tr>\n<tr>\n<td><code>construction_management</code> 施工管理</td>\n<td>读取 <code>issued</code> BOM 做现场扫码、安装确认、验收整改</td>\n<td>只读已发布 BOM,写现场对象</td>\n</tr>\n<tr>\n<td><code>digital_archive</code> 数字档案</td>\n<td>接收最终 Excel、PDF、审计链、审批记录、校验报告</td>\n<td>归档读写</td>\n</tr>\n<tr>\n<td><code>ai_center</code> AI中心</td>\n<td>管理 BOM Agent、模型路由、工具路由、评估报告</td>\n<td>管 Agent 配置和运行记录</td>\n</tr>\n<tr>\n<td><code>settings_center</code> 设置中心</td>\n<td>管角色、权限、审批流、数据字典启用状态</td>\n<td>管系统配置</td>\n</tr>\n</tbody></table>\n<h3>21.2 业务状态机</h3>\n<table>\n<thead>\n<tr>\n<th>状态</th>\n<th>进入条件</th>\n<th>允许动作</th>\n<th>输出</th>\n</tr>\n</thead>\n<tbody><tr>\n<td><code>draft</code></td>\n<td>上传或新建 BOM</td>\n<td>编辑行项、运行解析、运行校验</td>\n<td>草稿行项</td>\n</tr>\n<tr>\n<td><code>validated</code></td>\n<td>阻断级错误为 0</td>\n<td>提交复核、导出草稿报告</td>\n<td>校验报告</td>\n</tr>\n<tr>\n<td><code>reviewing</code></td>\n<td>设计负责人提交复核</td>\n<td>审核通过、退回修改</td>\n<td>审核意见</td>\n</tr>\n<tr>\n<td><code>approved</code></td>\n<td>复核人签审通过</td>\n<td>发布、归档</td>\n<td>审批记录</td>\n</tr>\n<tr>\n<td><code>issued</code></td>\n<td>批准人发布</td>\n<td>下游引用、导出正式文件</td>\n<td>发布版本</td>\n</tr>\n<tr>\n<td><code>archived</code></td>\n<td>项目阶段结束或版本关闭</td>\n<td>查询、追溯、复制新版本</td>\n<td>归档包</td>\n</tr>\n</tbody></table>\n<p>状态迁移写入 <code>module_transactions</code>、<code>approval_tasks</code>、<code>audit_events</code>。<code>bom_versions.transaction_id</code> 绑定本次生命周期事务。</p>\n<h3>21.3 数据流</h3>\n<pre><code class=\"language-text\">XLSX 源文件\n  -&gt; ObjectStore 保存原文件\n  -&gt; CDE file record\n  -&gt; ImportBatch\n  -&gt; 单据头 / 版本 / 行项\n  -&gt; 构件名称 token\n  -&gt; SJG157 类目联动\n  -&gt; 校验结果\n  -&gt; 重量结果\n  -&gt; 人工修正\n  -&gt; 审核批准\n  -&gt; issued 版本\n  -&gt; 造价 / 采购 / 生产 / 施工 / 档案\n</code></pre>\n<hr>\n<h2>22. BOM 数据库落地</h2>\n<h3>22.1 源文件与导入批次</h3>\n<pre><code class=\"language-sql\">CREATE TABLE component_bom.source_files (\n    id              UUID PRIMARY KEY DEFAULT gen_random_uuid(),\n    tenant_id       UUID NOT NULL REFERENCES tenants(id) ON DELETE CASCADE,\n    module_id       TEXT NOT NULL REFERENCES modules(id),\n    file_name       TEXT NOT NULL,\n    object_key      TEXT NOT NULL,\n    mime_type       TEXT NOT NULL,\n    byte_size       BIGINT NOT NULL,\n    sha256          TEXT NOT NULL,\n    source_path     TEXT NOT NULL DEFAULT &#39;&#39;,\n    uploaded_by     UUID REFERENCES users(id),\n    uploaded_at     TIMESTAMPTZ NOT NULL DEFAULT NOW(),\n    UNIQUE (tenant_id, sha256)\n);\n\nCREATE TABLE component_bom.import_batches (\n    id              UUID PRIMARY KEY DEFAULT gen_random_uuid(),\n    tenant_id       UUID NOT NULL REFERENCES tenants(id) ON DELETE CASCADE,\n    source_file_id  UUID NOT NULL REFERENCES component_bom.source_files(id) ON DELETE CASCADE,\n    importer        TEXT NOT NULL,\n    workbook_kind   TEXT NOT NULL CHECK (workbook_kind IN (&#39;sjg157&#39;,&#39;naming_rules&#39;,&#39;component_bom&#39;)),\n    status          TEXT NOT NULL DEFAULT &#39;running&#39;\n                    CHECK (status IN (&#39;running&#39;,&#39;completed&#39;,&#39;completed_with_warnings&#39;,&#39;failed&#39;)),\n    row_count       INTEGER NOT NULL DEFAULT 0,\n    warning_count   INTEGER NOT NULL DEFAULT 0,\n    error_count     INTEGER NOT NULL DEFAULT 0,\n    report          JSONB NOT NULL DEFAULT &#39;{}&#39;::jsonb,\n    started_at      TIMESTAMPTZ NOT NULL DEFAULT NOW(),\n    finished_at     TIMESTAMPTZ\n);\n</code></pre>\n<p>导入器必须先写 <code>source_files</code> 和 <code>import_batches</code>,再写业务表。重复上传同一文件时按 <code>tenant_id + sha256</code> 命中已有源文件,导入批次仍要单独记录。</p>\n<h3>22.2 BOM 行项字段补强</h3>\n<p><code>component_bom.bom_lines</code> 已覆盖 A-Q 字段。生产落地还需要追加以下字段:</p>\n<pre><code class=\"language-sql\">ALTER TABLE component_bom.bom_lines\n    ADD COLUMN IF NOT EXISTS source_file_id UUID REFERENCES component_bom.source_files(id),\n    ADD COLUMN IF NOT EXISTS import_batch_id UUID REFERENCES component_bom.import_batches(id),\n    ADD COLUMN IF NOT EXISTS source_cell_range TEXT NOT NULL DEFAULT &#39;&#39;,\n    ADD COLUMN IF NOT EXISTS category_id UUID REFERENCES component_bom.sjg157_categories(id),\n    ADD COLUMN IF NOT EXISTS drawing_file_id UUID,\n    ADD COLUMN IF NOT EXISTS model_element_id TEXT NOT NULL DEFAULT &#39;&#39;,\n    ADD COLUMN IF NOT EXISTS procurement_item_id UUID,\n    ADD COLUMN IF NOT EXISTS manufacturing_item_id UUID,\n    ADD COLUMN IF NOT EXISTS construction_item_id UUID,\n    ADD COLUMN IF NOT EXISTS archived_file_id UUID;\n</code></pre>\n<p>字段含义:</p>\n<table>\n<thead>\n<tr>\n<th>字段</th>\n<th>含义</th>\n</tr>\n</thead>\n<tbody><tr>\n<td><code>source_file_id</code></td>\n<td>导入来源 XLSX</td>\n</tr>\n<tr>\n<td><code>import_batch_id</code></td>\n<td>本次导入批次</td>\n</tr>\n<tr>\n<td><code>source_cell_range</code></td>\n<td>Excel 源单元格范围,例如 <code>物料清单!A6:Q6</code></td>\n</tr>\n<tr>\n<td><code>category_id</code></td>\n<td>SJG157 类目外键</td>\n</tr>\n<tr>\n<td><code>drawing_file_id</code></td>\n<td>图纸来源文件</td>\n</tr>\n<tr>\n<td><code>model_element_id</code></td>\n<td>IFC/DWG/模型构件 ID</td>\n</tr>\n<tr>\n<td><code>procurement_item_id</code></td>\n<td>下游采购行</td>\n</tr>\n<tr>\n<td><code>manufacturing_item_id</code></td>\n<td>下游生产行</td>\n</tr>\n<tr>\n<td><code>construction_item_id</code></td>\n<td>下游施工安装项</td>\n</tr>\n<tr>\n<td><code>archived_file_id</code></td>\n<td>发布后归档文件</td>\n</tr>\n</tbody></table>\n<h3>22.3 规格与重量基础库</h3>\n<pre><code class=\"language-sql\">CREATE TABLE component_bom.material_grades (\n    id              UUID PRIMARY KEY DEFAULT gen_random_uuid(),\n    grade_code      TEXT NOT NULL UNIQUE,\n    material_family TEXT NOT NULL,\n    density_kg_m3   NUMERIC(18,6) NOT NULL,\n    standard_ref    TEXT NOT NULL DEFAULT &#39;&#39;,\n    enabled         BOOLEAN NOT NULL DEFAULT TRUE\n);\n\nCREATE TABLE component_bom.section_profiles (\n    id              UUID PRIMARY KEY DEFAULT gen_random_uuid(),\n    profile_key     TEXT NOT NULL UNIQUE,\n    profile_type    TEXT NOT NULL,\n    section_text    TEXT NOT NULL,\n    area_mm2        NUMERIC(18,6),\n    unit_weight_kg_m NUMERIC(18,6),\n    formula_kind    TEXT NOT NULL,\n    formula_params  JSONB NOT NULL DEFAULT &#39;{}&#39;::jsonb,\n    source_ref      TEXT NOT NULL DEFAULT &#39;&#39;,\n    enabled         BOOLEAN NOT NULL DEFAULT TRUE\n);\n</code></pre>\n<p>首批内置:</p>\n<table>\n<thead>\n<tr>\n<th>类型</th>\n<th>识别样式</th>\n<th>计算基础</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>焊接 H 型钢</td>\n<td><code>H200X200X8X12</code></td>\n<td>腹板 + 两块翼缘面积</td>\n</tr>\n<tr>\n<td>箱型钢</td>\n<td><code>S200X200X8X12</code></td>\n<td>外矩形面积减内矩形面积</td>\n</tr>\n<tr>\n<td>C 型钢</td>\n<td><code>C180X70X20X2.5</code></td>\n<td>展开宽度乘厚度</td>\n</tr>\n<tr>\n<td>角钢</td>\n<td><code>L50X50X5</code></td>\n<td>两肢面积扣重叠</td>\n</tr>\n<tr>\n<td>圆钢 / 拉条</td>\n<td><code>D12</code></td>\n<td>圆截面积</td>\n</tr>\n<tr>\n<td>螺栓</td>\n<td><code>M20_L80</code></td>\n<td>紧固件标准重量表优先,缺表时按规格提示人工确认</td>\n</tr>\n<tr>\n<td>钢板</td>\n<td><code>T6_3000x1500</code></td>\n<td>厚度 × 长 × 宽 × 密度</td>\n</tr>\n</tbody></table>\n<h3>22.4 审批与签审</h3>\n<pre><code class=\"language-sql\">CREATE TABLE component_bom.review_records (\n    id              UUID PRIMARY KEY DEFAULT gen_random_uuid(),\n    tenant_id       UUID NOT NULL REFERENCES tenants(id) ON DELETE CASCADE,\n    bom_version_id  UUID NOT NULL REFERENCES component_bom.bom_versions(id) ON DELETE CASCADE,\n    reviewer_id     UUID NOT NULL REFERENCES users(id),\n    role_key        TEXT NOT NULL,\n    action          TEXT NOT NULL CHECK (action IN (&#39;submit&#39;,&#39;approve&#39;,&#39;reject&#39;,&#39;return_for_fix&#39;,&#39;issue&#39;,&#39;archive&#39;)),\n    comment         TEXT NOT NULL DEFAULT &#39;&#39;,\n    evidence        JSONB NOT NULL DEFAULT &#39;{}&#39;::jsonb,\n    created_at      TIMESTAMPTZ NOT NULL DEFAULT NOW()\n);\n</code></pre>\n<p>签审角色:</p>\n<table>\n<thead>\n<tr>\n<th>角色</th>\n<th>责任</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>编制人</td>\n<td>录入或导入构件物料清单</td>\n</tr>\n<tr>\n<td>深化设计负责人</td>\n<td>确认构件分类、命名、图号和位置</td>\n</tr>\n<tr>\n<td>结构复核人</td>\n<td>复核构件类型、材料等级、截面和数量</td>\n</tr>\n<tr>\n<td>生产负责人</td>\n<td>确认下料、工艺和工厂可执行性</td>\n</tr>\n<tr>\n<td>造价负责人</td>\n<td>确认工程量和重量可进入计量</td>\n</tr>\n<tr>\n<td>批准人</td>\n<td>发布 <code>issued</code> 版本</td>\n</tr>\n</tbody></table>\n<hr>\n<h2>23. BOM 导入器落地</h2>\n<h3>23.1 Worker 文件</h3>\n<table>\n<thead>\n<tr>\n<th>文件</th>\n<th>职责</th>\n</tr>\n</thead>\n<tbody><tr>\n<td><code>06-workers/architoken_workers/component_bom_xlsx_reader.py</code></td>\n<td>读取 XLSX,输出 workbook manifest</td>\n</tr>\n<tr>\n<td><code>06-workers/architoken_workers/sjg157_importer.py</code></td>\n<td>导入 SJG157 编码表</td>\n</tr>\n<tr>\n<td><code>06-workers/architoken_workers/component_naming_rule_importer.py</code></td>\n<td>导入命名规则</td>\n</tr>\n<tr>\n<td><code>06-workers/architoken_workers/component_bom_importer.py</code></td>\n<td>导入构件物料清单</td>\n</tr>\n<tr>\n<td><code>06-workers/architoken_workers/component_name_parser.py</code></td>\n<td>拆解构件名称 token</td>\n</tr>\n<tr>\n<td><code>06-workers/architoken_workers/component_bom_validator.py</code></td>\n<td>行级校验</td>\n</tr>\n<tr>\n<td><code>06-workers/architoken_workers/component_weight_calculator.py</code></td>\n<td>重量计算</td>\n</tr>\n</tbody></table>\n<h3>23.2 Workbook manifest</h3>\n<pre><code class=\"language-json\">{\n  &quot;workbook_kind&quot;: &quot;component_bom&quot;,\n  &quot;source_file_sha256&quot;: &quot;...&quot;,\n  &quot;sheets&quot;: [\n    {\n      &quot;name&quot;: &quot;物料清单&quot;,\n      &quot;dimension&quot;: &quot;A1:Q26&quot;,\n      &quot;header_row&quot;: 5,\n      &quot;data_start_row&quot;: 6,\n      &quot;data_end_row&quot;: 19,\n      &quot;total_row&quot;: 21,\n      &quot;columns&quot;: [\n        {&quot;excel_col&quot;: &quot;A&quot;, &quot;title&quot;: &quot;序号&quot;, &quot;field&quot;: &quot;line_no&quot;},\n        {&quot;excel_col&quot;: &quot;B&quot;, &quot;title&quot;: &quot;类目名称&quot;, &quot;field&quot;: &quot;category_name&quot;},\n        {&quot;excel_col&quot;: &quot;C&quot;, &quot;title&quot;: &quot;编码&quot;, &quot;field&quot;: &quot;category_code&quot;}\n      ]\n    }\n  ]\n}\n</code></pre>\n<h3>23.3 导入步骤</h3>\n<table>\n<thead>\n<tr>\n<th align=\"right\">步骤</th>\n<th>处理</th>\n</tr>\n</thead>\n<tbody><tr>\n<td align=\"right\">1</td>\n<td>计算文件 SHA256,写 <code>source_files</code></td>\n</tr>\n<tr>\n<td align=\"right\">2</td>\n<td>创建 <code>import_batches</code></td>\n</tr>\n<tr>\n<td align=\"right\">3</td>\n<td>识别 workbook 类型</td>\n</tr>\n<tr>\n<td align=\"right\">4</td>\n<td>校验 Sheet 名称、表头行、字段数量</td>\n</tr>\n<tr>\n<td align=\"right\">5</td>\n<td>读取单据头: 公司、项目、日期、NO、申请部门、申请人、编制、审核、批准</td>\n</tr>\n<tr>\n<td align=\"right\">6</td>\n<td>写 <code>bom_documents</code></td>\n</tr>\n<tr>\n<td align=\"right\">7</td>\n<td>写 <code>bom_versions</code> 初始版本</td>\n</tr>\n<tr>\n<td align=\"right\">8</td>\n<td>逐行写 <code>bom_lines</code>,记录 <code>source_cell_range</code></td>\n</tr>\n<tr>\n<td align=\"right\">9</td>\n<td>拆解 <code>component_name</code> 并写 <code>component_name_tokens</code></td>\n</tr>\n<tr>\n<td align=\"right\">10</td>\n<td>运行 SJG157 联动校验、命名校验、字段一致性校验</td>\n</tr>\n<tr>\n<td align=\"right\">11</td>\n<td>运行重量计算,缺少基础库时写 warning</td>\n</tr>\n<tr>\n<td align=\"right\">12</td>\n<td>更新 <code>import_batches.report</code></td>\n</tr>\n</tbody></table>\n<h3>23.4 幂等规则</h3>\n<table>\n<thead>\n<tr>\n<th>场景</th>\n<th>处理</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>同一文件重复导入同一项目</td>\n<td>生成新 <code>import_batch</code>,若行项内容完全一致,返回已有版本并写审计</td>\n</tr>\n<tr>\n<td>同一 BOM 修改后重新导入</td>\n<td>新建 <code>bom_versions.version_no + 1</code>,用 <code>change_records</code> 记录差异</td>\n</tr>\n<tr>\n<td>编码表重复导入</td>\n<td>按 <code>category_code</code> upsert,保留最新源文件和行号</td>\n</tr>\n<tr>\n<td>命名规则重复导入</td>\n<td>新建 <code>naming_rule_sets.version_label</code>,旧规则置为 inactive</td>\n</tr>\n</tbody></table>\n<hr>\n<h2>24. BOM 校验规则落地</h2>\n<h3>24.1 规则执行结果</h3>\n<p>每条规则输出统一结构:</p>\n<pre><code class=\"language-json\">{\n  &quot;rule_code&quot;: &quot;FIELD-LENGTH-001&quot;,\n  &quot;severity&quot;: &quot;error&quot;,\n  &quot;line_no&quot;: 1,\n  &quot;field&quot;: &quot;length_mm&quot;,\n  &quot;expected_value&quot;: &quot;5694&quot;,\n  &quot;actual_value&quot;: &quot;5475&quot;,\n  &quot;message&quot;: &quot;长度字段与构件名称中的 L5694 不一致&quot;,\n  &quot;fix_suggestion&quot;: &quot;确认构件实际长度后修正 length_mm 或 component_name/spec_model&quot;,\n  &quot;requires_human_approval&quot;: true\n}\n</code></pre>\n<h3>24.2 阻断级规则</h3>\n<table>\n<thead>\n<tr>\n<th>规则</th>\n<th>阻断条件</th>\n</tr>\n</thead>\n<tbody><tr>\n<td><code>SJG-CODE-001</code></td>\n<td>编码不存在于 SJG157</td>\n</tr>\n<tr>\n<td><code>SJG-CODE-002</code></td>\n<td>类目名称与编码对应名称不一致</td>\n</tr>\n<tr>\n<td><code>NAME-002</code></td>\n<td>构件名称无法解析构件类型或版本号</td>\n</tr>\n<tr>\n<td><code>FIELD-QTY-001</code></td>\n<td>数量为空、非数字或小于等于 0</td>\n</tr>\n<tr>\n<td><code>REVIEW-001</code></td>\n<td>存在阻断级错误时提交审批</td>\n</tr>\n<tr>\n<td><code>ISSUE-001</code></td>\n<td>未完成审批时发布</td>\n</tr>\n</tbody></table>\n<h3>24.3 警告级规则</h3>\n<table>\n<thead>\n<tr>\n<th>规则</th>\n<th>条件</th>\n</tr>\n</thead>\n<tbody><tr>\n<td><code>FIELD-LENGTH-001</code></td>\n<td>名称长度、规格长度、字段长度不一致</td>\n</tr>\n<tr>\n<td><code>FIELD-SECTION-001</code></td>\n<td>名称截面、规格型号、截面尺寸不一致</td>\n</tr>\n<tr>\n<td><code>FIELD-MATERIAL-001</code></td>\n<td>材料等级为空</td>\n</tr>\n<tr>\n<td><code>FIELD-WEIGHT-001</code></td>\n<td>重量为空或计算失败</td>\n</tr>\n<tr>\n<td><code>CLASS-MATCH-001</code></td>\n<td>构件类型与类目名称匹配度低</td>\n</tr>\n<tr>\n<td><code>DRAWING-001</code></td>\n<td>图号为空或未关联 CDE 图纸</td>\n</tr>\n</tbody></table>\n<h3>24.4 当前样表应输出的校验结果</h3>\n<table>\n<thead>\n<tr>\n<th align=\"right\">行号</th>\n<th>规则</th>\n<th>严重级别</th>\n<th>输出</th>\n</tr>\n</thead>\n<tbody><tr>\n<td align=\"right\">1</td>\n<td><code>CLASS-MATCH-001</code></td>\n<td>error</td>\n<td><code>铜管 / 30-03.70.20</code> 与 <code>Column_Main</code> 冲突</td>\n</tr>\n<tr>\n<td align=\"right\">1</td>\n<td><code>FIELD-LENGTH-001</code></td>\n<td>warning</td>\n<td><code>L5694</code> 与长度字段 <code>5475</code> 不一致</td>\n</tr>\n<tr>\n<td align=\"right\">4</td>\n<td><code>CLASS-MATCH-001</code></td>\n<td>error</td>\n<td><code>目字形钢柱</code> 与 <code>Beam_Main</code> 冲突</td>\n</tr>\n<tr>\n<td align=\"right\">6</td>\n<td><code>CLASS-MATCH-001</code></td>\n<td>error</td>\n<td><code>目字形钢柱</code> 与 <code>Beam_Main</code> 冲突</td>\n</tr>\n<tr>\n<td align=\"right\">10</td>\n<td><code>CLASS-MATCH-002</code></td>\n<td>warning</td>\n<td><code>Connect_KneeBrace</code> 需要确认归类</td>\n</tr>\n<tr>\n<td align=\"right\">14</td>\n<td><code>FIELD-MATERIAL-001</code></td>\n<td>warning</td>\n<td>材料等级为空</td>\n</tr>\n<tr>\n<td align=\"right\">1-14</td>\n<td><code>FIELD-WEIGHT-001</code></td>\n<td>warning</td>\n<td>重量为空</td>\n</tr>\n</tbody></table>\n<hr>\n<h2>25. BOM 重量计算落地</h2>\n<h3>25.1 统一公式</h3>\n<pre><code class=\"language-text\">unit_weight_kg = area_mm2 * length_mm / 1_000_000_000 * density_kg_m3\ntotal_weight_kg = unit_weight_kg * total_qty\n</code></pre>\n<p>板件:</p>\n<pre><code class=\"language-text\">unit_weight_kg = thickness_mm * width_mm * length_mm / 1_000_000_000 * density_kg_m3\n</code></pre>\n<p>圆钢:</p>\n<pre><code class=\"language-text\">area_mm2 = pi * diameter_mm^2 / 4\n</code></pre>\n<h3>25.2 H 型钢解析</h3>\n<p><code>H200X200X8X12</code>:</p>\n<table>\n<thead>\n<tr>\n<th>参数</th>\n<th>含义</th>\n</tr>\n</thead>\n<tbody><tr>\n<td><code>h=200</code></td>\n<td>高度</td>\n</tr>\n<tr>\n<td><code>b=200</code></td>\n<td>翼缘宽</td>\n</tr>\n<tr>\n<td><code>tw=8</code></td>\n<td>腹板厚</td>\n</tr>\n<tr>\n<td><code>tf=12</code></td>\n<td>翼缘厚</td>\n</tr>\n</tbody></table>\n<p>面积:</p>\n<pre><code class=\"language-text\">area_mm2 = 2 * b * tf + (h - 2 * tf) * tw\n</code></pre>\n<h3>25.3 C 型钢解析</h3>\n<p><code>C180X70X20X2.5</code>:</p>\n<pre><code class=\"language-text\">area_mm2 = (h + 2 * b + 2 * lip) * t\n</code></pre>\n<h3>25.4 箱型钢解析</h3>\n<p><code>S200X200X8X12</code> 需要先确认企业命名中 <code>8X12</code> 的含义。落地策略:</p>\n<table>\n<thead>\n<tr>\n<th>情况</th>\n<th>处理</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>命名规则确认 <code>S宽X高X壁厚X长度/板厚</code></td>\n<td>按规则计算</td>\n</tr>\n<tr>\n<td>命名规则未说明</td>\n<td>写 warning,要求人工选择箱型钢公式</td>\n</tr>\n</tbody></table>\n<h3>25.5 缺基础库处理</h3>\n<table>\n<thead>\n<tr>\n<th>情况</th>\n<th>输出</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>能解析截面和材料密度</td>\n<td>自动写 <code>suggested_unit_weight_kg</code></td>\n</tr>\n<tr>\n<td>能解析截面但材料密度缺失</td>\n<td>写 warning,提示补材料等级</td>\n</tr>\n<tr>\n<td>螺栓标准重量表缺失</td>\n<td>写 warning,要求从紧固件标准库选择</td>\n</tr>\n<tr>\n<td>构件命名与字段冲突</td>\n<td>暂停重量写入,先修正字段</td>\n</tr>\n</tbody></table>\n<p>重量计算结果只能写建议值。人工确认后再回写 <code>bom_lines.unit_set_weight_kg</code> 和 <code>bom_lines.total_weight_kg</code>。</p>\n<hr>\n<h2>26. BOM API 落地</h2>\n<h3>26.1 核心 REST API</h3>\n<table>\n<thead>\n<tr>\n<th>方法</th>\n<th>Endpoint</th>\n<th>输入</th>\n<th>输出</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>POST</td>\n<td><code>/v1/component-bom/source-files</code></td>\n<td>multipart file</td>\n<td><code>source_file_id</code>, <code>sha256</code></td>\n</tr>\n<tr>\n<td>POST</td>\n<td><code>/v1/component-bom/sjg157/import</code></td>\n<td><code>source_file_id</code></td>\n<td><code>import_batch_id</code>, report</td>\n</tr>\n<tr>\n<td>POST</td>\n<td><code>/v1/component-bom/naming-rules/import</code></td>\n<td><code>source_file_id</code></td>\n<td><code>rule_set_id</code>, report</td>\n</tr>\n<tr>\n<td>POST</td>\n<td><code>/v1/component-bom/documents/import</code></td>\n<td><code>source_file_id</code>, <code>project_id</code></td>\n<td><code>bom_document_id</code>, <code>version_id</code>, report</td>\n</tr>\n<tr>\n<td>GET</td>\n<td><code>/v1/component-bom/documents/{id}</code></td>\n<td>path id</td>\n<td>单据头</td>\n</tr>\n<tr>\n<td>GET</td>\n<td><code>/v1/component-bom/versions/{id}/lines</code></td>\n<td>query filter</td>\n<td>行项列表</td>\n</tr>\n<tr>\n<td>PATCH</td>\n<td><code>/v1/component-bom/lines/{id}</code></td>\n<td>行项字段 patch</td>\n<td>更新后的行项</td>\n</tr>\n<tr>\n<td>POST</td>\n<td><code>/v1/component-bom/versions/{id}/parse-names</code></td>\n<td>version id</td>\n<td>token report</td>\n</tr>\n<tr>\n<td>POST</td>\n<td><code>/v1/component-bom/versions/{id}/validate</code></td>\n<td>version id</td>\n<td>validation report</td>\n</tr>\n<tr>\n<td>POST</td>\n<td><code>/v1/component-bom/versions/{id}/calculate-weights</code></td>\n<td>version id</td>\n<td>weight report</td>\n</tr>\n<tr>\n<td>POST</td>\n<td><code>/v1/component-bom/versions/{id}/submit-review</code></td>\n<td>comment</td>\n<td>review task</td>\n</tr>\n<tr>\n<td>POST</td>\n<td><code>/v1/component-bom/versions/{id}/approve</code></td>\n<td>comment</td>\n<td>approved version</td>\n</tr>\n<tr>\n<td>POST</td>\n<td><code>/v1/component-bom/versions/{id}/issue</code></td>\n<td>release note</td>\n<td>issued version</td>\n</tr>\n<tr>\n<td>POST</td>\n<td><code>/v1/component-bom/versions/{id}/exports</code></td>\n<td><code>xlsx/pdf/archive</code></td>\n<td>export job</td>\n</tr>\n</tbody></table>\n<h3>26.2 查询 API</h3>\n<table>\n<thead>\n<tr>\n<th>Endpoint</th>\n<th>用途</th>\n</tr>\n</thead>\n<tbody><tr>\n<td><code>/v1/component-bom/sjg157/categories?section=A.3&amp;q=钢柱</code></td>\n<td>类目搜索</td>\n</tr>\n<tr>\n<td><code>/v1/component-bom/naming-rules?component_type=Beam</code></td>\n<td>查询命名规则</td>\n</tr>\n<tr>\n<td><code>/v1/component-bom/lines/{id}/tokens</code></td>\n<td>查看构件名称 token</td>\n</tr>\n<tr>\n<td><code>/v1/component-bom/lines/{id}/validations</code></td>\n<td>查看行级校验</td>\n</tr>\n<tr>\n<td><code>/v1/component-bom/versions/{id}/diff?compare_to={version_id}</code></td>\n<td>版本差异</td>\n</tr>\n<tr>\n<td><code>/v1/component-bom/versions/{id}/downstream-usage</code></td>\n<td>下游引用</td>\n</tr>\n</tbody></table>\n<h3>26.3 AsyncAPI 事件</h3>\n<table>\n<thead>\n<tr>\n<th>事件</th>\n<th>触发</th>\n</tr>\n</thead>\n<tbody><tr>\n<td><code>component_bom.source_file.uploaded</code></td>\n<td>源文件上传</td>\n</tr>\n<tr>\n<td><code>component_bom.import.completed</code></td>\n<td>导入完成</td>\n</tr>\n<tr>\n<td><code>component_bom.validation.completed</code></td>\n<td>校验完成</td>\n</tr>\n<tr>\n<td><code>component_bom.weight.completed</code></td>\n<td>重量计算完成</td>\n</tr>\n<tr>\n<td><code>component_bom.version.submitted</code></td>\n<td>提交复核</td>\n</tr>\n<tr>\n<td><code>component_bom.version.approved</code></td>\n<td>审批通过</td>\n</tr>\n<tr>\n<td><code>component_bom.version.issued</code></td>\n<td>发布</td>\n</tr>\n<tr>\n<td><code>component_bom.export.completed</code></td>\n<td>导出完成</td>\n</tr>\n</tbody></table>\n<p>事件进入 NATS JetStream 或等价事件总线,同时写审计表。</p>\n<hr>\n<h2>27. BOM 前端工作台落地</h2>\n<h3>27.1 路由</h3>\n<table>\n<thead>\n<tr>\n<th>路由</th>\n<th>页面</th>\n</tr>\n</thead>\n<tbody><tr>\n<td><code>/app/modules/standard_library/component-bom/catalog</code></td>\n<td>SJG157 类目、命名规则、材料等级、型钢规格库</td>\n</tr>\n<tr>\n<td><code>/app/modules/detailed_design/component-bom</code></td>\n<td>构件物料清单主工作台</td>\n</tr>\n<tr>\n<td><code>/app/modules/detailed_design/component-bom/{documentId}</code></td>\n<td>单据详情</td>\n</tr>\n<tr>\n<td><code>/app/modules/detailed_design/component-bom/{documentId}/versions/{versionId}</code></td>\n<td>版本行项编辑</td>\n</tr>\n<tr>\n<td><code>/app/modules/digital_archive/component-bom/{versionId}</code></td>\n<td>归档查看</td>\n</tr>\n</tbody></table>\n<h3>27.2 主界面布局</h3>\n<table>\n<thead>\n<tr>\n<th>区域</th>\n<th>内容</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>顶部工具条</td>\n<td>项目、版本状态、导入、校验、重量计算、提交复核、发布、导出</td>\n</tr>\n<tr>\n<td>单据头</td>\n<td>公司、项目、日期、NO、申请部门、申请人、编制、审核、批准</td>\n</tr>\n<tr>\n<td>A-Q 表格</td>\n<td>全字段编辑、冻结列、筛选、排序、批量粘贴、行级状态标记</td>\n</tr>\n<tr>\n<td>左侧来源</td>\n<td>源 XLSX、图纸、IFC、历史版本</td>\n</tr>\n<tr>\n<td>右侧面板 y></table>\n<hr>\n<h2>28. BOM Agent 落地</h2>\n<h3>28.1 Agent 与工具</h3>\n<table>\n<thead>\n<tr>\n<th>Agent</th>\n<th>调用工具</th>\n<th>输出表</th>\n</tr>\n</thead>\n<tbody><tr>\n<td><code>SJG157ImportAgent</code></td>\n<td><code>xlsx_read</code>, <code>category_upsert</code></td>\n<td><code>sjg157_categories</code></td>\n</tr>\n<tr>\n<td><code>NamingRuleImportAgent</code></td>\n<td><code>xlsx_read</code>, <code>naming_rule_upsert</code></td>\n<td><code>naming_rule_sets</code>, <code>naming_rules</code></td>\n</tr>\n<tr>\n<td><code>ComponentBomImportAgent</code></td>\n<td><code>xlsx_read</code>, <code>bom_upsert</code></td>\n<td><code>bom_documents</code>, <code>bom_versions</code>, <code>bom_lines</code></td>\n</tr>\n<tr>\n<td><code>ComponentNameParserAgent</code></td>\n<td><code>name_parse</code>, <code>rule_lookup</code></td>\n<td><code>component_name_tokens</code></td>\n</tr>\n<tr>\n<td><code>CategoryCodeLinkAgent</code></td>\n<td><code>category_search</code>, <code>category_match</code></td>\n<td><code>line_validation_results</code></td>\n</tr>\n<tr>\n<td><code>ComponentBomValidationAgent</code></td>\n<td><code>validation_rules_run</code></td>\n<td><code>line_validation_results</code></td>\n</tr>\n<tr>\n<td><code>WeightCalculationAgent</code></td>\n<td><code>section_parse</code>, <code>weight_formula_run</code></td>\n<td><code>weight_calculation_results</code></td>\n</tr>\n<tr>\n<td><code>ComponentBomReviewAgent</code></td>\n<td><code>validation_summary</code>, <code>diff_summary</code></td>\n<td>review report</td>\n</tr>\n<tr>\n<td><code>ComponentBomExportAgent</code></td>\n<td><code>xlsx_write</code>, <code>pdf_render</code>, <code>archive_pack</code></td>\n<td><code>export_jobs</code></td>\n</tr>\n</tbody></table>\n<h3>28.2 AI 门禁链</h3>\n<pre><code class=\"language-text\">Planner\n  -&gt; Generator\n  -&gt; Evaluator\n  -&gt; RuleChecker\n  -&gt; SchemaValidator\n  -&gt; Approver\n</code></pre>\n<p>每个 Agent 输出必须带:</p>\n<table>\n<thead>\n<tr>\n<th>字段</th>\n<th>含义</th>\n
