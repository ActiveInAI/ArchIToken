<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 280" width="420" height="280" font-family="Inter, sans-serif">
  <rect width="420" height="280" fill="#FFFFFF"/>
  <g font-size="11">
    <rect x="180" y="24" width="220" height="30" fill="#0A0A0A"/>
    <text x="192" y="44" fill="#FFFFFF">想要 120㎡ 三室两厅</text>

    <rect x="20" y="66" width="260" height="30" fill="#F0F0F0"/>
    <text x="32" y="86" fill="#0A0A0A">明白，生成 3 个候选</text>
    <text x="164" y="86" fill="#FF4B1F">方案</text>
    <text x="196" y="86" fill="#0A0A0A">…</text>

    <rect x="200" y="108" width="200" height="30" fill="#0A0A0A"/>
    <text x="212" y="128" fill="#FFFFFF">书房加大一些</text>

    <rect x="20" y="150" width="280" height="30" fill="#F0F0F0"/>
    <text x="32" y="170" fill="#0A0A0A">✓ 书房 9㎡ →</text>
    <text x="140" y="170" fill="#FF4B1F">14㎡</text>

    <line x1="20" y1="220" x2="400" y2="220" stroke="#E5E5E5"/>
