apiVersion: v1
kind: Secret
metadata:
  name: rbd-hub-pull
  namespace: architoken
type: kubernetes.io/dockerconfigjson
# ⚠️ 实际 secret 由 sealed-secrets 注入·不入 git
# 本地开发:kubectl create secret docker-registry rbd-hub-pull \
#   --docker-server=goodrain.me \
#   --docker-username=admin \
#   --docker-password="$RAINBOND_PASSWORD" \
#   -n architoken
#
# 生产:使用 SealedSecret·见 05-infra/k8s-cluster/sealed-secrets.md
# 本文件保留 Secret manifest 结构但 data 留空待 sealed-secrets 填
data: {}
---
apiVersion: v1
kind: Secret
metadata:
  name: postgres-credentials
  namespace: architoken
type: Opaque
stringData:
  POSTGRES_USER: "${POSTGRES_USER}"           # 见 .env.example
  POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"   # 见 .env.example
  POSTGRES_DB: "${POSTGRES_DB}"               # 见 .env.example
  PGDATA: /var/lib/postgresql/data/pgdata     # 非 secret · 路径常量保留
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: architoken
  labels:
    app: postgres
spec:
  clusterIP: None
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
  selector:
    app: postgres
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: architoken
  labels:
    app: postgres
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      securityContext:
        runAsUser: 999
        runAsGroup: 999
        fsGroup: 999
        fsGroupChangePolicy: OnRootMismatch
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      imagePullSecrets:
        - name: rbd-hub-pull
      containers:
        - name: postgres
          image: goodrain.me/pandora/pgvector:pg16
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5432
              name: postgres
          securityContext:
            allowPrivilegeEscalation: false
            privileged: false
            runAsNonRoot: true
            runAsUser: 999
            capabilities:
              drop:
                - ALL
          envFrom:
            - secretRef:
                name: postgres-credentials
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2"
              memory: "4Gi"
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "architoken", "-d", "architoken"]
            initialDelaySeconds: 10
            periodSeconds: 5
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: local-path
        resources:
          requests:
            storage: 32Gi
