[project]
name = "architoken-workers"
version = "0.1.0"
description = "ArchIToken production worker adapter contracts"
requires-python = ">=3.11"
dependencies = []

[project.optional-dependencies]
test = ["pytest>=8.0"]
production = [
    "boto3>=1.35,<2",
    "nats-py>=2.9,<3",
    "opentelemetry-api>=1.31,<2",
    "opentelemetry-sdk>=1.31,<2",
    "opentelemetry-exporter-otlp>=1.31,<2",
]

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]
