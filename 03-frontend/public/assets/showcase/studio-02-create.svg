<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 280" width="420" height="280" font-family="Inter, sans-serif">
  <rect width="420" height="280" fill="#0A0A0A"/>
  <g fill="#FAFAFA">
    <text x="30" y="40" font-size="13" font-weight="700">Create a plan</text>
    <text x="30" y="58" font-size="10" fill="#9B9B9B">Pick your entry point.</text>

    <g transform="translate(30,80)">
      <rect width="118" height="168" fill="#0A0A0A" stroke="#D4FF3A"/>
      <text x="59" y="50" font-size="32" text-anchor="middle">✨</text>
      <text x="59" y="104" font-size="11" text-anchor="middle" font-weight="700">With AI</text>
      <text x="59" y="122" font-size="9" fill="#9B9B9B" text-anchor="middle">Describe in words.</text>
      <text x="59" y="136" font-size="9" fill="#9B9B9B" text-anchor="middle">Get 3 proposals.</text>
    </g>

    <g transform="translate(156,80)">
      <rect width="118" height="168" fill="#0A0A0A" stroke="#1F1F1F"/>
      <text x="59" y="50" font-size="32" text-anchor="middle">✏</text>
      <text x="59" y="104" font-size="11" text-anchor="middle" font-weight="700">From Scratch</text>
      <text x="59" y="122" font-size="9" fill="#9B9B9B" text-anchor="middle">Open blank 2D editor.</text>
      <text x="59" y="136" font-size="9" fill="#9B9B9B" text-anchor="middle">Draw walls.</text>
    </g>

    <g transform="translate(282,80)">
      <rect width="118" height="168" fill="#0A0A0A" stroke="#1F1F1F"/>
      <text x="59" y="50" font-size="32" text-anchor="middle">⬆</text>
      <text x="59" y="104" font-size="11" text-anchor="middle" font-weight="700">Upload Plan</text>
      <text x="59" y="122" font-size="9" fill="#9B9B9B" text-anchor="middle">DWG · DXF · Image.</text>
      <text x="59" y="136" font-size="9" fill="#9B9B9B" text-anchor="middle">Auto-vectorize.</text>
    </g>
  </g>
</svg>
