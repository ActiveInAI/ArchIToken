#     文生视频  →  Lightricks/LTX-2.3-nvfp4 (HF 14G·NVFP4 优先)
#     多模态统一 →  Tencent-Hunyuan/HY-OmniWeaving (⭐ 52G·场景编织)
#     代码生成  →  Multilingual-Multimodal-NLP/IndustrialCoder (工业代码)
